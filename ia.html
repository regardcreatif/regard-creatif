<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Regard Créatif IA</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#080808">
    <link rel="manifest" href="data:application/json,{}">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#080808;color:#FFD700;font-family:'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
        .header{background:#0a0a0a;padding:15px;text-align:center;border-bottom:2px solid #B8860B;display:flex;align-items:center;gap:10px;justify-content:center}
        .header img{width:40px;height:40px;border-radius:10px;border:2px solid #DAA520}
        .header h1{font-size:1.1rem;color:#FFD700}
        .chat{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px}
        .msg{max-width:85%;padding:12px 16px;border-radius:18px;font-size:0.9rem;line-height:1.5;animation:in 0.3s}
        @keyframes in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .msg.u{align-self:flex-end;background:#1a1a1a;color:#e0e0e0;border:1px solid #333}
        .msg.a{align-self:flex-start;background:linear-gradient(135deg,#1a1200,#1f1500);color:#FFD700;border:1px solid #B8860B}
        .typing{display:flex;gap:4px;padding:10px 16px;align-self:flex-start}
        .typing span{width:6px;height:6px;border-radius:50%;background:#FFD700;animation:typing 1.2s infinite}
        .typing span:nth-child(2){animation-delay:0.2s}
        .typing span:nth-child(3){animation-delay:0.4s}
        @keyframes typing{0%,60%,100%{opacity:0.4;transform:translateY(0)}30%{opacity:1;transform:translateY(-6px)}}
        .input-row{display:flex;padding:12px;gap:8px;background:#0a0a0a;border-top:2px solid #B8860B}
        .input-row input{flex:1;background:#1a1a1a;border:1px solid #333;color:#FFD700;padding:14px 18px;border-radius:25px;font-size:0.95rem;outline:none}
        .input-row input:focus{border-color:#FFD700}
        .input-row button{background:linear-gradient(135deg,#FFD700,#DAA520);color:#000;border:none;padding:14px 22px;border-radius:25px;font-weight:700;cursor:pointer;font-size:0.9rem;text-transform:uppercase}
        .input-row button:disabled{opacity:0.5}
        .status{text-align:center;font-size:0.7rem;color:#B8860B;padding:5px}
    </style>
</head>
<body>

<div class="header">
    <img src="https://i.postimg.cc/TPgmbvsy/f50cefec-92f6-4382-8caf-8ea07ea487f4.webp" alt="Logo">
    <h1>Regard Créatif IA</h1>
</div>

<div class="chat" id="chat">
    <div class="msg a">🎨 Bonjour ! Je suis <strong>Regard Créatif IA</strong>. Pose-moi n'importe quelle question !</div>
</div>

<div class="status" id="status">● En ligne</div>

<div class="input-row">
    <input type="text" id="q" placeholder="Écris ton message..." onkeydown="if(event.key==='Enter')send()">
    <button onclick="send()" id="btn">▶</button>
</div>

<script>
const KEY = 'sk-31d84d0271714b09a1a5237cb084ddee';
const URL = 'https://api.deepseek.com/chat/completions';

async function send() {
    const input = document.getElementById('q');
    const btn = document.getElementById('btn');
    const chat = document.getElementById('chat');
    const status = document.getElementById('status');
    const q = input.value.trim();
    if (!q) return;
    
    chat.innerHTML += `<div class="msg u">${e(q)}</div>`;
    input.value = '';
    btn.disabled = true;
    status.textContent = '● Réflexion...';
    
    const tid = 't' + Date.now();
    chat.innerHTML += `<div class="typing" id="${tid}"><span></span><span></span><span></span></div>`;
    chat.scrollTop = chat.scrollHeight;
    
    try {
        const r = await fetch(URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${KEY}` },
            body: JSON.stringify({
                model: 'deepseek-chat',
                messages: [
                    { role: 'system', content: 'Tu es Regard Créatif IA. Réponds en français, sois utile, créatif et chaleureux.' },
                    { role: 'user', content: q }
                ],
                temperature: 0.8, max_tokens: 500
            })
        });
        const d = await r.json();
        document.getElementById(tid)?.remove();
        chat.innerHTML += `<div class="msg a">${e(d.choices[0].message.content)}</div>`;
        status.textContent = '● En ligne';
    } catch (x) {
        document.getElementById(tid)?.remove();
        chat.innerHTML += `<div class="msg a">⚠️ Erreur réseau. Vérifie ta connexion.</div>`;
        status.textContent = '● Erreur';
    }
    
    chat.scrollTop = chat.scrollHeight;
    btn.disabled = false;
    input.focus();
}

function e(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
