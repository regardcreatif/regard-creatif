BRAIN["greenwashing"]={name:"Greenwashing (Écoblanchiment)",def:"Pratique marketing qui consiste à se donner une image écologique ou responsable trompeuse, sans actions réelles derrière.",details:"Formes de greenwashing : labels inventés, arguments vagues ('100% naturel', 'éco-friendly'), omission d'impact négatif, compensation carbone opaque, communication disproportionnée (petite action, grande pub). Le greenwashing est illégal (loi Climat et Résilience en France). Risques : amendes, perte de confiance, bad buzz. Préférez une communication sobre sur vos actions réelles, aussi modestes soient-elles.",example:"Marque fast fashion : collection 'conscious' en coton bio (2% de la collection) massivement promue, le reste en polyester polluant. Bad buzz 'greenwashing', boycott, plainte. La transparence aurait été plus payante.",related:["ethique marketing","RSE","branding","e reputation"]};

BRAIN["RSE"]={name:"RSE (Responsabilité Sociétale des Entreprises)",def:"Démarche par laquelle une entreprise intègre volontairement des préoccupations sociales et environnementales à ses activités et ses relations.",details:"La RSE couvre 3 piliers : Environnement (empreinte carbone, déchets, biodiversité), Social (bien-être employés, diversité, inclusion, conditions de travail fournisseurs), Gouvernance (éthique, transparence, lutte anti-corruption). Une stratégie RSE authentique améliore la marque employeur, la fidélité client, attire les investisseurs et réduit les risques. Communiquez sur vos actions RSE avec preuves et humilité.",example:"PME : bilan carbone, réduction déchets de 40%, fournisseurs locaux, charte diversité, mécénat de compétences. Rapport RSE annuel publié. Obtention label B-Corp. Fierté employés, +25% candidatures.",related:["ethique marketing","greenwashing","employer branding","bienseance"]};

BRAIN["a venir"]={name:"Sujets à Venir",def:"De nouvelles questions seront ajoutées prochainement. En attendant, n'hésitez pas à poser votre question !",details:"Le Coach est régulièrement mis à jour avec de nouvelles connaissances. Si un sujet n'est pas encore couvert, essayez de reformuler votre question avec des mots-clés différents, ou explorez les sujets connexes suggérés après chaque réponse.",example:"Je n'ai pas encore de réponse complète sur ce sujet précis. Essayez : 'marketing digital débutant', 'comment débuter en marketing', 'stratégie marketing', ou 'outils marketing'.",related:["marketing digital","SEO","reseaux sociaux","strategie marketing efficace"]}};

function findAnswer(q) {
  let qOrig = correctFautes(q);
  let nq = normalize(qOrig);
  let words = nq.split(/\s+/).filter(w => w.length > 1);
  if(words.length === 0) return null;
  let best = null, bestScore = 0;
  for(let key in BRAIN) {
    let nk = normalize(key);
    let kw = nk.split(/\s+/);
    let score = 0;
    for(let w of words) {
      for(let k of kw) {
        if(k.length > 1 && w.includes(k)) score += 2;
        else if(k.length > 1 && k.includes(w)) score += 2;
      }
    }
    for(let w of words) {
      if(nk.includes(w)) score += 1;
    }
    let allWordsInKey = true;
    for(let w of words) {
      if(!nk.includes(w)) { allWordsInKey = false; break; }
    }
    if(allWordsInKey && words.length >= 2) score += words.length * 3;
    if(score > bestScore) { bestScore = score; best = key; }
  }
  if(best && bestScore >= 1) return BRAIN[best];
  for(let key in BRAIN) {
    let nk = normalize(key);
    let kw = nk.split(/\s+/);
    for(let w of words) {
      for(let k of kw) {
        if(w.length >= 3 && k.length >= 3 && (w.includes(k) || k.includes(w))) return BRAIN[key];
      }
    }
  }
  for(let key in BRAIN) {
    let nk = normalize(key);
    for(let w of words) {
      if(w.length >= 4 && nk.includes(w)) return BRAIN[key];
    }
  }
  return null;
}

function askCoach() {
  let input = document.getElementById("coachInput");
  let q = input.value.trim();
  if(!q) return;
  addMessage(q, "user");
  input.value = "";
  let r = findAnswer(q);
  if(r) {
    let html = `<b>📘 ${esc(r.name)}</b><br><br>${esc(r.def)}<br><br><div class="details"><b>📝 Détails :</b> ${esc(r.details)}</div><div class="example"><span class="ex-title">💡 Exemple concret :</span><br>${esc(r.example)}</div>`;
    if(r.related && r.related.length > 0) {
      html += `<div class="coach-suggestions">`;
      for(let rel of r.related.slice(0, 6)) {
        html += `<button onclick="askRelated('${esc(rel)}')">${esc(rel)}</button>`;
      }
      html += `</div>`;
    }
    setTimeout(() => addMessage(html, "bot"), 400);
  } else {
    let suggestions = ["marketing digital", "SEO", "SEA", "reseaux sociaux", "branding", "copywriting", "business plan", "videographie", "photographie", "strategie marketing efficace"];
    let html = `🤔 Je n'ai pas trouvé de réponse précise pour "<b>${esc(q)}</b>".<br><br>💡 Essayez de reformuler avec d'autres mots-clés, ou explorez ces sujets :<div class="coach-suggestions">`;
    for(let s of suggestions) {
      html += `<button onclick="askRelated('${esc(s)}')">${esc(s)}</button>`;
    }
    html += `</div>`;
    setTimeout(() => addMessage(html, "bot"), 400);
  }
}

function askRelated(t) {
  document.getElementById("coachInput").value = t;
  askCoach();
}

function addMessage(txt, type) {
  let div = document.createElement("div");
  div.className = "coach-msg " + type;
  div.innerHTML = txt;
  let container = document.getElementById("coachMessages");
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function toggleCoach() {
  document.getElementById("coach-chat").classList.toggle("active");
}

document.getElementById("coach-btn").addEventListener("click", toggleCoach);
document.getElementById("coachSendBtn").addEventListener("click", askCoach);
document.getElementById("coachInput").addEventListener("keypress", function(e) {
  if(e.key === "Enter") askCoach();
});

})();
</script>
