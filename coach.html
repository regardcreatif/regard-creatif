<!DOCTYPE html>

<head>

<title>Le Coach - IA Marketing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:transparent}
#coach-bubble{position:fixed;bottom:20px;right:20px;z-index:9999;font-family:'Segoe UI',system-ui,sans-serif}
#coach-btn{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#1a3a5c,#132b44);border:none;color:white;font-size:28px;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,0.3);transition:transform 0.2s}
#coach-btn:hover{transform:scale(1.05)}
#coach-chat{display:none;position:fixed;bottom:90px;right:20px;width:380px;height:550px;background:white;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2);flex-direction:column;overflow:hidden;max-width:90vw}
#coach-chat.active{display:flex}
.coach-header{background:linear-gradient(135deg,#1a3a5c,#132b44);color:white;padding:15px 20px;font-weight:700;font-size:18px;display:flex;align-items:center;gap:8px}
.coach-messages{flex:1;overflow-y:auto;padding:15px;background:#fafbfc}
.coach-messages::-webkit-scrollbar{width:4px}
.coach-messages::-webkit-scrollbar-thumb{background:#ccd7e4;border-radius:10px}
.coach-input-area{display:flex;padding:10px;border-top:1px solid #eee;background:white}
.coach-input-area input{flex:1;padding:12px;border:1px solid #ddd;border-radius:25px;outline:none;font-size:14px;font-family:inherit}
.coach-input-area input:focus{border-color:#1a3a5c}
.coach-input-area button{width:45px;height:45px;border-radius:50%;background:linear-gradient(135deg,#1a3a5c,#132b44);border:none;color:white;font-size:18px;margin-left:8px;cursor:pointer}
.coach-msg{padding:10px 15px;border-radius:18px;margin:8px 0;max-width:85%;word-break:break-word;font-size:14px;line-height:1.5;animation:fadeIn 0.3s}
.coach-msg.user{background:#1a3a5c;color:white;margin-left:auto;border-bottom-right-radius:6px}
.coach-msg.bot{background:#f0f2f5;color:#333;border-bottom-left-radius:6px}
.coach-msg.bot b{color:#1a3a5c}
.coach-msg.bot .details{font-size:13px;color:#555;margin-top:6px}
.coach-msg.bot .example{background:#e8f0f8;padding:8px 12px;border-radius:10px;margin-top:6px;font-size:13px;border-left:3px solid #1a3a5c}
.coach-msg.bot .ex-title{font-weight:700;color:#1a3a5c;font-size:12px}
.coach-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.coach-suggestions button{padding:6px 12px;border-radius:15px;border:1px solid #1a3a5c;background:white;color:#1a3a5c;font-size:11px;cursor:pointer;transition:all 0.2s}
.coach-suggestions button:hover{background:#1a3a5c;color:white}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="coach-bubble">
  <button id="coach-btn">💬</button>
  <div id="coach-chat">
    <div class="coach-header">🧠 Le Coach</div>
    <div class="coach-messages" id="coachMessages">
      <div class="coach-msg bot">👋 Bonjour ! Je suis <b>Le Coach</b>, votre expert marketing digital, vidéo, photo et business. Posez-moi votre question !</div>
    </div>
    <div class="coach-input-area">
      <input id="coachInput" placeholder="Votre question...">
      <button id="coachSendBtn">➤</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

function esc(str){if(!str)return'';return str.replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;})}

function normalize(str){return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/['']/g,"'").replace(/[^a-z0-9\s]/g,"").trim()}

function normalizeKeepAccents(str){return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/['']/g,"'").trim()}

const FAUTES={"mouvement":["mouvment","mouvemen","mouvmant","muvment","mouvemant"],"camera":["camra","camerat","kamera","cam"],"travelling":["traveling","travling","travellin","travelin"],"plongee":["plonge","plonje"],"marketing":["marketting","markating","marketin","markting","mkt","mkg"],"digital":["digitale","dijital","digial"],"referencement":["referencement","ref"],"strategie":["strateji","strat"],"entreprise":["entrepise","antreprise","entrep"],"photographie":["fotografi","foto","phot","fotographie"],"exposition":["exposicion","expostion"],"eclairage":["eclerage"],"ethique":["etique","etik"],"bienseance":["biensance","savoir vivre"],"video":["viddo","vido"],"reseaux":["reseau","resau"],"branding":["brandin"],"copywriting":["copywritting","copyrwriting"],"analytics":["analitics"],"inbound":["inboun","inbond"],"outbound":["outboun","outbond"],"fidelisation":["fidelizacion"],"automatisation":["automatizacion"],"conversion":["converssion","konversion","conv"],"influenceur":["influenseur","influ"],"deja":["deja"],"tres":["tres"],"apres":["apres"],"etre":["etre"],"avoir":["avior"],"faire":["faore","faier"],"aller":["aler"],"vendre":["vand"],"meme":["mm"],"probleme":["pb"],"candidat":["cdt"],"beaucoup":["bcp"],"pourquoi":["pk","pq"],"jamais":["jamai"],"toujours":["tjr"],"souvent":["souvant"],"maintenant":["maintenan"],"comment":["coment","commant"],"definir":["definire"],"objectif":["obectif","objectf"],"budget":["budjet","bugdet","bujet"],"qualite":["qualite"],"prix":["pri","pris"],"client":["clien","cilent","cleint"],"produit":["produi","produitt","prodiut"],"service":["servise","servie"],"analyse":["analise","analyze","analize"],"donnee":["donee","done"],"information":["informacion","info"],"communication":["comunication","comunicacion"],"creation":["creacion"],"developpement":["developpement","devloppement"],"commercial":["comercial","commerciale"],"financier":["financier","financiere"],"technique":["technic","teknik"],"graphique":["graphic","grafique"],"contenu":["contenue","conten"],"audience":["audiance","audiense"],"campagne":["campgne","campane"],"abonnement":["abonement","abonnment"],"paiement":["payement","paimant"],"commande":["comande","command"],"livraison":["livraision"],"satisfaction":["satisfacion","satisfation"],"investissement":["investisement"],"rentabilite":["rentabilite"],"croissance":["croisance","croissanse"],"optimisation":["optimizacion"],"segmentation":["segmentacion","segmantation"],"personnalisation":["personalizacion"],"intelligence":["inteligence"],"artificielle":["artificiel","artifitielle"],"algorithme":["algoritme","algorythme"],"plateforme":["plateforme","plateform"],"application":["aplication","app"],"securite":["securite"],"confidentialite":["confidencialite"],"hebergement":["ebergement"],"maintenance":["maintence"],"sauvegarde":["sauvegard"],"performance":["performence","performanse"],"utilisateur":["utilisatuer","utilizateur"],"experience":["experiense","experiance"],"freelance":["freelance","freelanse"],"independant":["independant","indepandant"],"negociation":["negociation","negociacion"],"productivite":["productivite"],"mindset":["mindset"],"business":["bizness","biz"],"haïti":["haiti","ayiti","haiti"],"commerce":["cmmerce","comerce"],"developper":["devlopper"],"succes":["succes"],"difficile":["dificile"],"facile":["fasile"],"excellent":["excelent"],"important":["importan"],"necessaire":["nesesaire"],"different":["diferent"],"differenciation":["differenciation"]};

function correctFautes(text){let words=text.split(" ");for(let i=0;i<words.length;i++){let w=words[i];for(let[correct,fautes]of Object.entries(FAUTES)){if(fautes.includes(w)){words[i]=correct}}}return words.join(" ")}

const BRAIN={};

BRAIN["strategie marketing efficace"]={name:"Stratégie Marketing Efficace",def:"Une stratégie marketing est une feuille de route qui définit comment atteindre vos objectifs business avec les ressources disponibles.",details:"Elle repose sur 5 piliers : 1) Analyse du marché (SWOT, concurrence), 2) Définition des objectifs SMART, 3) Choix des canaux (SEO, réseaux, email, pub), 4) Création de contenu pertinent, 5) Mesure des résultats avec des KPIs. Commencez par comprendre votre client idéal (persona), puis choisissez où et comment l'atteindre. Une bonne stratégie est documentée, partagée avec l'équipe et révisée tous les trimestres.",example:"Une marque de cosmétiques définit sa stratégie : cible femmes 25-40 ans, canaux Instagram + email, objectif +30% ventes en 6 mois, budget 5000€/mois, KPIs : taux d'engagement et ROAS.",related:["plan marketing","objectifs SMART","analyse SWOT","persona marketing","ROI marketing","positionnement de marque","etude de marche","benchmark concurrentiel"]};

BRAIN["plan marketing"]={name:"Plan Marketing",def:"Document stratégique détaillant toutes les actions marketing à mener sur une période donnée (souvent un an, décliné par trimestre).",details:"Un plan marketing complet inclut : 1) Résumé exécutif, 2) Analyse de la situation (marché, concurrence, SWOT), 3) Objectifs chiffrés, 4) Stratégie (cibles, positionnement, canaux), 5) Plan d'action détaillé (quoi, qui, quand), 6) Budget prévisionnel, 7) Indicateurs de performance (KPIs). Il doit être réaliste, chiffré et partagé avec toutes les parties prenantes. Révisez-le tous les trimestres pour l'ajuster aux résultats réels.",example:"Plan trimestriel : mois 1 SEO + blog (2000€), mois 2 social media + influenceurs (5000€), mois 3 email + retargeting (3000€). Budget total 10k€, objectif 500 leads qualifiés.",related:["strategie marketing efficace","objectifs SMART","budget marketing","KPIs marketing","calendrier editorial","ROI marketing"]};

BRAIN["objectifs SMART"]={name:"Objectifs SMART",def:"Méthode pour définir des objectifs clairs et atteignables : Spécifique, Mesurable, Atteignable, Réaliste, Temporellement défini.",details:"SMART est l'acronyme le plus utilisé en marketing pour cadrer les objectifs. Spécifique : l'objectif doit être précis (pas 'augmenter les ventes' mais 'augmenter les ventes du produit X'). Mesurable : on doit pouvoir le chiffrer (pourcentage, nombre, montant). Atteignable : ambitieux mais possible avec les ressources disponibles. Réaliste : aligné avec la stratégie globale. Temporel : avec une date limite (dans 3 mois, avant le 31 décembre).",example:"Objectif SMART : Augmenter le trafic organique du blog de 40% en 6 mois en publiant 2 articles SEO par semaine. (Spécifique=trafic blog, Mesurable=+40%, Atteignable=oui avec 2 articles/sem, Réaliste=aligné SEO, Temporel=6 mois)",related:["strategie marketing efficace","plan marketing","KPIs marketing","ROI marketing","analytics"]};

BRAIN["analyse SWOT"]={name:"Analyse SWOT",def:"Outil stratégique qui identifie les Forces (Strengths), Faiblesses (Weaknesses), Opportunités (Opportunities) et Menaces (Threats) d'un projet.",details:"L'analyse SWOT se fait en 2 colonnes : Interne (Forces et Faiblesses, ce que vous contrôlez) et Externe (Opportunités et Menaces, ce que vous ne contrôlez pas). Forces : vos avantages, compétences uniques, ressources. Faiblesses : vos lacunes, manques de budget ou compétences. Opportunités : tendances marché, changements légaux favorables, faiblesses concurrents. Menaces : nouveaux concurrents, changements de réglementation, baisse de demande. Utilisez le SWOT avant toute décision stratégique majeure.",example:"SWOT d'une startup SaaS : Forces = équipe technique experte, produit innovant. Faiblesses = budget marketing limité, marque inconnue. Opportunités = marché en croissance de 25%/an, concurrents peu innovants. Menaces = GAFAM qui pourrait entrer sur le marché, réglementation RGPD stricte.",related:["strategie marketing efficace","plan marketing","etude de marche","benchmark concurrentiel"]};

BRAIN["positionnement de marque"]={name:"Positionnement de Marque",def:"La place qu'une marque occupe dans l'esprit des consommateurs par rapport à ses concurrents. C'est le choix stratégique de se différencier.",details:"Le positionnement répond à 4 questions : 1) Qui est votre cible ? 2) Quelle est votre catégorie de produit/service ? 3) Quel est votre bénéfice unique (USP) ? 4) Quelle preuve apportez-vous ? Un bon positionnement est simple, crédible, distinctif et durable. Il se résume en une phrase : 'Pour [cible], [marque] est [catégorie] qui offre [bénéfice unique] parce que [preuve].'",example:"Volvo : Pour les familles soucieuses de sécurité, Volvo est le constructeur automobile qui offre la plus grande tranquillité d'esprit parce qu'aucun autre constructeur n'a autant innové en sécurité (ceinture 3 points, airbags latéraux).",related:["strategie marketing efficace","branding","identite visuelle","differenciation","copywriting"]};

BRAIN["persona marketing"]={name:"Persona Marketing",def:"Représentation semi-fictive de votre client idéal basée sur des données réelles et des hypothèses documentées.",details:"Un persona inclut : données démographiques (âge, sexe, localisation, revenus), psychographiques (valeurs, centres d'intérêt, style de vie), comportements (habitudes d'achat, canaux utilisés), objectifs et motivations, freins et objections. Créez 3 à 5 personas maximum. Donnez-leur un prénom, une photo, une histoire. Chaque décision marketing doit répondre à : 'Est-ce que ça aide mon persona à avancer ?'",example:"'Sophie, 34 ans, Paris, responsable marketing, gagne 55k€/an. Utilise Instagram et LinkedIn, lit des blogs marketing, cherche à monter en compétences. Frein : manque de temps. Objectif : devenir directrice marketing dans 2 ans.'",related:["strategie marketing efficace","plan marketing","parcours client","etude de marche"]};

BRAIN["parcours client"]={name:"Parcours Client (Customer Journey)",def:"L'ensemble des étapes et interactions qu'un client vit avec une marque, de la découverte à l'achat et au-delà.",details:"Le parcours client typique comprend 5 étapes : 1) Conscience (le client découvre un besoin), 2) Considération (il cherche des solutions), 3) Décision (il compare et choisit), 4) Achat (il passe à l'acte), 5) Post-achat (fidélisation, réachat, recommandation). Cartographiez chaque point de contact (site web, réseaux, pub, service client). Identifiez les frictions et les opportunités d'amélioration à chaque étape.",example:"Parcours client d'un e-commerce : Conscience (pub Instagram) → Considération (visite site, lit avis) → Décision (comparaison prix) → Achat (checkout rapide) → Post-achat (email suivi, demande d'avis, offre fidélité).",related:["persona marketing","strategie marketing efficace","funnel marketing","CRO","fidelisation"]};

BRAIN["funnel marketing"]={name:"Funnel Marketing (Entonnoir de Conversion)",def:"Modèle qui représente le parcours du client de la découverte à l'achat, avec un nombre décroissant de personnes à chaque étape.",details:"Le funnel classique AIDA : Attention (attirer l'attention), Intérêt (susciter l'intérêt), Désir (créer le désir), Action (déclencher l'achat). Le funnel moderne inclut aussi : Rétention et Recommandation. Mesurez le taux de conversion à chaque étape pour identifier les fuites. Optimisez avec du contenu adapté : articles/blog pour l'attention, études de cas pour l'intérêt, démos pour le désir, offres limitées pour l'action.",example:"Funnel d'une formation en ligne : Article SEO (1000 visiteurs) → Lead magnet ebook (200 inscrits) → Série emails nurturing (50 démos) → Inscriptions formation (15 clients). Taux de conversion global : 1,5%. Optimisation : améliorer le lead magnet pour passer de 20% à 30% de conversion visiteurs→leads.",related:["parcours client","CRO","lead generation","lead nurturing","inbound marketing"]};

BRAIN["inbound marketing"]={name:"Inbound Marketing",def:"Stratégie qui consiste à attirer naturellement les clients en créant du contenu utile et des expériences personnalisées, plutôt que de les interrompre avec de la publicité intrusive.",details:"L'inbound repose sur la méthodologie : Attirer (SEO, blog, réseaux sociaux), Convertir (lead magnets, landing pages, CTA), Conclure (email nurturing, CRM, scoring), Fidéliser (contenu post-achat, service client). L'inbound coûte en moyenne 62% moins cher par lead que l'outbound traditionnel. Il nécessite une stratégie de contenu solide et de la patience (3 à 6 mois pour voir les résultats).",example:"Une agence web crée un blog SEO, propose un audit gratuit en lead magnet, envoie une série d'emails éducatifs, puis propose un appel découverte. Coût par lead : 30€ vs 150€ en pub display.",related:["outbound","content marketing","lead generation","SEO","funnel marketing"]};

BRAIN["outbound"]={name:"Outbound Marketing",def:"Marketing 'push' traditionnel qui pousse le message vers une audience large, souvent sans ciblage précis : publicité TV, radio, display, cold calling, salons.",details:"L'outbound interrompt l'audience pour attirer l'attention. Il est plus coûteux et moins ciblé que l'inbound, mais efficace pour la notoriété rapide et les marchés de masse. Les canaux outbound : publicité TV/radio, affichage, pub display, cold emailing, cold calling, salons professionnels, flyers. L'outbound reste pertinent pour les lancements de produits grand public et les marchés où la décision d'achat est rapide.",example:"Une startup B2B lance des LinkedIn Ads ciblées sur les CTO du secteur tech. Budget 2000€/semaine, 50 demandes de démo en 7 jours. C'est de l'outbound ciblé (ABM).",related:["inbound marketing","SEA","programmatic advertising","branding"]};

BRAIN["growth hacking"]={name:"Growth Hacking",def:"Ensemble de techniques marketing non conventionnelles, créatives et à faible coût visant une croissance rapide et mesurable.",details:"Le growth hacking combine marketing, data, produit et automatisation. Le framework AARRR (Pirate Metrics) structure les étapes : Acquisition (d'où viennent les utilisateurs ?), Activation (ont-ils une bonne première expérience ?), Rétention (reviennent-ils ?), Revenu (comment monétiser ?), Référence (recommandent-ils ?). Le growth hacker teste en continu, mesure tout, et privilégie les actions à fort impact et faible coût.",example:"Dropbox a utilisé un programme de parrainage : chaque utilisateur qui invite un ami gagne 500 Mo de stockage gratuit, l'ami aussi. Résultat : 3900% de croissance en 15 mois, de 100k à 4 millions d'utilisateurs.",related:["inbound marketing","CRO","product-led growth","viral marketing","AARRR"]};

BRAIN["AARRR"]={name:"Framework AARRR (Pirate Metrics)",def:"Méthode en 5 étapes pour piloter la croissance : Acquisition, Activation, Rétention, Revenu, Référence.",details:"Acquisition : comment les utilisateurs vous trouvent-ils ? (canaux, coût par acquisition). Activation : leur première expérience est-elle satisfaisante ? (onboarding, time-to-value). Rétention : reviennent-ils ? (taux de rétention à J7, J30). Revenu : comment gagnez-vous de l'argent ? (ARPU, LTV, taux de conversion payant). Référence : recommandent-ils votre produit ? (Net Promoter Score, taux de parrainage). Mesurez chaque étape et optimisez la plus faible en premier.",example:"Une app mobile analyse AARRR : Acquisition=10k téléchargements/mois (coût 2€/install), Activation=40% ouvrent l'app 3 fois la première semaine, Rétention=25% actifs à J30, Revenu=ARPU 5€/mois, Référence=15% viennent du parrainage. Focus sur l'Activation et la Rétention.",related:["growth hacking","product-led growth","analytics","KPIs marketing","CRO"]};

BRAIN["product-led growth"]={name:"Product-Led Growth (PLG)",def:"Stratégie où le produit lui-même est le principal moteur d'acquisition, d'activation et de rétention, souvent via un modèle freemium ou essai gratuit.",details:"Le PLG inverse le modèle traditionnel : le produit démontre sa valeur avant l'achat. Principes clés : onboarding ultra-rapide (time-to-value < 5 minutes), boucles virales intégrées (invitation, partage), expansion naturelle (adoption par toute l'équipe), monétisation à l'usage. Le Product-Qualified Lead (PQL) remplace le MQL : un lead qui a déjà expérimenté la valeur du produit. Icônes PLG : Slack, Dropbox, Figma, Notion, Calendly, Zoom.",example:"Calendly : un utilisateur crée un lien de réservation gratuit. Quand un client réserve, le destinataire découvre Calendly et s'inscrit. Boucle virale intégrée : chaque réservation expose 2 nouvelles personnes au produit.",related:["growth hacking","growth loops","AARRR","CRO","fidelisation"]};

BRAIN["growth loops"]={name:"Growth Loops (Boucles de Croissance)",def:"Système de croissance cyclique où la sortie d'un cycle alimente l'entrée du suivant, créant une croissance composée et auto-alimentée.",details:"Contrairement au funnel linéaire (qui s'épuise), les boucles sont auto-alimentées. Types : boucle virale (un utilisateur en invite d'autres, k-factor), boucle de contenu (le contenu attire du trafic qui génère du contenu), boucle de réseau (plus d'utilisateurs rendent le produit plus utile), boucle de données (plus de données améliorent le produit qui attire plus d'utilisateurs). Chaque boucle a un coefficient (k-factor) : si k>1, croissance exponentielle.",example:"Notion : les utilisateurs créent des templates publics → partagés sur Reddit/Twitter → nouveaux utilisateurs découvrent Notion → créent leurs propres templates. Boucle de contenu pure. Notion est passé de 0 à 30M d'utilisateurs.",related:["product-led growth","growth hacking","viral marketing","funnel marketing"]};

BRAIN["viral marketing"]={name:"Marketing Viral",def:"Stratégie qui encourage les utilisateurs à partager spontanément un message ou contenu, créant une propagation exponentielle comme un virus.",details:"Le marketing viral repose sur des déclencheurs psychologiques : émotion forte (joie, surprise, colère), utilité sociale (partager rend service), récit mémorable, participation (défis, challenges). Le coefficient viral (k-factor) mesure le nombre de nouveaux utilisateurs générés par chaque utilisateur existant. Si k>1, la croissance est exponentielle. Les réseaux sociaux sont le principal vecteur de viralité.",example:"Le Ice Bucket Challenge : se filmer en se versant un seau d'eau glacée, nominer 3 amis, faire un don pour la SLA. 17 millions de vidéos, 115 millions de dollars récoltés, portée mondiale.",related:["growth hacking","reseaux sociaux","content marketing","storytelling","UGC"]};

BRAIN["CRO"]={name:"CRO (Conversion Rate Optimization)",def:"Optimisation du taux de conversion : ensemble des techniques pour augmenter le pourcentage de visiteurs qui effectuent une action souhaitée sur un site ou une app.",details:"Le CRO suit un processus : 1) Analyser (analytics, heatmaps, session replays pour identifier les frictions), 2) Formuler des hypothèses ('Si je change X, alors Y augmentera parce que Z'), 3) Tester (A/B testing, multivariate testing), 4) Implémenter la version gagnante, 5) Recommencer. Les éléments à optimiser : titres, CTA, formulaires, images, preuve sociale, vitesse de chargement, UX mobile.",example:"Un e-commerce teste 2 versions de page produit : version A = bouton 'Acheter', version B = bouton 'Ajouter au panier - Livraison gratuite'. Version B gagne +18% de conversions. Hypothèse validée : mentionner la livraison gratuite lève un frein.",related:["A/B testing","funnel marketing","landing page","analytics","neuromarketing"]};

BRAIN["A/B testing"]={name:"A/B Testing",def:"Méthode de test comparant 2 versions d'un même élément (page, email, annonce) pour déterminer laquelle performe le mieux sur un objectif défini.",details:"Principe : on divise le trafic aléatoirement en 2 groupes égaux. Le groupe A voit la version originale, le groupe B voit la variante. On mesure le taux de conversion de chaque version. La version gagnante est celle qui obtient une différence statistiquement significative (p-value < 0,05). Durée minimale : 1 à 2 semaines ou jusqu'à atteindre la significativité statistique. Outils : Google Optimize (gratuit), VWO, Optimizely, AB Tasty.",example:"Test A/B sur un bouton CTA : version A 'Télécharger' (taux de clic 4,2%), version B 'Télécharger votre guide gratuit' (taux de clic 6,8%). La version B est 62% plus performante. On la déploie pour tous les visiteurs.",related:["CRO","landing page","analytics","copywriting"]};

BRAIN["SEO"]={name:"SEO (Search Engine Optimization)",def:"Ensemble des techniques visant à améliorer la position d'un site web dans les résultats naturels (non payants) des moteurs de recherche.",details:"Le SEO repose sur 3 piliers : 1) Technique : vitesse, mobile-friendly, crawl, indexation, données structurées. 2) Contenu : mots-clés pertinents, qualité rédactionnelle, fraîcheur, satisfaction de l'intention de recherche. 3) Netlinking : backlinks de qualité, autorité de domaine. Le SEO est un investissement long terme (3-6 mois pour voir les résultats) mais apporte un trafic durable et gratuit.",example:"Un blog e-commerce optimise ses fiches produits avec des mots-clés longue traîne, améliore son temps de chargement (passage de 4s à 1,8s), et obtient des backlinks de blogs influents. Résultat : +40% de trafic organique en 6 mois, position 1 sur 'meilleur aspirateur robot 2025'.",related:["SEA","SEO technique","content marketing","mots cles","backlinks"]};

BRAIN["SEA"]={name:"SEA (Search Engine Advertising)",def:"Publicité payante sur les moteurs de recherche (Google Ads, Microsoft Ads) : enchères sur mots-clés pour apparaître en haut des résultats.",details:"Le SEA fonctionne au CPC (coût par clic). Le Quality Score (de 1 à 10) influence le coût et la position : il dépend du CTR attendu, de la pertinence de l'annonce et de la landing page. Avantages : résultats immédiats, ciblage précis (mots-clés, localisation, appareil, heure), budget contrôlable. Inconvénients : coût qui peut être élevé sur certains mots-clés, trafic qui s'arrête quand le budget s'arrête. Complément idéal du SEO.",example:"Une agence de voyage lance Google Ads sur 'vol Paris Tokyo' avec extensions de prix et de lieu. Budget 500€/mois, CPC moyen 0,80€, CTR 8%, 50 clics/jour, ROAS de 5 (1€ investi = 5€ de CA).",related:["SEO","CPC","Quality Score","Google Ads","analytics"]};

BRAIN["CPC"]={name:"CPC (Coût Par Clic)",def:"Modèle de tarification publicitaire où l'annonceur paie chaque fois qu'un utilisateur clique sur son annonce.",details:"Le CPC est le modèle dominant en SEA. Il est calculé comme : montant dépensé / nombre de clics. Le CPC réel dépend de : la concurrence sur le mot-clé, le Quality Score, l'enchère maximale, les extensions d'annonces. Un bon CPC varie selon le secteur : 0,50€ à 2€ pour du B2C, 3€ à 20€ pour du B2B ou des secteurs concurrentiels (assurance, prêt). Optimisez votre CPC en améliorant votre Quality Score et en ciblant des mots-clés longue traîne.",example:"Campagne Google Ads : budget 300€, 600 clics. CPC = 300/600 = 0,50€ par clic. Si 10% des clics convertissent (60 ventes), coût par conversion = 300/60 = 5€.",related:["SEA","CPM","CTR","ROAS","Google Ads"]};

BRAIN["CPM"]={name:"CPM (Coût Pour Mille impressions)",def:"Modèle de tarification publicitaire où l'annonceur paie pour 1000 impressions (affichages) de son annonce, quel que soit le nombre de clics.",details:"Le CPM est utilisé principalement en display, vidéo et brand awareness. Formule : (coût total / nombre d'impressions) x 1000. Avantage : idéal pour la notoriété, prix fixe par visibilité. Inconvénient : ne mesure pas l'engagement. Un CPM de 5€ signifie que 1000 personnes verront votre annonce pour 5€. Les CPM varient selon la plateforme : Facebook 3-8€, LinkedIn 25-40€, YouTube 2-6€.",example:"Campagne display : budget 1000€, 200 000 impressions. CPM = (1000/200000)x1000 = 5€. 200 000 personnes ont vu la bannière. Avec un CTR de 0,15%, cela génère 300 clics.",related:["SEA","CPC","CTR","ROAS","branding"]};

BRAIN["CTR"]={name:"CTR (Click Through Rate)",def:"Taux de clics : pourcentage de personnes qui cliquent sur une annonce ou un lien après l'avoir vu.",details:"CTR = (nombre de clics / nombre d'impressions) x 100. C'est un indicateur de pertinence et d'attractivité. Un bon CTR dépend du canal : Google Ads search 3-8%, Display 0,1-0,3%, Facebook Ads 1-2%, LinkedIn Ads 0,3-0,8%, email 2-5%. Améliorez votre CTR avec : des titres accrocheurs, des visuels impactants, un ciblage plus précis, une proposition de valeur claire, et des CTA percutants.",example:"Annonce Google Ads : 10 000 impressions, 500 clics. CTR = (500/10000)x100 = 5%. C'est un excellent CTR pour du search. L'annonce a un titre avec mot-clé exact et une extension promotion.",related:["SEA","CPC","CPM","copywriting","Quality Score"]};

BRAIN["ROAS"]={name:"ROAS (Return On Ad Spend)",def:"Retour sur investissement publicitaire : mesure combien de chiffre d'affaires est généré pour chaque euro investi en publicité.",details:"ROAS = Chiffre d'affaires généré / Coût publicitaire. Un ROAS de 4 signifie que 1€ investi a généré 4€ de CA. Un ROAS > 1 est rentable en apparence, mais il faut prendre en compte les marges. Le ROAS cible dépend du secteur : e-commerce 3-5, SaaS 5-10, luxe 2-3. Différence avec le ROI : le ROAS mesure le CA, le ROI mesure le profit net (CA - coûts - coût des produits vendus).",example:"Campagne Facebook Ads : coût 1000€, CA généré 4000€. ROAS = 4000/1000 = 4. Si la marge est de 50%, le profit est 2000€ - 1000€ = 1000€, soit un ROI de 100%.",related:["SEA","CPC","CPM","ROI marketing","analytics"]};

BRAIN["ROI marketing"]={name:"ROI Marketing (Return On Investment)",def:"Retour sur investissement : mesure le profit net généré par une action marketing rapporté à son coût.",details:"ROI = (Profit net - Investissement) / Investissement x 100. Un ROI de 200% signifie que pour 1€ investi, vous gagnez 3€ (1€ remboursé + 2€ de profit). Le calcul doit inclure TOUS les coûts : publicité, création, outils, salaires, frais généraux. Le ROI est la mesure ultime de la rentabilité marketing. Attention : certaines actions ont un ROI indirect (branding, contenu) difficile à mesurer à court terme.",example:"Campagne email : coût de l'outil 100€, temps création 200€, total 300€. CA généré 1500€, marge 50% = 750€. ROI = (750-300)/300 x 100 = 150%. Chaque euro investi a rapporté 1,50€ de profit.",related:["ROAS","KPIs marketing","budget marketing","analytics"]};

BRAIN["KPIs marketing"]={name:"KPIs Marketing",def:"Indicateurs Clés de Performance : métriques choisies pour mesurer l'atteinte des objectifs marketing.",details:"Les KPIs doivent être alignés sur les objectifs (SMART). KPIs par domaine : Acquisition = trafic, leads, CAC. Engagement = CTR, taux de rebond, pages/session, temps passé. Conversion = taux de conversion, panier moyen, CPA. Rétention = taux d'attrition, LTV, NPS. Revenu = CA, ROAS, ROI. Ne suivez pas plus de 5-7 KPIs prioritaires. Créez un dashboard (Google Looker Studio) pour visualiser l'évolution.",example:"KPIs d'un e-commerce : 1) Trafic organique (objectif +20%/mois), 2) Taux de conversion (cible 3%), 3) Panier moyen (cible 55€), 4) CAC (max 15€), 5) LTV (cible 150€), 6) ROAS (min 3). Tableau de bord mis à jour chaque semaine.",related:["ROI marketing","ROAS","analytics","budget marketing","objectifs SMART"]};

BRAIN["CAC"]={name:"CAC (Customer Acquisition Cost)",def:"Coût d'acquisition client : montant total dépensé en marketing et vente pour acquérir un nouveau client.",details:"CAC = Total des coûts marketing + ventes / Nombre de nouveaux clients. Incluez TOUS les coûts : publicité, salaires, outils, événements, commissions. Un CAC sain doit être 3 à 5 fois inférieur à la LTV (Customer Lifetime Value). Pour réduire le CAC : optimisez vos canaux les plus performants, améliorez votre taux de conversion, automatisez, fidélisez (le réachat réduit le CAC relatif).",example:"Startup SaaS : coûts marketing mensuels 10 000€ (pub 6000€ + salaires 3000€ + outils 1000€), 50 nouveaux clients par mois. CAC = 10 000/50 = 200€ par client. Si LTV = 1000€, ratio LTV/CAC = 5 (excellent).",related:["LTV","KPIs marketing","ROI marketing","budget marketing"]};

BRAIN["LTV"]={name:"LTV (Lifetime Value)",def:"Valeur vie client : chiffre d'affaires total qu'un client génère pendant toute sa relation avec l'entreprise.",details:"LTV = Panier moyen x Fréquence d'achat x Durée de vie client. Exemple : un client dépense 50€/mois, pendant 24 mois. LTV = 50 x 12 x 2 = 1200€. La LTV aide à définir combien vous pouvez investir pour acquérir un client (CAC). Ratio LTV/CAC > 3 est bon, > 5 est excellent. Augmentez la LTV en : améliorant le produit, faisant des ventes croisées, fidélisant, augmentant les prix.",example:"Abonnement box beauté : abonnement 30€/mois, client reste en moyenne 14 mois. LTV = 30 x 14 = 420€. Si CAC = 60€, LTV/CAC = 7. L'entreprise peut investir jusqu'à 140€ de CAC (LTV/3) tout en restant rentable.",related:["CAC","KPIs marketing","fidelisation","churn"]};

BRAIN["churn"]={name:"Churn (Taux d'Attrition)",def:"Pourcentage de clients qui cessent leur relation avec l'entreprise sur une période donnée. L'inverse du taux de rétention.",details:"Churn = (Clients perdus sur la période / Clients au début de la période) x 100. Un churn mensuel de 5% signifie que 5% des clients partent chaque mois. Le churn est critique pour les abonnements. Churn acceptable : < 2%/mois en B2B SaaS, < 5% en B2C. Causes de churn : mauvaise expérience, prix trop élevé, meilleure offre concurrente, manque d'usage. Réduisez le churn en : améliorant l'onboarding, restant en contact (email), créant de l'engagement, anticipant les signaux de départ.",example:"App de fitness : 1000 abonnés début janvier, 50 désabonnements en janvier. Churn = 50/1000 x 100 = 5% par mois. En 12 mois, il ne restera que 540 abonnés (1000 x 0,95^12). Lancement d'un programme de rétention pour réduire le churn à 3%.",related:["LTV","fidelisation","CAC","KPIs marketing"]};

BRAIN["NPS"]={name:"NPS (Net Promoter Score)",def:"Indicateur de fidélité client mesurant la probabilité que vos clients recommandent votre marque à leur entourage.",details:"Question unique : 'Sur une échelle de 0 à 10, quelle est la probabilité que vous recommandiez [marque] à un ami ou collègue ?' 3 catégories : Promoteurs (9-10, fidèles enthousiastes), Passifs (7-8, satisfaits mais pas engagés), Détracteurs (0-6, mécontents). NPS = % Promoteurs - % Détracteurs. Score de -100 à +100. Un NPS > 30 est bon, > 50 est excellent, > 70 est exceptionnel. Benchmark : Apple NPS 72, Amazon 62, Netflix 58.",example:"Enquête NPS envoyée à 200 clients : 100 Promoteurs (50%), 60 Passifs (30%), 40 Détracteurs (20%). NPS = 50% - 20% = 30. C'est un bon score. Action : contacter les détracteurs pour comprendre et résoudre leurs problèmes.",related:["fidelisation","satisfaction client","churn","KPIs marketing"]};

BRAIN["satisfaction client"]={name:"Satisfaction Client",def:"Mesure de l'écart entre les attentes du client et son expérience réelle avec le produit ou service.",details:"La satisfaction se mesure par : CSAT (Customer Satisfaction Score), NPS, CES (Customer Effort Score), avis en ligne, taux de réclamation. Un client satisfait est plus fidèle, dépense plus, et recommande. La satisfaction ne garantit pas la fidélité (un client satisfait peut partir si une meilleure offre se présente). Visez l'enchantement : dépasser les attentes crée des ambassadeurs. Mesurez la satisfaction après chaque interaction clé (achat, support, livraison).",example:"CSAT post-achat : 'Comment évaluez-vous votre expérience ?' (1 à 5 étoiles). Score moyen 4,2/5. Analyse des verbatims : les clients adorent la qualité mais trouvent la livraison lente. Action : changement de transporteur, score passe à 4,6/5.",related:["NPS","CES","fidelisation","churn","service client"]};

BRAIN["CES"]={name:"CES (Customer Effort Score)",def:"Mesure de l'effort qu'un client doit fournir pour résoudre un problème ou accomplir une tâche avec votre entreprise.",details:"Question : 'Dans quelle mesure avez-vous dû fournir des efforts pour [action] ?' Échelle de 1 (très facile) à 7 (très difficile). Un CES bas (< 3) est excellent. Le CES est un meilleur prédicteur de fidélité que la satisfaction (Harvard Business Review). Principe : réduire l'effort client = réduire le churn. Appliquez le CES au SAV, au checkout, à l'onboarding. Simplifiez chaque processus.",example:"Enquête après appel SAV : 'Avez-vous dû fournir beaucoup d'efforts pour résoudre votre problème ?' CES moyen 4,2/7. Analyse : les clients doivent rappeler 2-3 fois. Solution : formation des agents à résoudre au premier contact. CES passe à 2,8/7.",related:["satisfaction client","NPS","service client","UX design"]};

BRAIN["branding"]={name:"Branding",def:"Processus de construction et de gestion d'une marque : identité visuelle, valeurs, promesse, ton de voix, pour créer une connexion émotionnelle durable avec le public.",details:"Le branding va au-delà du logo. Il inclut : l'identité visuelle (logo, couleurs, typo), la charte graphique, le ton de voix (comment la marque s'exprime), la promesse de marque (ce qu'elle s'engage à offrir), les valeurs, l'histoire (storytelling). Une marque forte se différencie, justifie un prix premium, fidélise et attire les talents. Cohérence sur tous les points de contact = clé du branding réussi.",example:"Apple : branding basé sur la simplicité, l'innovation, le design premium, la confidentialité. Cohérence parfaite : produits épurés, packaging minimaliste, publicité émotionnelle, Apple Store design. Marque valorisée à 500+ milliards $.",related:["identite visuelle","charte graphique","positionnement de marque","storytelling","employer branding"]};

BRAIN["identite visuelle"]={name:"Identité Visuelle",def:"Ensemble des éléments graphiques qui représentent une marque : logo, couleurs, typographie, formes, iconographie, photographie.",details:"L'identité visuelle est le visage de la marque. Composants : 1) Logo (principal, secondaire, favicon), 2) Palette de couleurs (primaire, secondaire, accents), 3) Typographie (titres, corps de texte, tailles hiérarchiques), 4) Iconographie et illustrations, 5) Style photographique (filtres, cadrage, ambiance), 6) Motifs, textures. Une identité visuelle forte est : reconnaissable, différenciante, cohérente, intemporelle (pas de mode), adaptable (responsive, noir/blanc).",example:"Nike : swoosh (logo simple et dynamique), noir et blanc + orange (énergie), typo Futura Bold, photo dynamique d'athlètes en action. Identité visuelle inchangée depuis 50 ans, reconnaissable mondialement.",related:["branding","charte graphique","logo","design graphique"]};

BRAIN["charte graphique"]={name:"Charte Graphique",def:"Document de référence qui définit et standardise l'utilisation de tous les éléments de l'identité visuelle d'une marque.",details:"Une charte graphique complète contient : 1) Logo (versions, espace de protection, tailles minimales, interdits), 2) Couleurs (codes CMJN, RVB, Hex, Pantone, règles d'association), 3) Typographie (polices, hiérarchie, tailles, interlignage), 4) Iconographie et pictogrammes, 5) Éléments graphiques (formes, motifs, lignes), 6) Style photo/vidéo, 7) Exemples d'applications (print, web, réseaux). Elle garantit la cohérence même si plusieurs personnes créent des visuels.",example:"Charte graphique d'une startup : logo bleu marine sur fond blanc uniquement, marge de sécurité = hauteur du logo, couleurs primaires bleu #1A3A5C + corail #FF6B6B, typo Inter (web) + Montserrat (titres), photos style lifestyle lumineux, jamais de filtres sombres.",related:["identite visuelle","branding","logo","design graphique"]};

BRAIN["logo"]={name:"Logo",def:"Symbole graphique unique qui identifie une marque instantanément. Le logo est la pierre angulaire de l'identité visuelle.",details:"Types de logos : 1) Logotype (texte uniquement, ex: Google, Coca-Cola), 2) Icône (symbole seul, ex: Apple, Twitter), 3) Mixte (icône + texte, ex: Nike swoosh + nom), 4) Emblème (texte dans un symbole, ex: Starbucks, Harley-Davidson). Un bon logo est : simple (reconnaissable en 1 seconde), mémorisable, intemporel, polyvalent (couleur, N&B, petit, grand), pertinent pour le secteur. Investissez dans un logo professionnel (> 500€) ou utilisez un template premium.",example:"Logo Airbnb 'Bélo' (2014) : symbole combinant un A, un cœur, un marqueur de carte et une personne. Simple, mémorisable, raconte l'appartenance (Belong Anywhere). Coût du rebranding complet : ~1 million $.",related:["identite visuelle","charte graphique","branding","design graphique"]};

BRAIN["copywriting"]={name:"Copywriting",def:"Art de la rédaction persuasive visant à pousser le lecteur à l'action : acheter, s'inscrire, cliquer, partager.",details:"Un bon copywriting suit la structure AIDA : Attention (titre percutant), Intérêt (hook, problème), Désir (bénéfices, preuves sociales), Action (CTA clair). Techniques : utiliser des verbes d'action, parler au 'vous', énumérer les bénéfices (pas les caractéristiques), créer de l'urgence, utiliser la preuve sociale, raconter une histoire. Le copywriting s'applique partout : landing pages, emails, annonces, pages de vente, réseaux sociaux, scripts vidéo.",example:"Page de vente d'une formation : Titre 'Devenez Community Manager en 3 mois sans diplôme'. Sous-titre 'Décrochez un job à 2500€/mois même si vous partez de zéro'. Corps : témoignages + programme + garantie. CTA 'Inscrivez-vous maintenant - Places limitées'.",related:["AIDA","storytelling","CRO","landing page","redaction web"]};

BRAIN["AIDA"]={name:"Méthode AIDA",def:"Modèle classique de copywriting en 4 étapes : Attention, Intérêt, Désir, Action. Structure universelle de la persuasion écrite.",details:"1) Attention : capter l'attention immédiatement avec un titre accrocheur, une statistique choc, une question provocante. 2) Intérêt : maintenir l'intérêt en parlant du problème du lecteur, en racontant une histoire, en donnant des informations utiles. 3) Désir : créer le désir en présentant les bénéfices, les résultats, la transformation que votre produit apporte. Utilisez preuve sociale et garantie. 4) Action : dites exactement quoi faire avec un CTA clair et sans friction ('Cliquez ici', 'Achetez maintenant').",example:"AIDA pour un SaaS : Attention = 'Votre équipe perd 10h/semaine en réunions inutiles' (stat choc). Intérêt = 'Notre outil automatise la planification et le suivi'. Désir = 'Voyez comment l'équipe X a gagné 400h/mois' (témoignage). Action = 'Essayez gratuitement pendant 14 jours'.",related:["copywriting","storytelling","CRO","landing page"]};

BRAIN["storytelling"]={name:"Storytelling (Narration de Marque)",def:"Art de raconter une histoire captivante pour créer une connexion émotionnelle entre la marque et son public.",details:"Le storytelling marketing utilise la structure narrative universelle : héros (le client), guide (la marque), problème, solution, transformation. Les archétypes de Jung aident à définir la personnalité narrative : Héros (Nike, surmonter des défis), Sage (Google, apporter la connaissance), Rebelle (Harley-Davidson, défier les normes), Créateur (Apple, innover). Une bonne histoire est authentique, simple, émotionnelle, et place le client au centre.",example:"TOMS Shoes : 'Pour chaque paire achetée, nous en donnons une à un enfant dans le besoin.' Histoire simple et puissante : le client devient le héros qui aide. 100 millions de paires données.",related:["copywriting","branding","AIDA","naissance entreprise","neuromarketing"]};

BRAIN["neuromarketing"]={name:"Neuromarketing",def:"Application des neurosciences au marketing pour comprendre les mécanismes inconscients qui influencent les décisions d'achat.",details:"Le neuromarketing utilise l'IRM, l'EEG, l'eye-tracking pour mesurer les réactions émotionnelles et cognitives. Principaux biais exploités : ancrage (le premier prix vu sert de référence), rareté ('plus que 2'), preuve sociale ('déjà 5000 clients'), aversion à la perte (on craint plus de perdre que de gagner), réciprocité (offrir pour recevoir). Le cerveau prend 95% des décisions inconsciemment. Le neuromarketing aide à créer des messages, visuels et expériences qui résonnent émotionnellement.",example:"Pricing neuromarketing : afficher le prix barré '~~150€~~' puis '99€' (ancrage + gain perçu). Ajouter 'Plus que 3 exemplaires' (rareté). Ajouter '⭐ 4,8/5 - 2000 avis' (preuve sociale). Ventes x3 par rapport au prix seul.",related:["psychologie acheteur","CRO","copywriting","A/B testing"]};

BRAIN["psychologie acheteur"]={name:"Psychologie de l'Acheteur",def:"Étude des mécanismes mentaux et émotionnels qui influencent les décisions d'achat : biais cognitifs, émotions, motivations.",details:"Principes clés de Cialdini : 1) Réciprocité (donner crée une dette), 2) Rareté (ce qui est rare est désirable), 3) Autorité (les experts inspirent confiance), 4) Cohérence (on veut rester cohérent avec ses engagements passés), 5) Preuve sociale (les autres le font, donc c'est bien), 6) Sympathie (on achète à ceux qu'on aime). Appliquez ces principes dans vos landing pages, emails, et argumentaires de vente.",example:"Page de vente : 'Rejoignez les 5000 entrepreneurs qui ont déjà doublé leur CA' (preuve sociale). 'Offert : audit gratuit de votre site (valeur 300€)' (réciprocité). 'Il ne reste que 47 places sur 50' (rareté). Taux de conversion x2.",related:["neuromarketing","CRO","copywriting","preuve sociale"]};

BRAIN["preuve sociale"]={name:"Preuve Sociale",def:"Mécanisme psychologique où les individus copient les actions des autres pour adopter un comportement. En marketing, c'est montrer que d'autres ont déjà choisi votre produit.",details:"Formes de preuve sociale : témoignages clients, études de cas, logos de clients connus ('ils nous font confiance'), chiffres ('+ de 10 000 clients'), avis et notes (Google, Trustpilot), certifications et récompenses, médias qui ont parlé de vous, nombre d'utilisateurs en direct ('15 personnes regardent ce produit'), réseaux sociaux (followers, likes). La preuve sociale réduit l'anxiété de l'achat et augmente la confiance.",example:"Une landing page affiche : '⭐⭐⭐⭐⭐ 4,8/5 basé sur 1247 avis Google', logos de 6 clients grands comptes, témoignage vidéo d'un client qui dit 'J'ai multiplié mon CA par 3', badge 'Élu meilleur SaaS 2025'.",related:["psychologie acheteur","neuromarketing","CRO","copywriting"]};

BRAIN["rareté"]={name:"Principe de Rareté",def:"Biais psychologique où la valeur perçue d'un produit augmente quand sa disponibilité diminue. La peur de manquer (FOMO) pousse à l'action.",details:"Techniques de rareté : quantité limitée ('plus que 3 exemplaires', 'stock limité'), temps limité ('offre valable 48h', 'compte à rebours'), accès limité ('liste d'attente', 'invitation only'), édition limitée (produit collector). Le principe fonctionne car la rareté signale : valeur + urgence + exclusivité. Attention : la fausse rareté (mensongère) détruit la confiance. Soyez authentique dans vos limitations.",example:"Booking.com utilise la rareté partout : 'Plus que 2 chambres disponibles sur notre site !', '14 personnes regardent cet hôtel', 'Réservé 5 fois dans les dernières 24h'. Ces messages créent une urgence réelle qui accélère la décision.",related:["psychologie acheteur","neuromarketing","CRO","copywriting"]};

BRAIN["reciprocite"]={name:"Principe de Réciprocité",def:"Tendance humaine à vouloir rendre la pareille quand on reçoit quelque chose. Donner d'abord incite l'autre à donner en retour.",details:"En marketing, offrez de la valeur GRATUITE avant de demander un achat : ebook gratuit, consultation offerte, échantillon, essai gratuit, contenu éducatif de qualité, audit gratuit. La réciprocité est plus forte quand le don est : personnalisé, inattendu, de valeur réelle, sans condition apparente. C'est le principe derrière les lead magnets et le content marketing gratuit.",example:"Un consultant offre un audit marketing gratuit de 30 minutes (valeur 300€) sans engagement. Après l'audit, 40% des prospects deviennent des clients. L'audit a créé une dette de réciprocité ET démontré l'expertise.",related:["psychologie acheteur","lead magnet","inbound marketing","content marketing"]};

BRAIN["urgence"]={name:"Sentiment d'Urgence",def:"Technique marketing qui pousse le prospect à agir maintenant plutôt que plus tard, en créant une raison impérieuse de ne pas reporter sa décision.",details:"L'urgence réduit la procrastination, ennemi n°1 des ventes. Techniques : compte à rebours (timer), offre à durée limitée, bonus qui expirent, places limitées, prix qui augmentent bientôt ('early bird'), livraison garantie avant Noël. Combinez urgence + rareté pour un effet maximal. L'urgence doit être réelle, pas factice. Les faux comptes à rebours détruisent la crédibilité.",example:"Lancement d'une formation : 'Early bird : 497€ au lieu de 997€ jusqu'au 15 mars à minuit' + compte à rebours visible + '50 places en early bird, plus que 12 disponibles'. Urgence (date) + rareté (places). Résultat : toutes les places vendues en 48h.",related:["psychologie acheteur","rareté","CRO","copywriting"]};

BRAIN["autorite"]={name:"Principe d'Autorité",def:"Tendance à faire confiance et à suivre les conseils des figures d'autorité ou des experts reconnus. L'expertise inspire confiance.",details:"Comment montrer son autorité en marketing : diplômes et certifications, apparitions médias ('Vu dans Les Échos, BFM'), publications (livres, articles scientifiques), témoignages d'autres experts, chiffres et données exclusifs, prix et récompenses, ancienneté ('Depuis 15 ans'), association à des marques prestigieuses. L'autorité se construit lentement par la preuve constante d'expertise.",example:"Un médecin nutritionniste vend une méthode : affiche son diplôme, 'Vu dans Le Figaro Santé', auteur de 'Le Guide de la Nutrition' (vendu à 50 000 ex), 'Recommandé par le Dr X, cardiologue'. Son autorité rassure et convertit.",related:["psychologie acheteur","preuve sociale","branding","personal branding"]};

BRAIN["coherence"]={name:"Principe de Cohérence (Engagement)",def:"Tendance humaine à vouloir rester cohérent avec ses engagements antérieurs, surtout s'ils sont publics, actifs et volontaires.",details:"En marketing, obtenez un petit 'oui' d'abord (micro-engagement) pour faciliter un 'oui' plus grand ensuite. Technique du pied-dans-la-porte : demander un petit engagement gratuit (inscription newsletter, quiz, téléchargement) avant de demander l'achat. L'engagement doit être actif (l'utilisateur fait quelque chose) et idéalement public (partage, témoignage).",example:"Un site e-commerce propose un quiz 'Quel style déco est fait pour vous ?' (micro-engagement gratuit). Après 5 questions, résultats personnalisés + recommandations produits avec 'Ajouter au panier'. 30% des quizzeurs achètent. Le quiz a créé un engagement actif.",related:["psychologie acheteur","CRO","copywriting","funnel marketing"]};

BRAIN["sympathie"]={name:"Principe de Sympathie",def:"Tendance à acheter plus facilement à des personnes ou marques qu'on apprécie. La sympathie se construit par la similarité, les compliments et la coopération.",details:"Augmentez votre capital sympathie : montrez votre personnalité (humour, authenticité), trouvez des points communs avec votre audience (valeurs, expériences), complimentez sincèrement, coopérez (aidez sans attendre), soyez physiquement attractif (design soigné), associez-vous à des personnes ou causes appréciées. Les gens achètent à ceux qu'ils aiment. Le personal branding et l'authenticité sont des outils de sympathie puissants.",example:"Un entrepreneur partage ses galères sur LinkedIn (authenticité), répond à tous les commentaires (coopération), félicite ses clients (compliments). Sa communauté l'adore. Quand il lance un produit, il vend 100k€ en 24h.",related:["psychologie acheteur","branding","personal branding","storytelling"]};

BRAIN["content marketing"]={name:"Content Marketing (Marketing de Contenu)",def:"Stratégie de création et de diffusion de contenu pertinent et utile pour attirer, engager et fidéliser une audience clairement définie.",details:"Le content marketing repose sur la création de valeur avant la vente. Formats : articles de blog, vidéos, podcasts, infographies, ebooks, webinaires, newsletters, posts réseaux. Piliers : 1) Stratégie éditoriale (thèmes, mots-clés, calendrier), 2) Création de contenu de qualité, 3) Distribution (SEO, réseaux, email), 4) Recyclage (transformer un article en vidéo, en posts, en podcast). Le content marketing génère 3x plus de leads que la pub traditionnelle pour un coût 62% inférieur.",example:"HubSpot : blog marketing + guides gratuits + webinaires + certifications gratuites. Contenu massif et gratuit qui attire des millions de visiteurs. Résultat : leader mondial de l'inbound marketing, CA de 2 milliards $.",related:["SEO","inbound marketing","lead generation","blog","redaction web"]};

BRAIN["lead generation"]={name:"Lead Generation (Génération de Leads)",def:"Processus visant à attirer et convertir des inconnus en prospects ayant manifesté un intérêt pour le produit ou service.",details:"Un lead est un contact qui a donné ses informations (email, téléphone) en échange de quelque chose de valeur (lead magnet). Processus : 1) Attirer via contenu, SEO, pub, réseaux, 2) Offrir un lead magnet irrésistible, 3) Capturer via un formulaire sur une landing page, 4) Qualifier le lead (scoring), 5) Nourrir (nurturing) par email jusqu'à maturité, 6) Passer au commercial. Le coût par lead (CPL) est le KPI principal. Optimisez chaque étape du processus.",example:"Lead magnet : checklist '50 points SEO technique'. Landing page dédiée, formulaire email seul. Trafic via article SEO + LinkedIn. 500 leads/mois, CPL = 4€. 15% deviennent des clients.",related:["lead magnet","lead nurturing","landing page","CRO","funnel marketing"]};

BRAIN["lead magnet"]={name:"Lead Magnet",def:"Contenu gratuit de haute valeur offert en échange des coordonnées d'un prospect (généralement l'email). C'est l'appât qui attire le lead.",details:"Un lead magnet efficace : 1) Résout un problème spécifique immédiat, 2) Apporte une gratification instantanée (consommable en < 5 min), 3) Démontre votre expertise, 4) Est ultra-spécifique (pas 'guide marketing' mais 'checklist 50 points SEO technique 2025'). Formats gagnants : checklist, template, calculatrice, quiz, mini-formation vidéo, étude de cas, swipe file, ebook, webinar, audit gratuit. Le lead magnet est la porte d'entrée de votre funnel.",example:"Une agence SEO propose 'Votre audit SEO gratuit en 30 secondes' : le prospect entre son URL, reçoit un score + 5 recommandations + doit laisser son email pour le rapport complet. Taux de conversion : 45% des visiteurs laissent leur email.",related:["lead generation","landing page","funnel marketing","email marketing"]};

BRAIN["lead nurturing"]={name:"Lead Nurturing",def:"Processus de développement d'une relation avec un prospect au fil du temps, en lui fournissant du contenu pertinent jusqu'à ce qu'il soit prêt à acheter.",details:"Le lead nurturing se fait principalement par email automation. Séquence type : Email 1 (bienvenue + lead magnet livré), Email 2 (valeur ajoutée, article utile), Email 3 (témoignage client, preuve sociale), Email 4 (démonstration, cas d'usage), Email 5 (offre, appel à l'action). Adaptez le contenu selon le comportement (pages visitées, emails ouverts). Le nurturing augmente le taux de conversion de 50% et réduit le cycle de vente.",example:"Séquence nurturing pour un SaaS : Jour 0 : email bienvenue + guide '10 astuces productivité'. Jour 3 : article 'Comment l'équipe X a gagné 10h/semaine'. Jour 7 : invitation démo personnalisée. Jour 14 : offre 'Essai gratuit 30 jours'. Taux d'activation essai : 25%.",related:["lead generation","email marketing","marketing automation","funnel marketing"]};

BRAIN["landing page"]={name:"Landing Page",def:"Page web spécifiquement conçue pour convertir les visiteurs en leads ou clients, avec un objectif unique et un seul appel à l'action.",details:"Une landing page efficace a : 1) Un seul objectif (pas de navigation, pas de liens parasites), 2) Un titre percutant qui promet un bénéfice clair, 3) Un visage humain (photo ou vidéo), 4) Les bénéfices présentés en bullets points, 5) La preuve sociale (témoignages, logos, chiffres), 6) Un formulaire court (3 champs max), 7) Un CTA fort et visible, 8) Une garantie (satisfait ou remboursé). Le ratio visiteur/conversion d'une bonne landing page est de 5 à 15%.",example:"Landing page d'un ebook : pas de menu, titre 'Les 10 secrets du copywriting qui vend', photo de l'ebook en mockup, 5 bullets de bénéfices, formulaire 2 champs (prénom + email), CTA 'Télécharger gratuitement', témoignage d'un lecteur, badge 'Téléchargé 5000 fois'. Taux de conversion 12%.",related:["lead generation","lead magnet","CRO","A/B testing","copywriting"]};

BRAIN["marketing automation"]={name:"Marketing Automation",def:"Utilisation de logiciels pour automatiser des tâches marketing répétitives : emails, scoring, segmentation, campagnes multicanales.",details:"L'automation permet de : envoyer le bon message, à la bonne personne, au bon moment, via le bon canal, de façon automatique. Scénarios types : welcome (après inscription), lead nurturing (série éducative), post-achat (remerciement + cross-sell), réengagement (client inactif), anniversaire (offre spéciale). Outils : HubSpot, ActiveCampaign, Brevo, Mailchimp, Make, Zapier. L'automation fait gagner du temps et augmente les conversions.",example:"Automation e-commerce : 1) Panier abandonné → email 1h après avec photo produit + 'Finalisez votre commande', 2) Email 24h après avec code promo -10%, 3) Email 72h après 'Plus que 2 en stock'. Récupération de 15% des paniers abandonnés.",related:["email marketing","lead nurturing","CRM","lead scoring"]};

BRAIN["lead scoring"]={name:"Lead Scoring",def:"Méthode qui attribue des points aux leads selon leur profil et comportement pour identifier les plus susceptibles d'acheter.",details:"Le scoring combine : données démographiques (poste, secteur, taille entreprise) + comportements (pages visitées, emails ouverts, webinars, téléchargements). Exemple de scoring : +10 pour directeur, +5 pour manager, +20 pour visite page prix, +30 pour demande de démo, -10 pour inactivité > 30 jours. Seuil MQL (Marketing Qualified Lead) : > 50 points → envoi au commercial. Le scoring évite de perdre du temps sur des leads froids.",example:"Scoring B2B SaaS : titre CEO +20, secteur Tech +10, visite page tarifs +30, téléchargement ebook +15, ouverture 3 emails +10. Total 85 → MQL, envoyé au commercial. Taux de conversion MQL→client : 25% vs 5% sans scoring.",related:["marketing automation","lead nurturing","CRM","funnel marketing"]};

BRAIN["CRM"]={name:"CRM (Customer Relationship Management)",def:"Logiciel et stratégie de gestion centralisée de toutes les interactions et données des clients et prospects.",details:"Un CRM centralise : contacts (nom, email, téléphone, entreprise), historique des interactions (emails, appels, rendez-vous), pipeline de vente (étapes, deals), tâches et rappels. Bénéfices : vue client 360°, automatisation des relances, collaboration équipe, reporting (taux de conversion, durée du cycle de vente). CRM populaires : HubSpot (gratuit jusqu'à 1000 contacts), Pipedrive, Salesforce, Zoho CRM, Monday.",example:"Un freelance met en place HubSpot gratuit : il suit chaque prospect de 'Premier contact' à 'Devis envoyé' à 'Client signé'. Automatisation : email de relance 3 jours après devis sans réponse. Résultat : +30% de signatures.",related:["marketing automation","lead scoring","funnel marketing","gestion entreprise"]};

BRAIN["email marketing"]={name:"Email Marketing",def:"Utilisation de l'email pour communiquer avec une audience : newsletters, séquences automatisées, campagnes promotionnelles, emails transactionnels.",details:"L'email est le canal au meilleur ROI (36€ pour 1€ investi en moyenne). Types d'emails : newsletter (contenu régulier), campagne promo (offre ponctuelle), automation (séquence déclenchée), email transactionnel (confirmation commande). KPIs : taux d'ouverture (20-30% bon), taux de clic (2-5% bon), taux de conversion, taux de désabonnement (< 0,5%). Optimisez : objet accrocheur, preview text, personnalisation, segmentation, mobile-first, CTA unique et visible.",example:"Newsletter hebdomadaire : 5000 abonnés, taux d'ouverture 35%, taux de clic 6%. Segmentation : les abonnés ayant cliqué sur un article SEO reçoivent un contenu complémentaire. Personnalisation : prénom dans l'objet. CA généré par newsletter : 2000€/mois.",related:["marketing automation","lead nurturing","newsletter","email design","delivrabilite"]};

BRAIN["newsletter"]={name:"Newsletter",def:"Publication périodique envoyée par email à une liste d'abonnés, contenant du contenu éditorial, des actualités, des conseils ou des offres.",details:"Une newsletter réussie : 1) Promesse éditoriale claire (fréquence, thème, valeur), 2) Ligne éditoriale cohérente, 3) Design épuré et mobile-first, 4) Contenu de qualité (pas que de la promo), 5) Personnalisation, 6) Appel à l'action. Outils : Substack (créateurs), ConvertKit (bloggeurs), Brevo, Mailchimp. La newsletter est un actif stratégique : vous possédez votre liste, contrairement aux followers réseaux.",example:"Un photographe envoie 'L'Œil du Dimanche' chaque dimanche : 1 photo analysée, 1 astuce technique, 1 recommandation matos. Design épuré. 3000 abonnés, taux d'ouverture 48%, taux de clic 12%. Ses formations se remplissent via la newsletter.",related:["email marketing","content marketing","creation newsletter","delivrabilite"]};

BRAIN["delivrabilite"]={name:"Délivrabilité Email",def:"Capacité d'un email à atterrir dans la boîte de réception du destinataire plutôt que dans les spams. C'est le nerf de l'email marketing.",details:"Facteurs de délivrabilité : 1) Authentification (SPF, DKIM, DMARC configurés), 2) Réputation de l'IP/domaine d'envoi, 3) Taux d'engagement (ouvertures, clics, réponses), 4) Taux de plaintes spam (< 0,1%), 5) Taux de rebonds (nettoyez votre liste), 6) Contenu (évitez mots 'spam' : gratuit, argent, urgent, cliquez ici), 7) Volume constant (pas de pics soudains). Utilisez un outil comme MailTester ou GlockApps pour tester.",example:"Un e-commerçant voit son taux d'ouverture chuter de 30% à 8%. Diagnostic : SPF non configuré, liste non nettoyée depuis 1 an (12% de rebonds), mots 'GAGNEZ' dans l'objet. Corrections : SPF/DKIM, nettoyage liste, objets plus neutres. Taux d'ouverture remonte à 28%.",related:["email marketing","newsletter","SPF DKIM DMARC"]};

BRAIN["SPF DKIM DMARC"]={name:"SPF, DKIM, DMARC",def:"Trois protocoles d'authentification email qui prouvent que vos emails sont légitimes et protègent votre domaine contre l'usurpation.",details:"SPF (Sender Policy Framework) : liste les serveurs autorisés à envoyer des emails depuis votre domaine. DKIM (DomainKeys Identified Mail) : signature cryptographique qui prouve que l'email n'a pas été modifié. DMARC (Domain-based Message Authentication) : politique qui dit quoi faire en cas d'échec SPF/DKIM (rien, quarantaine, rejeter). Configurez les 3 impérativement. Vérifiez sur MXToolbox ou DMARC Analyzer.",example:"Domaine monentreprise.com sans SPF/DKIM : emails tombent en spam. Configuration : ajout enregistrement SPF 'v=spf1 include:mailgun.org ~all', clé DKIM dans DNS, DMARC 'p=none' pour monitorer. Score de délivrabilité passe de 5/10 à 9/10.",related:["delivrabilite","email marketing","securite web"]};

BRAIN["personal branding"]={name:"Personal Branding",def:"Stratégie de construction et de gestion de sa marque personnelle pour se différencier professionnellement et attirer des opportunités.",details:"Le personal branding répond à : Qui êtes-vous ? Quelle est votre expertise unique ? Pour qui ? Quelle valeur apportez-vous ? Piliers : 1) Positionnement clair (niche), 2) Visibilité (LinkedIn, Twitter/X, conférences, podcast), 3) Contenu (partagez votre expertise gratuitement), 4) Réseau (construisez des relations authentiques), 5) Réputation (soyez cohérent et éthique). Le personal branding est un investissement long terme : 6-12 mois pour voir des résultats.",example:"Une consultante RH se positionne 'recrutement sans CV'. LinkedIn : 3 posts/semaine, newsletter 5000 abonnés, TEDx local, livre blanc. Résultat : TJM passe de 600€ à 1200€, demandes entrantes x3.",related:["branding","reseaux sociaux","storytelling","networking","employer branding"]};

BRAIN["employer branding"]={name:"Employer Branding (Marque Employeur)",def:"Stratégie visant à construire l'image d'une entreprise en tant qu'employeur attractif pour recruter et fidéliser les talents.",details:"La marque employeur repose sur : la culture d'entreprise, les valeurs, l'expérience collaborateur, les avantages, la réputation sur Glassdoor/LinkedIn, la communication interne et externe. Actions : témoignages employés vidéo, coulisses sur les réseaux, politique RSE, flexibilité, formation continue. Marque employeur forte = 50% de candidatures en plus, 28% de turnover en moins.",example:"Welcome to the Jungle : entreprise qui a construit sa marque employeur comme vitrine. Transparence sur salaires, culture, photos des bureaux. Est devenue LA référence du recrutement en France. CA > 100M€.",related:["personal branding","reseaux sociaux","branding","gestion equipe"]};

BRAIN["networking"]={name:"Networking",def:"Art de créer et d'entretenir un réseau de relations professionnelles mutuellement bénéfiques, en ligne et hors ligne.",details:"Networking efficace : 1) Donnez avant de demander (partagez, recommandez, aidez), 2) Participez à des événements (conférences, meetups, afterworks), 3) Soyez actif sur LinkedIn (commentez, partagez, créez), 4) Organisez des 1-to-1 (café virtuel de 20 min), 5) Rejoignez des communautés et masterminds. Règle d'or : construisez votre réseau AVANT d'en avoir besoin. Le networking est l'investissement le plus rentable pour un entrepreneur.",example:"Un freelance va à 2 meetups/mois, parle à 5 personnes à chaque fois, envoie une invitation LinkedIn personnalisée dans les 24h. Après 12 mois : 200 contacts qualifiés, 15 clients viennent du réseau, 3 partenariats.",related:["personal branding","linkedin","reseaux sociaux","business"]};

BRAIN["gestion equipe"]={name:"Gestion d'Équipe",def:"Ensemble des pratiques pour diriger, motiver, coordonner et développer une équipe vers l'atteinte d'objectifs communs.",details:"Piliers : 1) Recrutement (embaucher pour les soft skills, former pour les hard skills), 2) Objectifs clairs (OKR, SMART), 3) Communication transparente (1:1 hebdomadaires, réunions efficaces), 4) Délégation et confiance, 5) Feedback régulier (reconnaissance + axes d'amélioration), 6) Développement (formation, mentorat), 7) Culture d'équipe (rituels, valeurs). Un bon manager donne la vision, les moyens, et l'autonomie.",example:"Manager équipe marketing de 8 : OKR trimestriels, 1:1 de 30 min/semaine, réunion lundi 30 min (priorités), vendredi 15 min (célébration wins). Productivité +30%, turnover de 25% à 5%.",related:["OKR","leadership","productivite","gestion entreprise"]};

BRAIN["OKR"]={name:"OKR (Objectives and Key Results)",def:"Méthode de fixation d'objectifs popularisée par Google : un objectif ambitieux (O) + 3 à 5 résultats clés mesurables (KR).",details:"L'objectif (O) doit être : inspirant, qualitatif, aligné sur la vision. Ex : 'Devenir la référence du marketing digital en France'. Les Key Results (KR) sont : quantitatifs, mesurables, limités dans le temps. Ex : 'KR1 : Atteindre 100k visiteurs/mois sur le blog', 'KR2 : Lancer 3 formations avec 500 inscrits', 'KR3 : Obtenir un NPS > 50'. Les OKR sont revus chaque trimestre. Note de succès : 70% = excellent. La transparence (OKR visibles par tous) est clé.",example:"OKR trimestriels équipe marketing : O = Devenir leader sur notre marché. KR1 = +40% de trafic organique. KR2 = +25% de leads MQL. KR3 = Réduire le CAC de 15%. KR4 = NPS > 40. Score final : 72% = succès.",related:["gestion equipe","objectifs SMART","KPIs marketing","productivite"]};

BRAIN["productivite"]={name:"Productivité",def:"Capacité à produire un maximum de valeur avec un minimum d'effort et de temps, en utilisant méthodes, outils et bonnes habitudes.",details:"Méthodes : Pomodoro (25 min focus + 5 min pause), Time blocking (bloquer des plages dans l'agenda), Deep work (90 min sans distraction), Getting Things Done (GTD), matrice Eisenhower (urgent/important), loi de Pareto (80/20). Outils : Notion, Todoist, Google Calendar, Slack. Habitudes : routine matinale, sommeil suffisant, sport, méditation, désactiver les notifications, batch processing (traiter les emails 2x/jour, pas en continu).",example:"Un entrepreneur applique : time blocking 8h-11h deep work créatif, 11h-12h réunions, 14h-16h tâches admin, 16h-17h emails. Zéro notification pendant le deep work. Résultat : 2x plus de projets livrés, fin des journées à 18h.",related:["gestion equipe","mindset","gestion entreprise","OKR"]};

BRAIN["mindset"]={name:"Mindset Entrepreneurial",def:"État d'esprit et attitude mentale qui caractérisent les entrepreneurs à succès : résilience, vision, tolérance au risque, apprentissage continu.",details:"Composantes du mindset entrepreneurial : 1) Vision claire (le WHY), 2) Résilience (capacité à rebondir après l'échec), 3) Growth mindset (les compétences se développent, rien n'est fixe), 4) Tolérance à l'incertitude, 5) Discipline et constance, 6) Curiosité et apprentissage continu, 7) Capacité à prendre des décisions avec information incomplète, 8) Gestion du syndrome de l'imposteur (70% des entrepreneurs en souffrent). Le mindset se travaille : lecture, mentorat, méditation, sport.",example:"Un entrepreneur échoue sa première startup (perte 100k€). Au lieu d'abandonner, il fait un post-mortem, suit une formation finance, rejoint un mastermind, lance sa 2e startup. Lève 500k€, rentable en 18 mois. Il attribue 80% du succès au mindset.",related:["productivite","gestion entreprise","personal branding","business plan"]};

BRAIN["gestion entreprise"]={name:"Gestion d'Entreprise",def:"Ensemble des pratiques de direction, d'organisation et de pilotage d'une entreprise pour assurer sa pérennité et sa croissance.",details:"Domaines de la gestion d'entreprise : 1) Stratégie (vision, positionnement), 2) Finance (trésorerie, budget, comptabilité), 3) Marketing et commercial, 4) Ressources humaines, 5) Opérations (processus, logistique), 6) Juridique et administratif. Un chef d'entreprise doit avoir une vision globale et savoir s'entourer de spécialistes. Le pilotage se fait via un tableau de bord avec 5-7 KPIs clés : CA, marge, trésorerie, CAC, satisfaction client.",example:"PME de 15 salariés : dirigeant suit CA mensuel, marge brute, trésorerie disponible, taux de projets signés. Tableau de bord simple mis à jour chaque semaine. Détecte une baisse de trésorerie 3 mois à l'avance et ajuste les dépenses.",related:["business plan","gestion financiere","gestion equipe","modele economique"]};

BRAIN["business plan"]={name:"Business Plan",def:"Document stratégique qui décrit un projet d'entreprise : vision, étude de marché, modèle économique, prévisions financières et plan d'action.",details:"Structure type : 1) Executive summary (2 pages max, percutant), 2) Présentation de l'équipe, 3) Étude de marché (taille, tendances, personas, concurrence, SWOT), 4) Stratégie marketing et commerciale, 5) Business model (sources de revenus, structure de coûts), 6) Plan opérationnel (processus, jalons), 7) Prévisions financières sur 3 ans (CA, charges, résultat, plan de trésorerie, point mort), 8) Besoins de financement. Un bon business plan raconte une histoire convaincante, est chiffré et réaliste.",example:"Startup drones agricoles : executive summary 'Marché 2Md€, solution unique', étude terrain 6 mois, CA prévisionnel 500k€ année 1, point mort à 18 mois, besoin 200k€ pour R&D et certification. Banque prête 150k€.",related:["modele economique","levee de fonds","gestion financiere","strategie marketing efficace"]};

BRAIN["modele economique"]={name:"Modèle Économique (Business Model)",def:"Mécanisme par lequel une entreprise crée, délivre et capture de la valeur. Le 'comment on gagne de l'argent' de façon durable.",details:"Le Business Model Canvas (Osterwalder) décrit 9 blocs : 1) Segments clients, 2) Proposition de valeur, 3) Canaux, 4) Relation client, 5) Sources de revenus, 6) Ressources clés, 7) Activités clés, 8) Partenaires clés, 9) Structure de coûts. Types de modèles : vente directe, abonnement (récurrent), freemium, commission (place de marché), publicité, licensing, franchise. Les modèles hybrides sont de plus en plus courants.",example:"App fitness : freemium (10 exercices gratuits) → abonnement 9,99€/mois (programmes complets) → coaching 49€/mois. Freemium attire 100k utilisateurs, 5% convertissent premium, 1% coaching. CA mensuel 99k€. Modèle scalable et prévisible.",related:["business plan","levee de fonds","tarification","gestion financiere"]};

BRAIN["levee de fonds"]={name:"Levée de Fonds",def:"Processus de recherche et d'obtention de capitaux auprès d'investisseurs pour financer la croissance d'une entreprise.",details:"Étapes : 1) Préparation (business plan, valorisation, pitch deck 10-15 slides), 2) Identification des investisseurs (love money, business angels, VC, crowdfunding, banques, subventions), 3) Roadshow (présentations), 4) Négociation (valorisation pre/post-money, dilution, clauses), 5) Term sheet et closing juridique. Tours : Seed (0,5-2M€), Série A (2-10M€), Série B (10-50M€). Préparez-vous à recevoir 90% de 'non'. Un VC investit dans 1% des dossiers vus.",example:"Fintech : pitch deck 15 slides, traction 20k utilisateurs, MRR 50k€. Demande 5M€ en Série A pour valorisation 20M€ (dilution 20%). 30 rendez-vous, 3 term sheets, levée réussie avec fonds leader + 2 co-investisseurs.",related:["business plan","modele economique","gestion financiere","pitch deck"]};

BRAIN["pitch deck"]={name:"Pitch Deck",def:"Présentation de 10 à 15 slides utilisée pour convaincre des investisseurs de financer votre projet. C'est votre carte de visite pour lever des fonds.",details:"Slides type d'un pitch deck : 1) Titre (nom + accroche), 2) Problème (le problème que vous résolvez), 3) Solution (votre produit/service), 4) Marché (taille, croissance), 5) Pourquoi maintenant (timing), 6) Produit (démo, capture d'écran), 7) Traction (métriques, croissance), 8) Business model (comment vous gagnez de l'argent), 9) Concurrence (matrice concurrentielle), 10) Équipe (pertinence), 11) Finances (prévisions), 12) Demande (combien, valorisation, usage des fonds). Racontez une histoire, soyez visuel, répétez 50 fois.",example:"Airbnb pitch deck original (2008) : 10 slides, simple, visuel. Slide clé 'Market Size' : 2 milliards de nuits réservées/an, slide 'Solution' : 'Book rooms with locals, not hotels'. A levé 600k$ en seed.",related:["levee de fonds","business plan","storytelling","modele economique"]};

BRAIN["tarification"]={name:"Tarification (Pricing)",def:"Stratégie de fixation des prix d'un produit ou service pour maximiser le revenu tout en restant compétitif et aligné avec la valeur perçue.",details:"3 approches : 1) Coût + marge (simple mais ignore la valeur), 2) Basée sur la concurrence (alignement, premium, low-cost), 3) Basée sur la valeur (ce que le client est prêt à payer, idéal). Stratégies : pénétration (prix bas pour parts de marché), écrémage (prix haut puis baisse), freemium, abonnement, prix psychologique (9,99€), prix d'ancrage (barré), bundle, yield management (dynamique). Testez vos prix : A/B testing, Van Westendorp, étude de disposition à payer.",example:"SaaS : coût de revient 8€/utilisateur. Prix basé valeur : gain de temps 5h/mois valorisé 250€. Tarifs : Starter 29€, Pro 79€, Enterprise 199€. Le prix est ancré sur la valeur, pas le coût. CA x3 en 12 mois.",related:["modele economique","gestion financiere","negociation","positionnement de marque"]};

BRAIN["gestion financiere"]={name:"Gestion Financière",def:"Pilotage des finances d'une entreprise : trésorerie, budget, comptabilité, analyse financière, optimisation fiscale.",details:"Piliers : 1) Comptabilité (revenus, dépenses, factures, séparation compte pro/perso), 2) Trésorerie (plan de trésorerie 12 mois, réserve de sécurité 3-6 mois), 3) Budget (prévisionnel vs réel, analyse des écarts), 4) Indicateurs (CA, marge brute, EBITDA, résultat net, point mort, BFR), 5) Fiscalité (choix de structure, TVA, IS, cotisations, optimisation légale). Le cash est ROI : une entreprise rentable peut mourir d'un manque de trésorerie.",example:"Freelance marketing suit mensuellement : tableau de bord CA, charges, marge nette, trésorerie. Détecte 40% CA d'un seul client (risque), constitue réserve 6 mois, passe en SASU à 70k€ CA pour optimisation.",related:["business plan","modele economique","tarification","budget marketing"]};

BRAIN["budget marketing"]={name:"Budget Marketing",def:"Montant alloué aux actions marketing sur une période. Définit les ressources disponibles et leur allocation entre les différents canaux.",details:"Comment définir son budget : 1) Pourcentage du CA (5-15% pour une entreprise établie, 20-50% pour une startup en croissance), 2) Basé sur les objectifs (coût pour atteindre X leads), 3) Alignement concurrentiel (ce que dépensent les concurrents). Répartition conseillée : 40% contenu/SEO, 25% pub payante, 20% réseaux/community, 10% événements, 5% tests. Suivez le ROI de chaque canal et réallouez vers les plus performants.",example:"Startup CA 500k€ alloue 20% = 100k€ budget marketing annuel. Répartition : SEO/content 40k€, SEA 25k€, social ads 20k€, événements 10k€, tests 5k€. Revue trimestrielle : le SEO a le meilleur ROI, budget augmenté à 50k€.",related:["ROI marketing","KPIs marketing","gestion financiere","strategie marketing efficace"]};

BRAIN["negociation"]={name:"Négociation",def:"Processus de communication entre deux parties visant à trouver un accord mutuellement acceptable malgré des intérêts divergents.",details:"Méthode Harvard : 1) Séparer les personnes du problème, 2) Se concentrer sur les intérêts (pas les positions), 3) Générer des options créatives, 4) Utiliser des critères objectifs. Techniques : BATNA (meilleure alternative en cas d'échec), ancrage (faire la première offre), silence, reformulation, concessions conditionnelles ('si... alors...'). Préparez toujours : votre BATNA, votre point de réservation, la ZOPA (zone d'accord possible).",example:"Freelance négocie TJM : BATNA = autre client 500€/jour, point réservation = 550€, 1ère offre = 700€. Client propose 500€. Réponse : 'Pour 650€, j'inclus 1 jour de formation de votre équipe'. Client accepte. Gagnant-gagnant.",related:["tarification","gestion financiere","gestion equipe","service client"]};

BRAIN["service client"]={name:"Service Client",def:"Ensemble des actions visant à assister, satisfaire et fidéliser les clients avant, pendant et après l'achat.",details:"Canaux : téléphone, email, chat en direct, chatbots, réseaux sociaux (social care), FAQ. Qualités : réactivité (1ère réponse < 1h idéal), empathie, résolution au 1er contact (FCR), personnalisation, proactivité. Outils : Zendesk, Intercom, Freshdesk, Crisp. Métriques : CSAT, NPS, CES, taux de résolution, temps moyen de traitement. Le service client est un avantage concurrentiel : un client bien traité devient ambassadeur. Un client mécontent en parle à 10 personnes.",example:"Zappos : service client légendaire, appels de 10h si besoin, retours gratuits 365 jours, agents sans script. NPS > 75. Rachat par Amazon 1,2Md$. Preuve que l'excellence du service client est rentable.",related:["satisfaction client","NPS","CES","fidelisation"]};
