<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Coach - IA Marketing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
#coach-container{position:fixed;bottom:20px;right:20px;z-index:9999;font-family:'Segoe UI',system-ui,sans-serif}
#coach-btn{width:65px;height:65px;border-radius:50%;background:linear-gradient(135deg,#1a3a5c,#132b44);border:none;color:white;font-size:30px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.4);transition:transform 0.2s;display:flex;align-items:center;justify-content:center}
#coach-btn:hover{transform:scale(1.1)}
#coach-chat{display:none;position:fixed;bottom:95px;right:20px;width:380px;height:550px;background:white;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.3);flex-direction:column;overflow:hidden;max-width:90vw}
#coach-chat.open{display:flex}
.coach-header{background:linear-gradient(135deg,#1a3a5c,#132b44);color:white;padding:15px 20px;font-weight:700;font-size:18px;display:flex;align-items:center;gap:8px}
.coach-header button{background:none;border:none;color:white;font-size:20px;cursor:pointer;margin-left:auto}
.coach-messages{flex:1;overflow-y:auto;padding:15px;background:#fafbfc}
.coach-messages::-webkit-scrollbar{width:4px}
.coach-messages::-webkit-scrollbar-thumb{background:#ccd7e4;border-radius:10px}
.coach-input-area{display:flex;padding:10px;border-top:1px solid #eee;background:white}
.coach-input-area input{flex:1;padding:12px;border:1px solid #ddd;border-radius:25px;outline:none;font-size:14px;font-family:inherit}
.coach-input-area input:focus{border-color:#1a3a5c}
.coach-input-area button{width:45px;height:45px;border-radius:50%;background:linear-gradient(135deg,#1a3a5c,#132b44);border:none;color:white;font-size:18px;margin-left:8px;cursor:pointer;flex-shrink:0}
.coach-msg{padding:10px 15px;border-radius:18px;margin:8px 0;max-width:85%;word-break:break-word;font-size:14px;line-height:1.5;animation:fadeIn 0.3s}
.coach-msg.user{background:#1a3a5c;color:white;margin-left:auto;border-bottom-right-radius:6px}
.coach-msg.bot{background:#f0f2f5;color:#333;border-bottom-left-radius:6px}
.coach-msg.bot .details{font-size:13px;color:#555;margin-top:6px}
.coach-msg.bot .example{background:#e8f0f8;padding:8px 12px;border-radius:10px;margin-top:6px;font-size:13px;border-left:3px solid #1a3a5c}
.coach-msg.bot .ex-title{font-weight:700;color:#1a3a5c;font-size:12px}
.coach-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.coach-suggestions button{padding:6px 12px;border-radius:15px;border:1px solid #1a3a5c;background:white;color:#1a3a5c;font-size:11px;cursor:pointer;transition:all 0.2s;font-family:inherit}
.coach-suggestions button:hover{background:#1a3a5c;color:white}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="coach-container">
  <button id="coach-btn" onclick="openCoach()">💬</button>
  <div id="coach-chat">
    <div class="coach-header">
      🧠 Le Coach
      <button onclick="closeCoach()">✕</button>
    </div>
    <div class="coach-messages" id="coachMessages">
      <div class="coach-msg bot">👋 Bonjour ! Je suis <b>Le Coach</b>, votre expert marketing. Posez votre question !</div>
    </div>
    <div class="coach-input-area">
      <input id="coachInput" placeholder="Votre question..." onkeypress="if(event.key==='Enter')sendCoach()">
      <button onclick="sendCoach()">➤</button>
    </div>
  </div>
</div>

<script>
(function(){
var BRAIN={
"strategie marketing efficace":{name:"Stratégie Marketing Efficace",def:"Une stratégie marketing est une feuille de route qui définit comment atteindre vos objectifs business.",details:"Elle repose sur 5 piliers : analyse du marché, objectifs SMART, choix des canaux, création de contenu, mesure des résultats. Commencez par un diagnostic SWOT et définissez vos personas.",example:"Marque cosmétiques : cible femmes 25-40 ans, canaux Instagram + email, objectif +30% ventes en 6 mois, budget 5000€/mois.",related:["plan marketing","objectifs SMART","analyse SWOT","persona marketing"]},
"plan marketing":{name:"Plan Marketing",def:"Document stratégique détaillant les actions marketing sur une période donnée.",details:"Un plan inclut : analyse de situation, objectifs, stratégie, budget, calendrier, KPIs. Il doit être révisé chaque trimestre.",example:"Plan trimestriel : mois 1 SEO + blog, mois 2 social media, mois 3 email. Budget 15k€, objectif 500 leads.",related:["strategie marketing efficace","budget marketing","KPIs marketing"]},
"objectifs SMART":{name:"Objectifs SMART",def:"Méthode pour définir des objectifs : Spécifique, Mesurable, Atteignable, Réaliste, Temporellement défini.",details:"Spécifique = précis. Mesurable = chiffré. Atteignable = possible. Réaliste = aligné stratégie. Temporel = avec date limite.",example:"Objectif SMART : Augmenter le trafic organique de 40% en 6 mois en publiant 2 articles SEO par semaine.",related:["strategie marketing efficace","plan marketing","KPIs marketing"]},
"analyse SWOT":{name:"Analyse SWOT",def:"Outil identifiant Forces, Faiblesses (internes), Opportunités et Menaces (externes).",details:"Forces : vos avantages. Faiblesses : vos lacunes. Opportunités : tendances marché. Menaces : concurrents, régulations.",example:"Startup SaaS : Forces = équipe tech experte. Faiblesses = budget limité. Opportunités = marché +25%/an. Menaces = GAFAM.",related:["strategie marketing efficace","benchmark concurrentiel"]},
"persona marketing":{name:"Persona Marketing",def:"Représentation semi-fictive de votre client idéal basée sur des données réelles.",details:"Inclut : démographie, psychographie, comportements, objectifs, freins. Créez 3-5 personas max.",example:"'Sophie, 34 ans, Paris, responsable marketing. Utilise Instagram et LinkedIn. Frein : manque de temps. Objectif : devenir directrice.'",related:["strategie marketing efficace","parcours client"]},
"SEO":{name:"SEO (Référencement Naturel)",def:"Optimisation pour apparaître dans les résultats naturels de Google.",details:"3 piliers : technique (vitesse, mobile), contenu (mots-clés, qualité), netlinking (backlinks). Résultats en 3-6 mois.",example:"Blog e-commerce optimise fiches produits + mots-clés longue traîne + backlinks. +40% trafic organique en 6 mois.",related:["SEA","SEO technique","content marketing"]},
"SEA":{name:"SEA (Publicité Payante)",def:"Publicité sur Google Ads : enchères sur mots-clés pour apparaître en haut des résultats.",details:"Modèle CPC. Quality Score détermine le coût. Résultats immédiats mais budget nécessaire.",example:"Agence voyage : campagne 'vol Paris Tokyo', CPC 0,80€, ROAS 5.",related:["SEO","Google Ads","CPC"]},
"CPC":{name:"CPC (Coût Par Clic)",def:"Montant payé par clic sur une annonce.",details:"CPC = dépenses / clics. Varie selon concurrence et Quality Score. B2C : 0,50-2€. B2B : 3-20€.",example:"Budget 300€, 600 clics. CPC = 0,50€. 60 ventes = coût par conversion 5€.",related:["SEA","ROAS","Google Ads"]},
"ROAS":{name:"ROAS (Return On Ad Spend)",def:"Retour sur investissement publicitaire : CA généré / coût pub.",details:"ROAS de 4 = 1€ investi génère 4€ de CA. E-commerce vise 3-5, SaaS 5-10.",example:"Campagne Facebook : coût 1000€, CA 4000€. ROAS = 4.",related:["SEA","ROI marketing","CPC"]},
"ROI marketing":{name:"ROI Marketing",def:"Retour sur investissement : profit net / coût marketing.",details:"ROI = (Profit - Investissement) / Investissement x 100. Inclure TOUS les coûts.",example:"Email : coût 300€, CA 1500€, marge 750€. ROI = (750-300)/300 x 100 = 150%.",related:["ROAS","KPIs marketing"]},
"branding":{name:"Branding",def:"Construction de l'image de marque : logo, valeurs, ton de voix, identité visuelle.",details:"Une marque forte se différencie, justifie un prix premium et fidélise. Cohérence sur tous les points de contact.",example:"Apple : simplicité, innovation, design premium. Marque valorisée 500+ milliards $.",related:["identite visuelle","charte graphique","storytelling"]},
"copywriting":{name:"Copywriting",def:"Rédaction persuasive pour pousser à l'action : acheter, s'inscrire, cliquer.",details:"Structure AIDA : Attention, Intérêt, Désir, Action. Utilisez verbes d'action et preuves sociales.",example:"Page vente : 'Décrochez un job à 2500€/mois en 3 mois'. Témoignages + garantie. CTA 'Inscrivez-vous'.",related:["AIDA","storytelling","CRO"]},
"AIDA":{name:"Méthode AIDA",def:"Modèle copywriting : Attention, Intérêt, Désir, Action.",details:"1) Capter l'attention (titre choc). 2) Maintenir l'intérêt (problème). 3) Créer le désir (bénéfices). 4) Appeler à l'action (CTA).",example:"SaaS : 'Votre équipe perd 10h/semaine' (Attention). 'Notre outil automatise' (Intérêt). 'L'équipe X a gagné 400h' (Désir). 'Essayez gratuitement' (Action).",related:["copywriting","CRO","landing page"]},
"storytelling":{name:"Storytelling",def:"Art de raconter une histoire pour créer une connexion émotionnelle avec la marque.",details:"Structure : héros (le client), guide (la marque), problème, solution, transformation.",example:"TOMS Shoes : 'Pour chaque paire achetée, nous en donnons une à un enfant'. 100 millions de paires données.",related:["branding","copywriting","AIDA"]},
"growth hacking":{name:"Growth Hacking",def:"Techniques créatives et low-cost pour une croissance rapide.",details:"Framework AARRR : Acquisition, Activation, Rétention, Revenu, Référence. Tester en continu.",example:"Dropbox : parrainage 'Invitez un ami, gagnez 500 Mo'. 3900% de croissance en 15 mois.",related:["AARRR","product-led growth","CRO"]},
"AARRR":{name:"Framework AARRR",def:"Métriques de croissance : Acquisition, Activation, Rétention, Revenu, Référence.",details:"Acquisition : d'où viennent les utilisateurs ? Activation : bonne 1ère expérience ? Rétention : reviennent-ils ? Revenu : monétisation ? Référence : recommandent-ils ?",example:"App : 10k installs/mois, 40% activés, 25% retenus à J30, ARPU 5€, 15% viennent du parrainage.",related:["growth hacking","product-led growth"]},
"product-led growth":{name:"Product-Led Growth (PLG)",def:"Le produit est le moteur d'acquisition via freemium ou essai gratuit.",details:"Onboarding rapide, boucles virales, monétisation à l'usage. Ex : Slack, Dropbox, Figma, Calendly.",example:"Calendly : lien réservation gratuit → le destinataire découvre Calendly → s'inscrit. Boucle virale.",related:["growth hacking","AARRR"]},
"CRO":{name:"CRO (Optimisation du Taux de Conversion)",def:"Augmenter le % de visiteurs qui accomplissent une action souhaitée.",details:"Processus : Analyser → Hypothèses → A/B testing → Implémenter → Recommencer.",example:"E-commerce teste bouton 'Acheter' vs 'Ajouter au panier - Livraison gratuite'. Version B +18% conversions.",related:["A/B testing","funnel marketing","landing page"]},
"A/B testing":{name:"A/B Testing",def:"Comparer 2 versions pour déterminer laquelle performe le mieux.",details:"Trafic divisé aléatoirement. Mesure statistiquement significative. Testez titres, CTA, visuels.",example:"CTA 'Télécharger' (4,2% CTR) vs 'Télécharger votre guide gratuit' (6,8% CTR). Version B déployée.",related:["CRO","landing page","analytics"]},
"content marketing":{name:"Content Marketing",def:"Créer du contenu utile pour attirer et fidéliser une audience.",details:"Formats : blog, vidéos, podcasts, ebooks, réseaux. Attire, convertit, fidélise. Coût 62% < pub.",example:"HubSpot : blog + guides + webinars + certifications gratuites. Leader inbound, CA 2Md$.",related:["SEO","inbound marketing","blog"]},
"inbound marketing":{name:"Inbound Marketing",def:"Attirer naturellement via contenu utile plutôt que d'interrompre avec de la pub.",details:"Méthodologie : Attirer (SEO, réseaux), Convertir (lead magnets), Conclure (email), Fidéliser.",example:"Agence web : blog SEO + audit gratuit + emails nurturing + appel découverte. CPL 30€ vs 150€ en pub.",related:["content marketing","SEO","lead generation"]},
"email marketing":{name:"Email Marketing",def:"Communication par email : newsletters, séquences automatisées, campagnes promo.",details:"ROI moyen : 36€ pour 1€ investi. KPIs : taux ouverture 20-30%, taux clic 2-5%.",example:"Newsletter 5000 abonnés, taux ouverture 35%, taux clic 6%. CA 2000€/mois via newsletter.",related:["newsletter","marketing automation","lead nurturing"]},
"business plan":{name:"Business Plan",def:"Document décrivant un projet : vision, marché, business model, finances.",details:"Sections : executive summary, équipe, marché, stratégie, business model, finances, besoins.",example:"Startup drones : marché 2Md€, CA prévisionnel 500k€ an 1, besoin 200k€. Banque prête 150k€.",related:["modele economique","levee de fonds","gestion financiere"]},
"modele economique":{name:"Modèle Économique",def:"Comment l'entreprise crée, délivre et capture de la valeur.",details:"Business Model Canvas : 9 blocs (clients, valeur, canaux, revenus, coûts...). Types : vente directe, abonnement, freemium, commission.",example:"App fitness : freemium → premium 9,99€/mois → coaching 49€/mois. 100k utilisateurs, CA 99k€/mois.",related:["business plan","tarification","levee de fonds"]},
"videographie":{name:"Vidéographie",def:"Art de capturer des images en mouvement : caméra, lumière, son, narration visuelle.",details:"Équipement : hybride, objectif polyvalent, trépied, stabilisateur, micro externe, éclairage. Son = 50% de la vidéo.",example:"Témoignage client : trépied, micro-cravate, softbox, règle des tiers. Rendu pro avec 1500€ d'équipement.",related:["cinematographie","mouvements camera","montage video"]},
"photographie":{name:"Photographie",def:"Art de capturer des images fixes : exposition, composition, lumière.",details:"Triangle d'exposition : ouverture (f/), vitesse (s), ISO. RAW pour retouche, JPEG pour partage.",example:"Portrait pro : f/2.8, 1/125s, ISO 100, règle des trois tiers.",related:["exposition","eclairage","regle des trois tiers"]},
"gestion equipe":{name:"Gestion d'Équipe",def:"Diriger, motiver et développer une équipe vers des objectifs communs.",details:"Piliers : recrutement, objectifs clairs (OKR), communication transparente, délégation, feedback, développement.",example:"Manager marketing : OKR trimestriels, 1:1 hebdo, réunion lundi 30 min. Productivité +30%, turnover 5%.",related:["OKR","productivite","gestion entreprise"]},
"productivite":{name:"Productivité",def:"Produire un maximum de valeur avec un minimum d'effort et de temps.",details:"Méthodes : Pomodoro, time blocking, deep work, GTD, matrice Eisenhower, loi de Pareto (80/20).",example:"Time blocking 8h-11h deep work, 11h-12h réunions, 14h-16h tâches, 16h-17h emails. 2x plus de projets livrés.",related:["gestion equipe","OKR"]},
"marketing digital":{name:"Marketing Digital",def:"Ensemble des actions marketing utilisant les canaux numériques.",details:"Piliers : acquisition (SEO, SEA, social), conversion (UX, copywriting), fidélisation (email, CRM), analyse (KPIs).",example:"Startup : blog SEO + Instagram + Google Ads + email nurturing. Suivi GA4, ROAS 4,5.",related:["SEO","SEA","reseaux sociaux","email marketing"]},
"reseaux sociaux":{name:"Réseaux Sociaux",def:"Présence sur les plateformes sociales pour générer notoriété, trafic et leads.",details:"Contenu adapté à chaque plateforme, community management, social ads, influence.",example:"Marque cosmétiques : Instagram Reels + TikTok + influenceurs. 100k followers en 6 mois.",related:["Instagram","TikTok","LinkedIn","social media ads"]},
"LinkedIn":{name:"LinkedIn Marketing",def:"Réseau B2B pour personal branding, contenu, social selling et recrutement.",details:"Formats : posts texte, carrousels PDF, vidéos, newsletters. Algorithme favorise conversations.",example:"Consultant : 3 posts/semaine, carrousels, commentaires. 15k followers, 5 leads/semaine.",related:["reseaux sociaux","personal branding","social selling"]},
"personal branding":{name:"Personal Branding",def:"Construire sa marque personnelle pour se différencier professionnellement.",details:"Positionnement clair, visibilité (LinkedIn, conférences), contenu d'expertise, réseau, réputation.",example:"Consultante RH : LinkedIn + newsletter + TEDx + livre blanc. TJM passe de 600€ à 1200€.",related:["LinkedIn","branding","networking"]},
"networking":{name:"Networking",def:"Créer et entretenir un réseau de relations professionnelles mutuellement bénéfiques.",details:"Donnez avant de demander. Événements, LinkedIn, 1-to-1, communautés. Construisez AVANT d'avoir besoin.",example:"Freelance : 2 meetups/mois, 5 contacts/event, suivi LinkedIn. 15 clients viennent du réseau en 12 mois.",related:["LinkedIn","personal branding"]},
"eclairage":{name:"Éclairage (Technique 3 Points)",def:"Lumière clé (key), remplissage (fill) et contre-jour (back) pour modeler le sujet.",details:"Key light 45°, fill light opposé (ratio 2:1), back light derrière. High-key (peu d'ombres) ou low-key (dramatique).",example:"Interview YouTube : softbox droite, réflecteur gauche, LED derrière. Sujet bien modelé.",related:["videographie","cinematographie","photographie"]},
"montage video":{name:"Montage Vidéo",def:"Assemblage des plans pour créer un récit : coupes, rythme, son, étalonnage.",details:"Workflow : dérushage, assemblage, rythme, transitions, son, étalonnage, export. Outils : DaVinci, CapCut, Premiere.",example:"Vidéo marketing 60s : 50 cuts, musique dynamique, J-cuts, textes animés. Export 1080p 30fps.",related:["videographie","etalonnage","videos courtes"]},
"etalonnage":{name:"Étalonnage (Color Grading)",def:"Correction et stylisation des couleurs pour une ambiance visuelle cohérente.",details:"Correction (expo, balance blancs) puis grading (style, LUTs, ambiance). Outil : DaVinci Resolve.",example:"Vidéo café : correction neutre, grading warm (LUT chaud), ombres marron, lumières dorées.",related:["montage video","balance des blancs"]},
"videos courtes":{name:"Vidéos Courtes",def:"Vidéos 15-90s verticales pour TikTok, Reels, Shorts.",details:"Format 9:16. Hook en 0,5s. Rythme rapide (cut 2-3s). Son tendance. Sous-titres obligatoires.",example:"Boulangerie : hook 'Secret du croissant parfait'. Cuts rapides, texte. 500k vues.",related:["reseaux sociaux","montage video","TikTok"]},
"ecommerce":{name:"E-commerce",def:"Vente de produits en ligne via site ou app.",details:"Types : B2C, B2B, D2C, marketplace. KPIs : CA, panier moyen, taux conversion, CAC, ROAS.",example:"Marque bijoux Shopify : panier 65€, conversion 2,5%, CAC 18€, ROAS 4,5. CA 50k€/mois.",related:["Shopify","D2C","CRO"]},
"Shopify":{name:"Shopify",def:"Plateforme e-commerce SaaS leader pour créer une boutique en ligne.",details:"Hébergement, paiement, app store, thèmes. Forfaits 27-289€/mois. Simple et fiable.",example:"Créateur bijoux : Shopify 36€/mois, thème Dawn, apps Klaviyo + Loox. CA 5000€/mois.",related:["ecommerce","WooCommerce","D2C"]},
"RGPD":{name:"RGPD",def:"Règlement européen sur la protection des données personnelles.",details:"Consentement explicite, droit d'accès/effacement, finalité définie, sécurité. Amendes jusqu'à 4% CA.",example:"Newsletter : double opt-in, case non pré-cochée, lien désabonnement. Conforme RGPD.",related:["cookies","opt-in","ethique marketing"]},
"salutation":{name:"Salutations",def:"Le Coach vous répond chaleureusement.",details:"Dites bonjour, salut, hello...",example:"👋 Bonjour ! Je suis Le Coach. Comment puis-je vous aider ?",related:[]},
"remerciement":{name:"Remerciements",def:"Le Coach répond aux mercis.",details:"Avec plaisir, à votre service !",example:"🌟 Avec plaisir ! N'hésitez pas pour toute autre question.",related:[]}
};

function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function normalize(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim()}

var FAUTES={"marketing":["marketting","marketin","markting","mkt","mkg"],"digital":["dijital","digial"],"strategie":["strateji","strat"],"entreprise":["entrepise","antreprise"],"referencement":["referencement","ref"],"branding":["brandin"],"copywriting":["copywritting"],"analytics":["analitics"],"conversion":["converssion","konversion"],"budget":["budjet","bugdet","bujet"],"client":["clien","cilent","cleint"],"produit":["produi","produitt"],"service":["servise"],"qualite":["qualite"],"prix":["pri","pris"],"deja":["deja"],"tres":["tres"],"apres":["apres"],"etre":["etre"],"faire":["faore","faier"],"vendre":["vand"],"probleme":["pb"],"candidat":["cdt"],"beaucoup":["bcp"],"pourquoi":["pk","pq"],"comment":["coment","commant"],"business":["bizness","biz"]};

function correctFautes(t){var w=t.split(' ');for(var i=0;i<w.length;i++){for(var c in FAUTES){if(FAUTES[c].indexOf(w[i])>=0)w[i]=c}}return w.join(' ')}

function findAnswer(q){
var o=correctFautes(q);var n=normalize(o);var words=n.split(/\s+/).filter(function(w){return w.length>1});
if(words.length===0)return null;
var best=null;var bestScore=0;
for(var k in BRAIN){
var nk=normalize(k);var kw=nk.split(/\s+/);var score=0;
for(var i=0;i<words.length;i++){for(var j=0;j<kw.length;j++){if(kw[j].length>1&&words[i].indexOf(kw[j])>=0)score+=3;else if(words[i].length>2&&kw[j].indexOf(words[i])>=0)score+=2}}
if(score>bestScore){bestScore=score;best=k}
}
if(best&&bestScore>=1)return BRAIN[best];
for(var k in BRAIN){var nk=normalize(k);for(var i=0;i<words.length;i++){if(words[i].length>=4&&nk.indexOf(words[i])>=0)return BRAIN[k]}}
return null;
}

window.openCoach=function(){document.getElementById('coach-chat').classList.add('open')};
window.closeCoach=function(){document.getElementById('coach-chat').classList.remove('open')};
window.sendCoach=function(){
var inp=document.getElementById('coachInput');var q=inp.value.trim();if(!q)return;
var msgDiv=document.createElement('div');msgDiv.className='coach-msg user';msgDiv.textContent=q;
document.getElementById('coachMessages').appendChild(msgDiv);
inp.value='';
var r=findAnswer(q);
var botDiv=document.createElement('div');botDiv.className='coach-msg bot';
if(r){
var h='<b>📘 '+esc(r.name)+'</b><br><br>'+esc(r.def)+'<br><br><div class="details"><b>📝 Détails :</b> '+esc(r.details)+'</div><div class="example"><span class="ex-title">💡 Exemple :</span><br>'+esc(r.example)+'</div>';
if(r.related&&r.related.length>0){h+='<div class="coach-suggestions">';for(var i=0;i<Math.min(r.related.length,6);i++){h+='<button onclick="window.sendRelated(\''+esc(r.related[i])+'\')">'+esc(r.related[i])+'</button>'}h+='</div>'}
botDiv.innerHTML=h;
}else{
var sugg=['marketing digital','SEO','SEA','reseaux sociaux','branding','copywriting','business plan','videographie','photographie'];
var h='🤔 Je n\'ai pas trouvé pour "<b>'+esc(q)+'</b>".<br><br>💡 Essayez :<div class="coach-suggestions">';
for(var i=0;i<sugg.length;i++){h+='<button onclick="window.sendRelated(\''+esc(sugg[i])+'\')">'+esc(sugg[i])+'</button>'}h+='</div>';
botDiv.innerHTML=h;
}
setTimeout(function(){document.getElementById('coachMessages').appendChild(botDiv);document.getElementById('coachMessages').scrollTop=document.getElementById('coachMessages').scrollHeight},400);
};
window.sendRelated=function(t){document.getElementById('coachInput').value=t;window.sendCoach()};
})();
</script>
</body>
</html>
