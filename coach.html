BRAIN["fidelisation"]={name:"Fidélisation Client",def:"Ensemble des stratégies visant à conserver les clients existants, augmenter leur fréquence d'achat et leur valeur vie (LTV).",details:"Pourquoi fidéliser : acquérir un nouveau client coûte 5x plus cher que fidéliser. +5% de rétention = +25 à 95% de profits. Stratégies : programme de fidélité (points, cashback, paliers), parrainage, offres exclusives clients, contenu post-achat, service client exceptionnel, personalisation, communauté, surprise et enchantement. Mesurez : taux de rétention, churn, LTV, NPS, taux de réachat.",example:"Amazon Prime : abonnement 69€/an = livraison gratuite + Prime Video + Prime Music. Les membres Prime dépensent 2x plus que les non-membres et restent fidèles. Plus de 200 millions de membres dans le monde.",related:["LTV","churn","service client","parrainage","CRM"]};

BRAIN["parrainage"]={name:"Programme de Parrainage",def:"Système qui récompense les clients existants pour avoir recommandé votre produit ou service à de nouveaux clients.",details:"Un bon programme de parrainage : 1) Récompense attrayante des 2 côtés (parrain et filleul), 2) Simple à utiliser (lien unique, code promo), 3) Visible (rappel dans l'app, email, page dédiée), 4) Moment opportun (après un achat réussi, quand le NPS est élevé). Récompenses : réduction, mois gratuit, cash, points, accès exclusif. Le parrainage est le canal d'acquisition le plus rentable (CAC quasi nul) et amène les meilleurs clients.",example:"Dropbox : 'Invitez un ami, gagnez 500 Mo tous les deux'. Programme viral intégré au produit. Résultat : 3900% de croissance en 15 mois, 35% des inscriptions viennent du parrainage.",related:["fidelisation","growth hacking","viral marketing","CAC"]};

BRAIN["SEO technique"]={name:"SEO Technique",def:"Optimisation de l'infrastructure technique d'un site pour faciliter son crawl, son indexation et sa compréhension par les moteurs de recherche.",details:"Piliers du SEO technique : 1) Crawl (robots.txt, sitemap XML, erreurs 404, redirections 301), 2) Indexation (balises meta robots, canonical, duplicate content), 3) Vitesse (Core Web Vitals : LCP < 2,5s, FID < 100ms, CLS < 0,1), 4) Architecture (HTTPS, structure en silos, maillage interne, profondeur de clic < 3), 5) Données structurées (Schema.org). Outils : Google Search Console, Screaming Frog, PageSpeed Insights, Sitebulb.",example:"E-commerce : mise en place données structurées Product (prix + avis) → rich snippets +25% CTR. Compression images WebP → LCP de 4,2s à 1,8s. Correction canonicals → indexation propre. Trafic organique +40% en 4 mois.",related:["SEO","Core Web Vitals","donnees structurees","optimisation mobile"]};

BRAIN["Core Web Vitals"]={name:"Core Web Vitals",def:"Ensemble de 3 métriques Google mesurant l'expérience utilisateur d'une page : vitesse de chargement (LCP), interactivité (FID) et stabilité visuelle (CLS).",details:"LCP (Largest Contentful Paint) : temps d'affichage du plus grand élément visible. Cible < 2,5 secondes. FID (First Input Delay) : délai de réponse au premier clic. Cible < 100 ms. CLS (Cumulative Layout Shift) : stabilité visuelle (les éléments ne doivent pas bouger). Cible < 0,1. Ces métriques influencent le classement Google. Améliorez LCP (CDN, images WebP, cache), FID (réduire JavaScript), CLS (réserver l'espace pour les images, polices, pubs).",example:"Site blog : LCP 4,5s (trop lent) → optimisation images + CDN → LCP 1,9s. FID 200ms → minification JS → 80ms. CLS 0,25 → réservation d'espace pour bannière pub → 0,05. Core Web Vitals validés, position moyenne +8 places.",related:["SEO technique","optimisation mobile","PageSpeed Insights","SEO"]};

BRAIN["donnees structurees"]={name:"Données Structurées (Schema.org)",def:"Code ajouté au HTML d'un site pour aider les moteurs de recherche à comprendre le contenu et afficher des rich snippets (étoiles, prix, FAQ).",details:"Schema.org est le vocabulaire standard. Types courants : Organization, LocalBusiness, Product (prix, disponibilité, avis), Article, FAQ, HowTo, Recipe, Event, Review, BreadcrumbList. Format : JSON-LD (recommandé par Google), Microdata ou RDFa. Testez avec l'outil de test des données structurées de Google. Les rich snippets augmentent le CTR de 5 à 30% selon le type.",example:"Fiche produit e-commerce avec Schema Product : prix, disponibilité 'InStock', note 4.5/5 avec 230 avis. Rich snippet dans Google : prix visible + étoiles + 'En stock'. CTR +30% par rapport aux résultats sans rich snippets.",related:["SEO technique","SEO","rich snippets","search console"]};

BRAIN["optimisation mobile"]={name:"Optimisation Mobile",def:"Conception et amélioration de l'expérience utilisateur sur smartphones et tablettes, essentielle depuis le mobile-first indexing de Google.",details:"Google indexe la version mobile en priorité. Optimisations : responsive design (flexbox, grid, unités relatives vw/vh), vitesse mobile (compresser, lazy load, AMP si pertinent), UX mobile (menus adaptés, boutons > 48x48px, formulaires simplifiés, input types natifs, pas de popups intrusifs), lisibilité (16px minimum, contraste suffisant). Testez avec Mobile-Friendly Test, PageSpeed Insights mobile, BrowserStack.",example:"Restaurant : site desktop-only, 12s de chargement mobile. Refonte responsive, menu hamburger, bouton clic-to-call, carte Google Maps, images compressées. Chargement 2,3s. Réservations depuis mobile x3.",related:["SEO technique","Core Web Vitals","UX design","responsive design"]};

BRAIN["responsive design"]={name:"Responsive Design",def:"Approche de conception web qui permet à un site de s'adapter automatiquement à toutes les tailles d'écran : desktop, tablette, mobile.",details:"Techniques : grilles fluides (%, vw/vh), images flexibles (max-width:100%), media queries CSS (@media screen and max-width:768px), approche mobile-first (on designe d'abord pour mobile puis on ajoute pour desktop). Frameworks : Bootstrap, Tailwind. Un site responsive est indispensable depuis le mobile-first indexing de Google. Testez sur plusieurs appareils réels (pas que simulateurs).",example:"Site portfolio : mobile-first, menu hamburger, images en grille flexible (1 colonne mobile, 2 colonnes tablette, 3 colonnes desktop). Media queries : @media min-width 768px et min-width 1024px. Fonctionne sur tous les écrans.",related:["optimisation mobile","UX design","SEO technique","mobile-first"]};

BRAIN["UX design"]={name:"UX Design (User Experience Design)",def:"Conception de l'expérience utilisateur : processus visant à créer des produits (sites, apps) utiles, utilisables et agréables.",details:"L'UX design englobe : recherche utilisateur (interviews, personas, tests), architecture de l'information (navigation, arborescence), design d'interaction (wireframes, prototypes), tests utilisateurs. Principes : simplicité, cohérence, feedback immédiat, prévention des erreurs, contrôle utilisateur. Un bon UX réduit le taux de rebond, augmente les conversions et la satisfaction. L'UX n'est pas l'UI (interface visuelle), c'est la stratégie sous-jacente.",example:"Refonte UX d'un checkout e-commerce : de 5 étapes à 3, guest checkout possible, validation en temps réel des champs, barre de progression. Taux d'abandon passe de 60% à 35%, conversion +40%.",related:["CRO","responsive design","optimisation mobile","UI design"]};

BRAIN["UI design"]={name:"UI Design (User Interface Design)",def:"Conception de l'interface visuelle : mise en forme graphique des éléments interactifs d'un produit digital (boutons, menus, formulaires, icônes).",details:"L'UI design s'occupe de : l'apparence, la disposition, la hiérarchie visuelle, les couleurs, la typographie, les icônes, les animations, l'accessibilité visuelle. Principes : clarté (l'utilisateur comprend immédiatement), cohérence (mêmes styles partout), feedback visuel (hover, clic, chargement), hiérarchie (taille, couleur, position). Outils : Figma, Sketch, Adobe XD. L'UI est la couche visible de l'UX.",example:"Refonte UI d'une app : palette de couleurs réduite (3 couleurs + gris), boutons CTA orange vif (seule touche de couleur vive), typo Inter, espacement aéré, icônes simples. Tests : taux de clic sur CTA +25%, temps de complétion des tâches -30%.",related:["UX design","design graphique","CRO","branding"]};

BRAIN["design graphique"]={name:"Design Graphique",def:"Création visuelle pour communiquer des messages : identité de marque, supports marketing, UI, packaging, print, motion design.",details:"Fondamentaux : couleur (roue chromatique, harmonies, psychologie), typographie (serif vs sans-serif, hiérarchie, lisibilité), composition (règle des tiers, grille, espace blanc, équilibre), principes Gestalt (proximité, similarité, continuité). Logiciels : Adobe Suite (Photoshop, Illustrator, InDesign), Figma (UI/UX), Canva (débutant), Affinity. Le design graphique est partout : logo, carte de visite, flyer, bannière pub, post réseaux, présentation, site web.",example:"Identité visuelle startup fintech : logo géométrique bleu/violet, typo Inter, palette 5 couleurs, 20 templates Canva pour réseaux, kit média investisseur, landing page Figma. Cohérence totale rassure utilisateurs et investisseurs.",related:["UI design","branding","identite visuelle","charte graphique"]};

BRAIN["videographie"]={name:"Vidéographie",def:"Art et technique de capturer des images en mouvement : maîtrise de la caméra, du cadre, de la lumière, du son et de la narration visuelle.",details:"Équipement de base vidéaste : appareil hybride/reflex, objectif polyvalent (24-70mm f/2.8), trépied, stabilisateur (gimbal), micro externe (cravate ou shotgun), éclairage (softbox ou LED). Principes : règle des 180°, échelle des plans, règle des trois tiers, balance des blancs. Le son est 50% de la vidéo. Formats : 16:9 horizontal (YouTube), 9:16 vertical (Reels/TikTok), 1:1 carré. Résolution : 1080p minimum, 4K recommandé pour recadrer.",example:"Témoignage client : caméra sur trépied, micro-cravate, éclairage softbox 3 points, fond flouté (f/2.8), cadre règle des tiers. Plan interview + cutaways produit + logo en fin. Rendu professionnel avec équipement amateur (1500€).",related:["cinematographie","mouvements camera","montage video","videos courtes"]};

BRAIN["cinematographie"]={name:"Cinématographie",def:"L'art visuel de raconter une histoire par la caméra : lumière, cadre, mouvement, couleur, composition. La 'photographie en mouvement'.",details:"La cinématographie crée l'émotion visuelle : éclairage dramatique (clair-obscur, high-key, low-key), profondeur de champ, mouvements de caméra, ralenti, time-lapse, color grading. Elle transforme un simple produit en expérience. Le directeur photo (DP) choisit caméra, optiques, éclairage, cadre. La cinématographie marketing vend un style de vie, pas juste un produit.",example:"Pub Burger : éclairage warm (doré), ralenti 60fps, travelling avant lent, profondeur de champ courte (f/1.4). Fromage qui coule, viande qui grésille. Le spectateur salive. C'est la cinématographie qui crée le désir.",related:["videographie","mouvements camera","eclairage","etalonnage"]};

BRAIN["mouvements camera"]={name:"Mouvements de Caméra",def:"Techniques de déplacement de la caméra pendant la prise de vue pour dynamiser le récit et guider le regard du spectateur.",details:"Mouvements de base : panoramique (horizontal, pivot), tilt (vertical, pivot), travelling (avant, arrière, latéral, caméra qui se déplace), zoom (optique, ne déplace pas la caméra), dolly zoom (effet Vertigo), steadycam (caméra portée stabilisée), drone (prises de vue aériennes). Chaque mouvement a un sens : travelling avant = intimité, travelling arrière = éloignement, panoramique = révélation, dolly zoom = désorientation.",example:"Vidéo d'entreprise : travelling avant lent vers le fondateur (intimité grandissante), puis travelling latéral pour révéler l'équipe (inclusion), drone au-dessus des bureaux (échelle, modernité).",related:["videographie","cinematographie","travelling","zoom"]};

BRAIN["travelling"]={name:"Travelling",def:"Déplacement physique de la caméra pendant la prise de vue. Avant (vers le sujet), arrière, latéral (parallèle), ou circulaire.",details:"Travelling avant : augmente l'intensité, crée de l'intimité, focalise l'attention. Travelling arrière : conclusion, solitude, révèle le contexte. Travelling latéral : suit l'action, dynamique. Matériel : slider, rails, gimbal, steadicam, drone, chariot. Le travelling est plus immersif que le zoom (qui est optique, sans déplacement). Combinez travelling + zoom = dolly zoom (effet Vertigo de Hitchcock).",example:"Présentation restaurant : travelling avant lent vers le plat signature (désir), travelling latéral montrant la salle pleine (preuve sociale), travelling arrière révélant le chef en cuisine (authenticité).",related:["mouvements camera","cinematographie","zoom","videographie"]};

BRAIN["zoom"]={name:"Zoom (Optique vs Numérique)",def:"Effet modifiant la distance focale pour rapprocher ou éloigner le sujet sans déplacer la caméra. Optique (qualité) vs numérique (dégradé).",details:"Zoom avant (in) : isole un sujet, concentre l'attention, crée de la tension. Zoom arrière (out) : révèle le contexte, peut créer un effet de solitude. Crash zoom : zoom brutal pour l'effet comique ou dramatique. Dolly zoom (Vertigo) : travelling + zoom combinés, déformation de la perspective (fond qui s'éloigne ou se rapproche). Privilégiez le zoom optique (objectif) au zoom numérique (perte de qualité).",example:"Démo application mobile : zoom avant lent sur l'écran du téléphone (focus), puis zoom arrière révélant l'utilisateur souriant dans un café (contexte, lifestyle).",related:["mouvements camera","travelling","cinematographie"]};

BRAIN["plongee contre plongee"]={name:"Plongée & Contre-Plongée",def:"Plongée : caméra au-dessus du sujet, qui le rapetisse. Contre-plongée : caméra en dessous, qui le grandit, le rend imposant.",details:"Plongée (high angle) : donne un sentiment de vulnérabilité, faiblesse, soumission, solitude, écrasement. Contre-plongée (low angle) : puissance, domination, héroïsme, importance, autorité. En marketing : contre-plongée pour le fondateur/CEO (leader visionnaire), plongée pour montrer la fragilité avant d'introduire la solution (puis contre-plongée après).",example:"Interview client : avant d'utiliser le produit, plan en légère plongée (problème, vulnérabilité). Après utilisation, plan en contre-plongée (succès, puissance retrouvée). Le cadrage raconte l'histoire.",related:["mouvements camera","cinematographie","echelle des plans"]};

BRAIN["champ contrechamp"]={name:"Champ / Contrechamp",def:"Technique de montage alternant deux plans qui se font face, typique des dialogues. Respecte la règle des 180 degrés.",details:"Le champ montre le premier personnage (souvent vu de 3/4), le contrechamp montre le second, comme si la caméra traversait une ligne imaginaire. Utilisé pour : interviews, dialogues, témoignages clients, face caméra + réaction. La règle des 180° : la caméra doit rester du même côté de l'axe entre les deux personnes pour maintenir la continuité spatiale.",example:"Témoignage client : champ = client qui parle face caméra. Contrechamp = réaction de l'intervieweur (hors champ), ou plan du produit, ou plan du logo en fin. Montage alterné crée du rythme.",related:["regle des 180 degres","montage video","videographie"]};

BRAIN["regle des 180 degres"]={name:"Règle des 180 Degrés",def:"Principe fondamental du cadrage : la caméra doit rester d'un seul côté d'une ligne imaginaire entre deux sujets pour éviter de désorienter le spectateur.",details:"Tracez une ligne imaginaire entre deux personnes qui se parlent. Placez toutes les caméras du même côté de cette ligne. Si vous franchissez la ligne (saut de ligne), le personnage A apparaît soudainement à droite au lieu de gauche, et le spectateur est désorienté. La règle peut être transgressée volontairement pour un effet de confusion. Le champ/contrechamp respecte cette règle.",example:"Interview : interviewer à gauche, client à droite. Caméra 1 (champ client) à droite de la ligne. Caméra 2 (contrechamp interviewer) aussi à droite. Le client regarde vers la gauche dans les deux plans, cohérence spatiale parfaite.",related:["champ contrechamp","mouvements camera","videographie"]};

BRAIN["echelle des plans"]={name:"Échelle des Plans",def:"Classification des cadres selon la distance au sujet : du très gros plan (détail) au plan d'ensemble (contexte).",details:"Du plus serré au plus large : Très gros plan (détail : œil, main, produit), Gros plan (visage, émotion), Plan rapproché taille/poitrine (interview), Plan américain (mi-cuisse), Plan moyen (corps entier), Plan d'ensemble (personne dans le décor), Plan large/général (paysage). Chaque plan a une fonction narrative : gros plan = émotion, plan large = contexte, solitude.",example:"Vidéo marque horlogerie : Très gros plan aiguilles et engrenages (savoir-faire, détail). Gros plan visage artisan (fierté, authenticité). Plan d'ensemble atelier (contexte, tradition). Alternance crée storytelling.",related:["videographie","cinematographie","regle des trois tiers"]};

BRAIN["regle des trois tiers"]={name:"Règle des Trois Tiers",def:"Principe de composition qui divise le cadre en 9 zones égales (grille 3x3). Les points forts sont aux intersections des lignes.",details:"Placez le sujet principal sur un point fort (intersection) plutôt qu'au centre pour un cadrage plus dynamique et équilibré. Laissez de l'espace dans la direction du regard ou du mouvement (espace négatif). La ligne d'horizon se place sur la ligne du tiers supérieur (paysage) ou inférieur (ciel dramatique). Activez la grille 3x3 sur votre appareil/écran. Cette règle vient de la photographie et s'applique aussi en vidéo.",example:"Interview : yeux du sujet alignés sur la ligne horizontale supérieure, sujet décalé sur le tiers gauche, regard vers la droite (espace vide à droite). Fond flou. Composition professionnelle et agréable.",related:["echelle des plans","photographie","videographie","composition"]};

BRAIN["eclairage"]={name:"Éclairage (Technique 3 Points)",def:"Technique fondamentale d'éclairage utilisant 3 sources : lumière clé (key), remplissage (fill) et contre-jour (back) pour donner du volume.",details:"1) Key light : source principale, placée à 45° du sujet, crée ombres et modelé. 2) Fill light : lumière douce à l'opposé, réduit les ombres sans les supprimer (ratio 2:1 ou 3:1). 3) Back light : derrière le sujet, détache le sujet du fond (hair light, rim light). Adaptations : high-key (peu d'ombres, pub cosmétique), low-key (ombres marquées, dramatique). Température de couleur : 3200K (tungstène, chaude), 5600K (lumière jour, neutre).",example:"Interview YouTube : Key light softbox 45° droite, Fill réflecteur gauche (ratio 2:1), Back light LED derrière et au-dessus. Fond éclairé séparément. Sujet bien modelé, professionnel.",related:["videographie","cinematographie","balance des blancs","photo"]};

BRAIN["balance des blancs"]={name:"Balance des Blancs (White Balance)",def:"Réglage de l'appareil pour que les blancs soient neutres, sans dominante de couleur. Mesurée en Kelvin (K).",details:"Températures : 3200K = tungstène (ampoules, orangé), 4000K = fluorescent, 5600K = lumière du jour, 6500K+ = ombre/ciel couvert (bleuté). Réglez la balance des blancs avant de filmer pour éviter les dominantes désagréables. Utilisez une carte grise 18% ou un expodisc pour un réglage précis. En photo RAW, vous pouvez ajuster en post-production. En vidéo, corrigez à la prise de vue (plus difficile à rattraper).",example:"Tournage cuisine : éclairage tungstène (3200K, ambiance chaude et appétissante). Balance des blancs réglée sur 3200K → rendu chaud voulu. Si réglée sur 5600K → rendu orange excessif non voulu.",related:["eclairage","videographie","etalonnage","photographie"]};

BRAIN["etalonnage"]={name:"Étalonnage (Color Grading)",def:"Processus de correction et stylisation des couleurs en post-production pour créer une ambiance visuelle cohérente et professionnelle.",details:"Deux étapes : 1) Correction colorimétrique : normaliser l'exposition, le contraste, la balance des blancs entre tous les plans. 2) Color grading : appliquer un style visuel (LUTs, teintes, saturation sélective) pour créer une ambiance. Outils : DaVinci Resolve (gratuit et pro), Adobe Premiere Pro (Lumetri), Final Cut Pro. Le grading donne l'identité visuelle de votre marque en vidéo.",example:"Vidéo marque café : correction (balance des blancs neutre, contraste). Grading : LUT warm, ombres légèrement marron, hautes lumières dorées, saturation réduite sur les verts. Ambiance chaleureuse et premium.",related:["balance des blancs","cinematographie","montage video"]};

BRAIN["montage video"]={name:"Montage Vidéo",def:"Processus d'assemblage des plans tournés pour créer un récit cohérent : coupes, transitions, rythme, son, musique, étalonnage.",details:"Workflow : 1) Dérushage (visionner et sélectionner les meilleurs plans), 2) Assemblage (mise en ordre sur la timeline), 3) Rythme (coupes, durées), 4) Transitions (cut, fondu, J-cut, L-cut), 5) Son (mixage voix, musique, ambiances), 6) Étalonnage, 7) Export. Logiciels : DaVinci Resolve (gratuit pro), CapCut (débutant, gratuit), Adobe Premiere Pro (pro payant), Final Cut Pro (Mac). Le rythme est clé : coupez toutes les 3-5 secondes pour du marketing.",example:"Vidéo marketing 60s : rythme rapide (50 cuts en 60s), musique dynamique, J-cuts sur témoignage (voix avant image), textes animés, CTA final. Montage sur CapCut, export 1080p 30fps.",related:["videographie","etalonnage","transitions","videos courtes"]};

BRAIN["transitions"]={name:"Transitions Vidéo",def:"Effets visuels entre deux plans pour assurer la continuité ou marquer une rupture temporelle ou narrative.",details:"Types : CUT (coupe franche, la plus utilisée, 95% des transitions), FONDU (au noir : fin de chapitre, au blanc : rêve/flashback, enchaîné : passage du temps), WIPE (balayage), J-CUT (le son du plan suivant commence avant l'image), L-CUT (le son du plan précédent continue sur l'image suivante). Les J-cut et L-cut rendent le montage fluide et professionnel. Évitez les transitions trop voyantes (type Powerpoint).",example:"Interview : J-cut = on entend la voix du client avant de voir son visage (intrigue). Puis CUT sur le client qui parle. Puis L-cut = sa voix continue sur des images de son entreprise. Montage fluide.",related:["montage video","videographie","videos courtes"]};

BRAIN["videos courtes"]={name:"Vidéos Courtes (Reels, Shorts, TikTok)",def:"Vidéos verticales de 15 à 90 secondes, optimisées pour les plateformes sociales : TikTok, Instagram Reels, YouTube Shorts.",details:"Format 9:16 vertical. Règle d'or : capter l'attention en 0,5 seconde (hook visuel ou texte à l'écran). Rythme rapide : cut toutes les 2-3 secondes. Son crucial : utiliser les sons tendance ou voice over. Formats gagnants : tutoriel rapide, avant/après, behind the scenes, storytelling 3 actes, reply to comment, greenscreen, transition créative. Outils : CapCut (roi du montage mobile), InShot, Canva. Sous-titres obligatoires (90% regardent sans le son).",example:"Boulangerie : hook 'Le secret du croissant parfait ?' (0,5s), cuts rapides mains qui travaillent, four, croissant qui croustille, texte '3 jours de travail'. 500k vues, +30% clients boutique.",related:["reseaux sociaux","montage video","TikTok","Instagram"]};

BRAIN["TikTok"]={name:"TikTok Marketing",def:"Utilisation de la plateforme TikTok à des fins marketing : contenu organique, TikTok Ads, collaborations influenceurs, tendances.",details:"TikTok est la plateforme la plus engageante (temps moyen 95 min/jour). Algorithme basé sur l'intérêt, pas les followers = tout le monde peut devenir viral. Stratégie : 1) Créer du contenu natif (authentique, pas poli), 2) Suivre les tendances (sons, hashtags, challenges), 3) Utiliser les effets et transitions, 4) Poster 1-3x/jour, 5) Engager avec les commentaires. TikTok Ads : In-Feed Ads, TopView, Branded Hashtag Challenge, Spark Ads. Cible : 60% des utilisateurs ont 16-24 ans.",example:"Marque de mode : posts 2x/jour, mélange tendances + coulisses + tutoriels style. Un Reel 'Comment porter une robe 3 façons' fait 2M vues, +50k followers. Puis Spark Ads sur ce post : ROAS de 8.",related:["videos courtes","reseaux sociaux","Instagram","social media ads"]};

BRAIN["Instagram"]={name:"Instagram Marketing",def:"Stratégie de présence et de promotion sur Instagram : feed, Stories, Reels, shopping, publicités.",details:"Piliers Instagram : 1) Feed (visuels soignés, cohérence esthétique, carrousels éducatifs), 2) Stories (éphémère, interactif : sondages, questions, liens), 3) Reels (reach organique, viralité), 4) Shopping (boutique intégrée, tags produits), 5) Ads (Stories Ads, Reels Ads, Feed Ads, ciblage précis). Algorithme favorise : Reels, engagement rapide, contenu original, interactions par DM. Fréquence : 3-5 posts feed/semaine, 1-2 Reels/jour, stories quotidiennes.",example:"Marque cosmétiques : feed esthétique rose/beige, Reels tutoriels 3x/semaine, Stories quotidiennes avec sondages, shopping tags sur tous les posts. +100k followers en 6 mois, 20% ventes via Instagram.",related:["reseaux sociaux","Reels","videos courtes","social media ads"]};

BRAIN["LinkedIn"]={name:"LinkedIn Marketing",def:"Stratégie marketing sur LinkedIn : personal branding, contenu B2B, publicité, social selling, recrutement.",details:"LinkedIn est le réseau B2B par excellence (900M+ membres). Formats : posts texte, carrousels PDF, vidéos, articles, newsletters, LinkedIn Live. Algorithme favorise : contenu qui génère des conversations, publications régulières, formats natifs (pas de liens externes dans le post). LinkedIn Ads : Sponsored Content, Message Ads, Dynamic Ads, ciblage précis par poste, secteur, ancienneté. Le social selling (vente par la relation) est la stratégie gagnante sur LinkedIn.",example:"Consultant B2B : 3 posts/semaine (études de cas, analyses, opinions), 1 carrousel/semaine, commentaires sur posts influenceurs. 15k followers en 1 an, 5 leads qualifiés/semaine, 0€ de pub.",related:["reseaux sociaux","personal branding","social selling","B2B"]};

BRAIN["social selling"]={name:"Social Selling",def:"Utilisation des réseaux sociaux (principalement LinkedIn) pour prospecter et vendre en construisant des relations plutôt qu'en démarchant.",details:"Le social selling remplace le cold calling. Processus : 1) Construire son personal branding (profil optimisé, contenu d'expertise), 2) Identifier les décideurs cibles, 3) Engager via commentaires et messages personnalisés (pas de pitch direct), 4) Apporter de la valeur gratuite (articles, conseils), 5) Créer une relation de confiance, 6) Proposer un appel/démo quand le timing est bon. Le Social Selling Index (SSI) LinkedIn mesure votre performance. Un SSI élevé = +45% d'opportunités.",example:"Commercial SaaS : profil LinkedIn optimisé, posts d'expertise 2x/semaine, commente les posts des CTO cibles. Après 3 semaines d'interactions, message personnalisé : 'J'ai vu votre article sur X, j'ai écrit un complément'. Taux de réponse 40%, 10 rendez-vous/mois.",related:["LinkedIn","personal branding","reseaux sociaux","prospection"]};

BRAIN["social media ads"]={name:"Social Media Ads",def:"Publicité payante sur les plateformes sociales : Facebook Ads, Instagram Ads, LinkedIn Ads, TikTok Ads, Pinterest Ads.",details:"Avantages : ciblage ultra-précis (démographie, centres d'intérêt, comportements, audiences similaires), formats visuels engageants, coût maîtrisable, retargeting. Facebook/Instagram Ads Manager : structure campagne > ensemble de pubs > annonces. Objectifs : notoriété, considération (trafic, engagement, leads), conversion (ventes). Ciblages : lookalike (1-10%), audiences personnalisées (retargeting, liste clients), centres d'intérêt. Test A/B créatifs essentiel.",example:"Marque thé bio : campagne Instagram, objectif conversion, audience lookalike 3% clients, format Reel 15s, 50€/jour. 2 semaines de test : CTR 3,2%, CPA 12€, ROAS 5. Scaling à 200€/jour.",related:["SEA","reseaux sociaux","retargeting","Facebook Ads"]};

BRAIN["Facebook Ads"]={name:"Facebook Ads",def:"Plateforme publicitaire de Meta (Facebook + Instagram + Messenger + Audience Network) pour créer et diffuser des campagnes payantes.",details:"Meta Ads Manager structure : Campagne (objectif) → Ensemble de pubs (ciblage, budget, enchère) → Annonces (créatifs). Objectifs : Notoriété, Trafic, Engagement, Leads, Ventes. Ciblages clés : audiences personnalisées (visiteurs site, clients, liste email), audiences similaires (lookalike 1-10%), centres d'intérêt, comportements, données démographiques. Pixel Meta : code à installer sur votre site pour tracker conversions et faire retargeting. Test A/B systématique sur créatifs et audiences.",example:"E-commerce : campagne conversion catalogue produits, audience lookalike 5% acheteurs, budget 100€/jour, enchère CPC. Créatifs carrousel produits. Après optimisation : ROAS 6, CAC 15€, scaling progressif à 500€/jour.",related:["social media ads","retargeting","pixel Meta","Instagram"]};

BRAIN["retargeting"]={name:"Retargeting (Remarketing)",def:"Technique publicitaire qui cible les personnes ayant déjà interagi avec votre marque (visite site, vidéo vue, panier abandonné).",details:"Le retargeting fonctionne via un pixel/cookie placé sur votre site. Quand un visiteur part sans acheter, il voit vos pubs sur Facebook, Google Display, YouTube. Types : site (visiteurs de pages spécifiques), vidéo (personnes ayant vu X% d'une vidéo), email (clients inactifs), panier abandonné. Le retargeting a un ROAS 2 à 5x supérieur au ciblage froid. Ne pas harceler : limitez la fréquence (3-5 impressions/jour max).",example:"E-commerce : pixel sur toutes les pages. Segment 'visiteurs page produit sans achat'. Retargeting Facebook + Google Display : pub dynamique montrant le produit vu + promo -10%. CPA retargeting 8€ vs 25€ froid. ROAS 12.",related:["social media ads","Facebook Ads","SEA","CRO"]};

BRAIN["pixel Meta"]={name:"Pixel Meta (Facebook Pixel)",def:"Code JavaScript à installer sur son site pour suivre les actions des visiteurs, mesurer les conversions et créer des audiences de retargeting.",details:"Le pixel Meta track : PageView, ViewContent, AddToCart, Purchase, Lead, CompleteRegistration. Installation : copier le code dans le <head> du site, ou via Google Tag Manager. Événements standard (prédéfinis) ou personnalisés. Vérifiez avec Meta Pixel Helper (extension Chrome). Le pixel est essentiel pour : mesurer les conversions pub, optimiser les campagnes pour les conversions, créer des audiences personnalisées, faire du retargeting, alimenter les lookalikes.",example:"E-commerce : pixel installé, événements trackés : ViewContent (page produit), AddToCart, Purchase (valeur CA). Audience personnalisée 'Acheteurs 30 jours' pour exclure des pubs. Lookalike 3% pour acquisition. Suivi ROAS précis.",related:["Facebook Ads","retargeting","social media ads","analytics"]};

BRAIN["Google Ads"]={name:"Google Ads",def:"Plateforme publicitaire de Google : annonces sur le moteur de recherche, le réseau Display, YouTube, Shopping, Gmail, Discovery.",details:"Types de campagnes : Search (annonces texte sur Google), Display (bannières visuelles sur sites partenaires), Shopping (fiches produits avec image, prix), Video (YouTube), Performance Max (multi-canaux automatisé), Discovery (Gmail, YouTube, Discover). Structure : Compte > Campagne > Groupe d'annonces > Annonces + Mots-clés. Enchères : CPC manuel, CPC optimisé, Target CPA, Target ROAS, Maximiser les conversions. Quality Score (1-10) influence classement et coût.",example:"Agence voyage : campagne Search 'vol Paris Tokyo', enchère Target CPA 30€, annonces responsive avec extensions prix/lieu. CPC moyen 0,80€, CTR 8%, ROAS 5. Budget 1000€/mois.",related:["SEA","Performance Max","YouTube Ads","Google Shopping"]};

BRAIN["Performance Max"]={name:"Performance Max (Google Ads)",def:"Type de campagne Google Ads automatisée qui diffuse sur tous les canaux Google (Search, Display, YouTube, Shopping, Discovery, Gmail) depuis une seule campagne.",details:"Performance Max utilise le machine learning pour optimiser la diffusion. Vous fournissez : objectif de conversion, budget, assets créatifs (textes, images, vidéos), flux produit (si e-commerce), audiences. L'algorithme teste toutes les combinaisons et diffuse là où la performance est la meilleure. Avantages : simple à configurer, couvre tous les canaux. Inconvénient : moins de contrôle manuel, boîte noire. Idéal pour e-commerce avec flux produit.",example:"E-commerce mode : campagne Performance Max, flux produit 5000 SKU, objectif ROAS 400%, budget 200€/jour. Google diffuse automatiquement sur Search, Shopping, Display, YouTube. ROAS atteint 520%, scaling à 500€/jour.",related:["Google Ads","SEA","Google Shopping","Smart Bidding"]};

BRAIN["Google Shopping"]={name:"Google Shopping",def:"Format d'annonces Google affichant photo, prix, nom du produit et avis directement dans les résultats de recherche et l'onglet Shopping.",details:"Google Shopping fonctionne via Google Merchant Center (flux produit) + Google Ads (campagne Shopping). Flux produit : fichier contenant tous vos produits (titre, description, prix, image, disponibilité, EAN/GTIN). Optimisation du flux : titres avec mots-clés, images de qualité fond blanc, prix compétitifs, attributs complets. Deux types : Shopping standard (plus de contrôle) et Performance Max (automatisé). Idéal pour e-commerce.",example:"E-commerce chaussures : flux Merchant Center 2000 produits, titres optimisés 'Nike Air Max 90 - Baskets Homme - Blanc/Rouge', images fond blanc. Campagne Shopping standard, ROAS 8. Optimisation continue des titres.",related:["Google Ads","Performance Max","SEA","ecommerce"]};

BRAIN["YouTube Ads"]={name:"YouTube Ads",def:"Publicité vidéo sur YouTube : annonces skippables, non-skippables, bumper ads, discovery ads, masthead.",details:"Formats : Skippable In-Stream (après 5s l'utilisateur peut passer, paiement si 30s vues ou clic), Non-Skippable (15-20s, paiement au CPM), Bumper (6s non-skippable, idéal notoriété), Discovery (à côté des vidéos suggérées), Masthead (bannière page d'accueil, très cher). Ciblage : mots-clés, audiences (centres d'intérêt, remarketing), données démographiques, emplacements. Mesurez : vues, taux de complétion, CTR, coût par vue (CPV).",example:"Startup SaaS : campagne Skippable In-Stream, ciblage par mots-clés 'outil productivité', vidéo 30s, CPV 0,03€. Taux de complétion 25%, CTR 0,5%. 100k vues = 3000€, 500 clics site, 50 leads.",related:["Google Ads","SEA","video","YouTube"]};

BRAIN["programmatic advertising"]={name:"Programmatic Advertising",def:"Achat automatisé d'espaces publicitaires digitaux via des plateformes (DSP, SSP) et des enchères en temps réel (RTB).",details:"Le programmatique automatise l'achat média. Écosystème : Advertiser (annonceur) → DSP (Demand-Side Platform, ex: DV360) → Ad Exchange (place de marché) → SSP (Supply-Side Platform) → Publisher (site media). RTB (Real-Time Bidding) : enchère en millisecondes quand une page se charge. Ciblages : data (3rd party, 1st party), contextuel (contenu de la page), géographique, device. Avantages : ciblage précis, temps réel, optimisation automatique.",example:"Marque de luxe : campagne programmatique display, ciblage contextuel (articles finance/luxe) + data (revenus élevés) + géographique (grandes villes). Budget 10k€, CPM 8€, 1,25M impressions, CTR 0,2%, notoriété +15%.",related:["SEA","display","DSP","ad exchange"]};

BRAIN["DSP"]={name:"DSP (Demand-Side Platform)",def:"Plateforme côté acheteur pour acheter de la publicité programmatique : permet de gérer campagnes, ciblages et enchères sur multiples ad exchanges.",details:"DSP principales : Google DV360, The Trade Desk, Amazon DSP, Xandr (Microsoft), MediaMath. Fonctionnalités : ciblage (data, contextuel, géo, device), RTB (real-time bidding), gestion de budget et fréquence, optimisation automatique, reporting unifié, connexion à des data providers (3rd party data). La DSP permet d'acheter sur des milliers de sites et apps en un seul endroit.",example:"Annonceur utilise DV360 : campagne display + vidéo, ciblage audiences first-party data (clients existants) + lookalike, budget 50k€, optimisation vers CPA cible 25€. Résultat : CPA moyen 22€, 2273 conversions.",related:["programmatic advertising","SSP","ad exchange","DMP"]};

BRAIN["SSP"]={name:"SSP (Supply-Side Platform)",def:"Plateforme côté éditeur pour vendre ses espaces publicitaires de façon programmatique et maximiser ses revenus.",details:"SSP principales : Google Ad Manager (ex-AdX), PubMatic, Magnite (ex-Rubicon Project), Index Exchange, OpenX. Fonctionnalités : gestion de l'inventaire, connexion à multiples DSP pour créer de la concurrence (header bidding), prix planchers, protection de marque (brand safety), optimisation du rendement (yield). Le header bidding permet de proposer l'impression à plusieurs DSP simultanément pour maximiser le CPM.",example:"Site média utilise Google Ad Manager : header bidding connecté à 5 DSP, prix plancher 2€ CPM. Revenus publicitaires augmentés de 40% par rapport à un waterfall traditionnel.",related:["programmatic advertising","DSP","ad exchange","header bidding"]};

BRAIN["ad exchange"]={name:"Ad Exchange",def:"Place de marché numérique où les éditeurs (via SSP) et les annonceurs (via DSP) échangent des impressions publicitaires en temps réel (RTB).",details:"L'ad exchange est le point de rencontre. Google Ad Exchange est le plus grand. Fonctionnement RTB : quand un utilisateur charge une page, l'éditeur envoie une requête à l'ad exchange avec les données disponibles (URL, format, user ID). L'ad exchange enchérit côté DSP. L'annonceur gagnant affiche sa pub. Durée totale : < 100 millisecondes. L'ad exchange gère aussi la qualité (fraude, brand safety).",example:"Requête Ad Exchange : utilisateur sur site cuisine, cookie first-party, France. Enchères DSP : marque A (ustensiles) 1,20€, marque B (alimentaire) 0,90€, marque C (auto) 0,30€. Marque A gagne, pub affichée.",related:["programmatic advertising","DSP","SSP","RTB"]};

BRAIN["DMP"]={name:"DMP (Data Management Platform)",def:"Plateforme qui collecte, organise et active des données d'audience (2nd et 3rd party) pour le ciblage publicitaire programmatique.",details:"La DMP agrège des données de multiples sources (site web, CRM, partenaires, data providers) et crée des segments d'audience. Ces segments sont envoyés aux DSP pour ciblage. Exemples : Oracle BlueKai, Adobe Audience Manager. La DMP utilise des cookies tiers (en déclin). Elle est remplacée progressivement par la CDP (Customer Data Platform) qui utilise la first-party data.",example:"Constructeur auto : DMP segmente 'Acheteurs SUV premium 12 mois', 'Intentionnistes berlines 3 mois', 'Propriétaires modèles X'. Segments envoyés à DV360 pour campagnes ciblées. CPA 30% inférieur au ciblage large.",related:["CDP","programmatic advertising","DSP","first-party data"]};

BRAIN["CDP"]={name:"CDP (Customer Data Platform)",def:"Plateforme qui unifie les données clients first-party de toutes les sources (web, app, CRM, email, boutique) pour créer une vue client unique et activable.",details:"Contrairement à la DMP (orientée pub, cookies tiers), la CDP est orientée marketing relationnel et utilise la first-party data. Fonctionnalités : collecte (tous les canaux), unification (identité client unique), segmentation, activation (envoi vers outils marketing : email, pub, push). CDP leaders : Segment, mParticle, Tealium, Bloomreach. La CDP est essentielle dans un monde sans cookies tiers.",example:"E-commerce : CDP unifie données site (pages vues), app (actions), achats (CRM), email (clics). Crée segment 'Clients VIP + intéressés sneakers'. Activation : email personnalisé + audience Facebook Ads. Conversion x3.",related:["DMP","first-party data","CRM","marketing automation"]};

BRAIN["first-party data"]={name:"First-Party Data",def:"Données collectées directement par une entreprise auprès de ses clients/utilisateurs via ses propres canaux : site web, app, CRM, email, boutique.",details:"Exemples : comportement de navigation, historique d'achat, données de formulaire, interactions email, utilisation de l'app, programme de fidélité. C'est la donnée la plus fiable, la plus respectueuse de la vie privée (RGPD-compatible), et la plus précieuse car exclusive. Avec la fin des cookies tiers, la first-party data devient LE pilier du marketing data-driven. Collectez-la activement : comptes clients, newsletters, quiz, lead magnets, programmes fidélité.",example:"Marque D2C : programme fidélité → 200k membres, données first-party riches (achats, préférences, anniversaire). Segmentation : 'Clients actifs 6 mois sans achat'. Campagne email + retargeting personnalisé. ROI x10 vs pub froide.",related:["zero-party data","third-party data","CDP","DMP"]};

BRAIN["zero-party data"]={name:"Zero-Party Data",def:"Données qu'un client partage volontairement et explicitement avec une marque : préférences, goûts, intentions, données déclaratives.",details:"Contrairement à la first-party data (observée), la zero-party data est déclarative. Exemples : quiz ('Quel est votre style ?'), configurateur de produit, centre de préférences, sondage, questionnaire onboarding. Avantages : consentement explicite, exactitude (le client le dit), relation de confiance. Collecte via : des expériences interactives (quiz, calculateurs), des incentives (remise contre données), des questionnaires post-achat.",example:"Marque skincare : quiz en ligne 'Quel est votre type de peau ?' (5 questions). Résultat : routine personnalisée recommandée + collecte type peau, préoccupations, préférences ingrédients. Taux complétion 70%, conversion 25%.",related:["first-party data","CDP","lead magnet","personnalisation"]};

BRAIN["third-party data"]={name:"Third-Party Data",def:"Données collectées par des entreprises tierces (data brokers) qui agrègent des informations de multiples sources et les revendent pour le ciblage publicitaire.",details:"Les data brokers (Experian, Acxiom, Oracle) créent des profils d'utilisateurs basés sur des cookies tiers, des données publiques, des programmes de fidélité partenaires. Ciblages possibles : données démographiques, revenus, intentions d'achat, centres d'intérêt. La third-party data est en déclin à cause de : fin des cookies tiers, RGPD/ePrivacy, sensibilisation vie privée, Apple ITP, Firefox ETP. Elle est remplacée par les first-party et zero-party data, et le ciblage contextuel.",example:"Annonceur auto : achète segment 'Intentionnistes SUV premium 3 mois' à Oracle Data Cloud. Ciblage programmatique. CPA 40€ vs 70€ sans ciblage data. Mais avec la fin des cookies, ce ciblage deviendra impossible.",related:["first-party data","DMP","cookies tiers","ciblage contextuel"]};

BRAIN["cookies tiers"]={name:"Cookies Tiers (Third-Party Cookies)",def:"Petits fichiers déposés par un domaine autre que celui visité, utilisés pour le tracking publicitaire cross-site. En voie de disparition.",details:"Un cookie tiers est déposé par une régie pub (ex: doubleclick.net) quand vous visitez un site. Il permet de suivre l'utilisateur à travers différents sites pour créer un profil et faire du retargeting. Google Chrome (65% du marché) prévoit de les supprimer progressivement (Privacy Sandbox). Firefox et Safari les bloquent déjà. Impact marketing : retargeting moins efficace, ciblage data moindre, mesure d'attribution plus difficile. Solutions : first-party data, ciblage contextuel, server-side tracking, modélisation des conversions.",example:"Avant : un site e-commerce pouvait recibler un visiteur sur Facebook grâce au cookie tiers. Après la fin des cookies : il faut utiliser le pixel Meta (cookie first-party), la collecte d'email, ou le retargeting sur les plateformes (Google, Meta).",related:["first-party data","third-party data","server-side tracking","ciblage contextuel"]};

BRAIN["server-side tracking"]={name:"Server-Side Tracking",def:"Méthode de collecte de données où les événements sont envoyés d'abord à votre propre serveur, puis aux plateformes (Google, Meta), au lieu de passer directement par le navigateur.",details:"Avantages vs client-side (pixel navigateur) : 1) Contourne les bloqueurs de pub (adblockers), 2) Contourne les restrictions navigateurs (ITP, ETP), 3) Améliore la performance (moins de JS), 4) Meilleur contrôle des données envoyées, 5) Durée de vie des cookies prolongée (cookie first-party HTTP). Mise en place : Google Tag Manager Server-Side, Stape, Taggrs, ou solution custom sur votre serveur.",example:"E-commerce : passage de GTM client-side à GTM server-side (conteneur sur sous-domaine propre). Collecte des conversions +15% (adblockers contournés), durée cookie 2 ans vs 7 jours (ITP contourné).",related:["first-party data","cookies tiers","Google Tag Manager","analytics"]};

BRAIN["Google Tag Manager"]={name:"Google Tag Manager (GTM)",def:"Outil gratuit de Google qui permet de gérer les tags marketing et analytics (pixels, scripts) sans modifier le code source du site.",details:"GTM centralise tous les tags : Google Analytics, Facebook Pixel, Google Ads conversion, LinkedIn Insight Tag, pixels partenaires, scripts personnalisés. Structure : Compte > Conteneur > Tags + Déclencheurs + Variables. Le data layer est un objet JavaScript qui stocke les données à envoyer. GTM Server-Side ajoute un conteneur sur votre serveur pour le server-side tracking. Avantage : les marketeurs peuvent déployer des tags sans développeur.",example:"Site web : GTM installé avec 1 conteneur. Tags déployés : GA4 config, Google Ads remarketing, Facebook Pixel, LinkedIn Insight, Hotjar. Tous gérés depuis l'interface GTM. Nouveau tag partenaire ajouté en 5 min.",related:["server-side tracking","Google Analytics 4","Facebook Ads","analytics"]};

BRAIN["Google Analytics 4"]={name:"Google Analytics 4 (GA4)",def:"Dernière version de Google Analytics, basée sur un modèle événementiel et non plus sur les sessions. Remplaçant d'Universal Analytics.",details:"GA4 suit tout comme des événements (page vue = event page_view, achat = event purchase). Avantages vs UA : 1) Cross-device et cross-platform (web + app), 2) IA et insights prédictifs (probabilité de conversion, churn), 3) Privacy-safe (moins dépendant des cookies), 4) Intégration BigQuery gratuite, 5) Modélisation des conversions. Métriques clés : utilisateurs actifs, taux d'engagement, événements, conversions. Configurez : flux de données, événements personnalisés, conversions, audiences.",example:"Site web migre de UA à GA4 : événements personnalisés configurés (form_start, form_submit, video_play, scroll_90), conversions définies, audiences exportées vers Google Ads. Attribution data-driven. Modélisation compense 20% de données perdues.",related:["analytics","Google Tag Manager","BigQuery","server-side tracking"]};

BRAIN["BigQuery"]={name:"BigQuery",def:"Entrepôt de données cloud (data warehouse) serverless de Google Cloud Platform, permettant d'analyser des téraoctets de données en secondes avec SQL.",details:"BigQuery est la solution d'analyse avancée pour les données marketing. GA4 exporte gratuitement les données brutes vers BigQuery (contrairement à UA). Cela permet : analyses personnalisées en SQL, croisement avec données CRM, attribution modeling custom, dashboards avancés, machine learning. Coût : stockage et requêtes facturés (avec quota gratuit généreux). S'interface avec Looker Studio, Python (notebooks), data tools.",example:"E-commerce : données GA4 brutes dans BigQuery (1 an, 500 Go). Analyse SQL : panier moyen par cohorte d'acquisition, LTV par canal, attribution multi-touch personnalisée. Insights non disponibles dans l'interface GA4.",related:["Google Analytics 4","analytics","data warehouse","Looker Studio"]};

BRAIN["Looker Studio"]={name:"Looker Studio (ex Google Data Studio)",def:"Outil gratuit de data visualisation de Google pour créer des tableaux de bord interactifs à partir de multiples sources de données.",details:"Looker Studio se connecte à : Google Analytics, Google Ads, Google Sheets, BigQuery, Facebook Ads, bases SQL, et 500+ connecteurs partenaires. Créez des dashboards personnalisés avec graphiques, tableaux, jauges, cartes. Partagez en temps réel. Idéal pour : reporting marketing, suivi des KPIs, présentation client. Alternative : Power BI (Microsoft), Tableau (Salesforce).",example:"Dashboard marketing : connexion GA4 + Google Ads + Facebook Ads. Page 1 = vue d'ensemble (CA, ROAS, CAC, LTV). Page 2 = détails canaux. Page 3 = funnel conversion. Actualisation automatique, partagé à toute l'équipe.",related:["Google Analytics 4","BigQuery","analytics","KPIs marketing"]};

BRAIN["ecommerce"]={name:"E-commerce",def:"Commerce électronique : vente de produits ou services en ligne via un site web ou une application mobile.",details:"Types : B2C (vente aux particuliers), B2B (vente aux entreprises), D2C (direct-to-consumer, marque qui vend sans intermédiaires), marketplace (Amazon, Etsy, Cdiscount), m-commerce (mobile). Plateformes : Shopify (leader simplicité), WooCommerce (WordPress), PrestaShop, Magento. KPIs e-commerce : CA, panier moyen, taux de conversion (1-3% moyen), taux d'abandon panier (70% moyen), CAC, LTV, ROAS, taux de retour.",example:"Marque D2C bijoux : Shopify, panier moyen 65€, taux conversion 2,5%, abandon panier 65%. Emails automatisés : bienvenue, panier abandonné, post-achat, réengagement. CA mensuel 50k€, croissance +15%/mois.",related:["Shopify","WooCommerce","D2C","CRO"]};

BRAIN["Shopify"]={name:"Shopify",def:"Plateforme e-commerce SaaS leader (25%+ de part de marché) qui permet de créer une boutique en ligne sans compétences techniques.",details:"Shopify gère : hébergement, sécurité, paiement (Shopify Payments), gestion produits, commandes, livraison, blog, SEO de base. App Store : 8000+ apps pour étendre (email marketing, upsell, traduction, dropshipping). Thèmes gratuits et payants (150-350$). Forfaits : 27€ à 289€/mois. Avantages : simplicité, fiabilité, écosystème riche. Inconvénients : frais de transaction, personnalisation limitée vs open-source, dépendance.",example:"Créateur bijoux : Shopify 36€/mois, thème Dawn gratuit, apps Klaviyo (email) + Loox (avis) + Oberlo (dropshipping). 100 produits, CA 5000€/mois dès le 3ème mois.",related:["ecommerce","WooCommerce","D2C","paiement en ligne"]};

BRAIN["WooCommerce"]={name:"WooCommerce",def:"Plugin e-commerce gratuit et open-source pour WordPress. Solution la plus utilisée dans le monde (28% des sites e-commerce).",details:"WooCommerce transforme un site WordPress en boutique. Avantages : gratuité du plugin de base, flexibilité totale (code modifiable), extensions innombrables (payantes), pas de frais de transaction (sauf ceux de Stripe/PayPal), propriété totale des données. Inconvénients : nécessite un hébergement (coût 5-30€/mois), maintenance technique, sécurité à gérer. Extensions populaires : Stripe, PayPal, PDF invoices, shipping, subscriptions, bookings.",example:"Site WordPress + WooCommerce : hébergement o2switch 5€/mois, thème Storefront, extensions Stripe + Yoast SEO + Mailchimp. 500 produits, CA 15k€/mois. Coût total plateforme : 20€/mois.",related:["ecommerce","WordPress","Shopify","CMS"]};

BRAIN["D2C"]={name:"D2C (Direct-to-Consumer)",def:"Modèle où une marque vend directement aux consommateurs sans intermédiaires (distributeurs, détaillants), généralement via son site e-commerce.",details:"Avantages D2C : relation directe client, données first-party, marges plus élevées (pas d'intermédiaire), contrôle total de l'image de marque, agilité. Exemples : Warby Parker (lunettes), Casper (matelas), Allbirds (chaussures). Le D2C repose sur : forte identité de marque, storytelling, expérience client premium, marketing digital (social ads, influence, SEO). Inconvénient : coût d'acquisition client peut être élevé.",example:"Marque de café D2C : site Shopify, branding premium, storytelling origine des grains, abonnement. Acquisition via Instagram Ads + influenceurs. Panier moyen 35€, abonnement LTV 400€, rentable au 3ème achat.",related:["ecommerce","Shopify","branding","first-party data"]};

BRAIN["paiement en ligne"]={name:"Paiement en Ligne",def:"Solutions pour accepter les paiements par carte bancaire ou autres moyens sur un site e-commerce : Stripe, PayPal, Square, Adyen, Mollie.",details:"Critères de choix : frais de transaction (1,2-2,9% + 0,25€ par transaction en Europe), pays acceptés, devises, moyens de paiement (CB, PayPal, Apple Pay, Google Pay, virement, crypto), récurrence (abonnements), intégration technique, UX (redirection ou paiement intégré), délais de versement. Stripe est le leader tech (API simple, documentation). PayPal rassure les acheteurs (450M utilisateurs). Proposez 2-3 moyens de paiement pour maximiser la conversion.",example:"Checkout Shopify : Stripe (CB, Apple Pay, Google Pay) + PayPal. Taux de conversion checkout 65%. Frais : Stripe 1,4% + 0,25€ (UE), PayPal 2,9% + 0,35€. Stripe privilégié pour coût.",related:["ecommerce","Shopify","WooCommerce","checkout"]};

BRAIN["checkout"]={name:"Checkout Optimisé",def:"Processus de finalisation d'achat sur un site e-commerce. Son optimisation est cruciale pour réduire le taux d'abandon de panier (70% en moyenne).",details:"Bonnes pratiques : 1) Checkout en 1 page (ou 3 étapes max), 2) Guest checkout (pas d'obligation de créer un compte), 3) Multiples moyens de paiement, 4) Confiance affichée (SSL, badges sécurité, politique retour visible), 5) Prix final affiché tôt (TTC, livraison), 6) Pas de surprises (frais cachés), 7) Auto-remplissage et validation en temps réel, 8) Barre de progression, 9) Récupération de panier abandonné (email). Chaque friction réduit le taux de conversion.",example:"Checkout Shopify optimisé : 1 page, guest checkout, Stripe + PayPal + Apple Pay, badge 'Paiement sécurisé', livraison gratuite affichée, politique retour '30 jours satisfait ou remboursé'. Taux conversion checkout 68% (vs 55% avant optimisation).",related:["ecommerce","CRO","paiement en ligne","panier abandonne"]};

BRAIN["panier abandonne"]={name:"Panier Abandonné",def:"Lorsqu'un visiteur ajoute un produit au panier mais quitte le site sans finaliser l'achat. Taux moyen d'abandon : 70% (source : Baymard Institute).",details:"Causes : frais cachés (livraison, taxes) 48%, obligation créer compte 24%, checkout trop long 22%, confiance/manque de sécurité 18%. Récupération : 1) Email automatique 1h après abandon (rappel produit + lien direct), 2) Email 24h après (preuve sociale + urgence), 3) Email 72h après (offre promo -10% ou livraison gratuite). SMS ou retargeting pub complémentaires. Taux de récupération moyen : 10-15% des paniers abandonnés.",example:"E-commerce mode : séquence 3 emails panier abandonné (Klaviyo). Email 1 (1h) : 'Vous avez oublié ça ?' + photo + lien. Email 2 (24h) : 'Plus que 2 en stock' (urgence). Email 3 (72h) : '10% de réduction pendant 24h'. Récupération 18%, CA additionnel 4000€/mois.",related:["ecommerce","email marketing","checkout","CRO"]};

BRAIN["marketing local"]={name:"Marketing Local",def:"Stratégie marketing ciblant les consommateurs d'une zone géographique spécifique (ville, quartier, région) pour les attirer en point de vente physique.",details:"Piliers : 1) Google Business Profile (ex-Google My Business) : fiche avec horaires, photos, avis, posts, 2) SEO local (mots-clés + ville, pages locales, backlinks locaux), 3) Avis en ligne (Google, Facebook, Yelp, TripAdvisor), 4) Publicité géociblée (Google Ads local, Facebook géofencing), 5) Partenariats locaux et événements, 6) SMS marketing et push notifs. Objectif : apparaître dans le 'Local Pack' (top 3 résultats Google Maps).",example:"Restaurant : Google Business Profile optimisé (photos pros, 200 avis 4,8★, posts hebdo), SEO local 'restaurant italien Lyon', pub Facebook géofencing 3km, partenariat offices tourisme. Trafic piéton +40%, CA +25%.",related:["Google Business Profile","SEO local","avis clients","geofencing"]};

BRAIN["Google Business Profile"]={name:"Google Business Profile (ex GMB)",def:"Outil gratuit de Google permettant de gérer la présence d'un établissement local sur Google Search et Google Maps.",details:"Optimisez : 1) Nom, adresse, téléphone (NAP) exacts, 2) Catégories précises (principale + secondaires), 3) Horaires à jour, 4) Photos de qualité (intérieur, extérieur, équipe, produits), 5) Description avec mots-clés locaux, 6) Publications régulières (offres, événements, articles), 7) Réponses à TOUS les avis (positifs et négatifs), 8) Produits et services listés, 9) Messagerie activée. Objectif : apparaître dans le Local Pack (top 3) et générer appels, itinéraires, clics site.",example:"Salon coiffure : fiche optimisée, 150 avis 4,9★, photos avant/après, posts offres chaque semaine, réponse à chaque avis, réservation en ligne activée. Local Pack position 1, +60 appels/mois.",related:["marketing local","SEO local","avis clients"]};

BRAIN["SEO local"]={name:"SEO Local",def:"Optimisation du référencement pour apparaître dans les résultats de recherche locaux (Google Maps, Local Pack, recherche 'près de moi').",details:"Piliers SEO local : 1) Google Business Profile optimisé, 2) Site web optimisé (page d'accueil + pages locales par ville/quartier, balise title avec ville, données structurées LocalBusiness Schema, NAP cohérent sur tout le site), 3) Citations locales (annuaires cohérents : NAP identique partout), 4) Backlinks locaux (journaux locaux, blogs, partenaires), 5) Avis Google. Facteurs de classement Local Pack : proximité, pertinence, proéminence (autorité).",example:"Plombier : page 'Plombier Lyon 3' optimisée title 'Plombier Lyon 3 | Dépannage 24/7 | Devis Gratuit', Schema LocalBusiness, Google Business 120 avis, citations sur 50 annuaires. Position 1 Local Pack 'plombier Lyon 3', +30 appels/mois.",related:["SEO","marketing local","Google Business Profile","donnees structurees"]};

BRAIN["geofencing"]={name:"Geofencing Marketing",def:"Technique de ciblage publicitaire qui déclenche des annonces ou notifications quand un utilisateur entre dans une zone géographique définie virtuellement.",details:"Le geofencing utilise le GPS, WiFi ou balises Bluetooth pour détecter l'entrée dans une zone (ex: rayon de 500m autour d'un magasin). Applications : pubs mobiles ciblant les passants, notifications push 'Vous êtes proche, -20% aujourd'hui', analyse de fréquentation. Plateformes : Google Ads (ciblage rayon), Facebook Ads (ciblage géographique), solutions spécialisées (PlotProjects, Radar). Respectez le consentement et le RGPD.",example:"Magasin de sport : campagne Google Ads 'running' ciblée rayon 5km + enceinte stade (geofencing). Les coureurs aux abords du stade voient la pub. CTR 2x supérieur à la moyenne, visites magasin +25%.",related:["marketing local","Google Ads","Facebook Ads","mobile marketing"]};

BRAIN["avis clients"]={name:"Avis Clients (Reviews)",def:"Évaluations et commentaires laissés par les clients sur les plateformes (Google, Facebook, Trustpilot, site propre). Impact direct sur la réputation et le SEO local.",details:"L'importance des avis : 93% des consommateurs lisent les avis avant d'acheter. Une étoile de plus sur Google = +5-9% de CA. Google valorise les avis pour le SEO local. Stratégie : 1) Demander des avis systématiquement (après achat, email, QR code), 2) Simplifier le processus (lien direct), 3) Répondre à TOUS les avis (positifs : remercier + mentionner des détails, négatifs : empathie + solution + contact), 4) Ne PAS acheter de faux avis (pénalité Google, perte de confiance).",example:"Restaurant : après chaque repas, QR code sur l'addition menant au profil Google. Email de suivi J+2. 85% des clients laissent un avis. Score moyen 4,7★ sur 500 avis. +30% de réservations.",related:["Google Business Profile","marketing local","SEO local","e reputation"]};

BRAIN["chatbot"]={name:"Chatbot",def:"Assistant conversationnel automatisé qui interagit avec les visiteurs via un chat, sur un site web, une app de messagerie ou les réseaux sociaux.",details:"Types : 1) Basé sur des règles (arbre de décision, scénarios prédéfinis), 2) IA (NLP - Natural Language Processing, comprend le langage, ex: GPT-4, Dialogflow). Cas d'usage marketing : qualification de leads, service client 24/7, FAQ, prise de rendez-vous, recommandations produits. Plateformes : Intercom, Drift, ManyChat (Messenger), Tidio, Chatfuel, Botpress. Un chatbot peut réduire le coût de support de 30% et augmenter les conversions.",example:"Site e-commerce : chatbot ManyChat Messenger, qualification lead (budget, besoin, urgence), planification rendez-vous commercial automatique. Conversion visiteur→lead 12%. 50 RDV/mois automatisés.",related:["messenger marketing","service client","marketing automation","IA"]};

BRAIN["messenger marketing"]={name:"Messenger Marketing",def:"Utilisation des applications de messagerie (WhatsApp, Messenger, Telegram, WeChat) pour communiquer avec les clients : service, marketing, vente.",details:"Le messaging a dépassé les réseaux sociaux en utilisation (2,9 milliards WhatsApp + Messenger). Stratégies : 1) Service client (WhatsApp Business, réponses rapides), 2) Notifications (confirmation commande, expédition), 3) Marketing (newsletters Messenger, offres), 4) Chatbot (automatisation). WhatsApp Business API pour les entreprises. Opt-in obligatoire (l'utilisateur doit initier ou consentir). Taux d'ouverture : 80-98%, bien supérieur à l'email.",example:"Marque cosmétique : WhatsApp Business, opt-in via site et boutique. Notifications : confirmation commande, expédition, suivi. Offres exclusives abonnés WhatsApp. Taux ouverture 95%, taux clic 35%.",related:["WhatsApp Business","chatbot","email marketing","SMS marketing"]};

BRAIN["WhatsApp Business"]={name:"WhatsApp Business",def:"Version professionnelle de WhatsApp permettant aux entreprises de créer un profil business, automatiser des réponses, organiser les contacts.",details:"WhatsApp Business (gratuit, pour petites entreprises) : profil avec description, horaires, adresse, catalogue produits, réponses rapides, messages automatiques (absence, bienvenue), étiquettes contacts. WhatsApp Business API (payant, pour moyennes/grandes entreprises) : intégration CRM, envoi massif, chatbot. Le marketing WhatsApp explose : taux d'ouverture 98%, 45% de taux de réponse. Opt-in obligatoire et respect RGPD.",example:"Fleuriste : WhatsApp Business, catalogue produits dans le profil, message automatique 'Merci de votre message, réponse sous 1h', étiquettes 'Fidèle', 'Mariage', 'Entreprise'. 70% des commandes arrivent via WhatsApp.",related:["messenger marketing","chatbot","SMS marketing","service client"]};

BRAIN["SMS marketing"]={name:"SMS Marketing",def:"Envoi de messages texte promotionnels ou informationnels sur les téléphones mobiles des clients ayant donné leur consentement.",details:"Avantages SMS : taux d'ouverture 98% (contre 20% email), lu en moyenne en 90 secondes, ne nécessite pas de connexion internet. Usages : promotions flash, rappels rendez-vous, confirmations commandes, codes de réduction, alertes. Limitez à 160 caractères, CTA clair (lien court), fréquence modérée (2-4/mois), opt-in obligatoire, opt-out facile (STOP). Outils : Twilio, SMSFactor, TextMagic, Sendinblue. Combine avec email pour une stratégie multicanal.",example:"Restaurant : SMS '🍕 Vendredi Pizza ! -20% sur toutes les pizzas ce soir. Montre ce SMS au serveur. STOP au 36000'. Envoyé à 2000 opt-ins, 150 utilisations, CA soirée +40%.",related:["messenger marketing","WhatsApp Business","email marketing","mobile marketing"]};

BRAIN["IA marketing"]={name:"Intelligence Artificielle en Marketing",def:"Utilisation de l'IA (machine learning, NLP, computer vision) pour automatiser, personnaliser et optimiser les actions marketing.",details:"Applications IA marketing : 1) Génération de contenu (GPT-4 pour articles, emails, pub), 2) Personnalisation (recommandations produits, contenu dynamique), 3) Chatbots intelligents (service client 24/7), 4) Ciblage publicitaire prédictif (Google Performance Max, Meta Advantage+), 5) Analyse prédictive (churn, LTV, scoring), 6) Automatisation (routage, timing), 7) Analyse d'images et vidéos, 8) SEO (génération de contenu optimisé). L'IA ne remplace pas le marketeur mais décuple sa productivité.",example:"Equipe marketing : ChatGPT pour brainstorm accroches et variantes pub, Midjourney pour visuels réseaux, GA4 insights prédictifs pour cibler, Klaviyo IA pour timing optimal emails. Productivité x2, créativité augmentée.",related:["ChatGPT","midjourney","marketing automation","analytics"]};

BRAIN["ChatGPT"]={name:"ChatGPT en Marketing",def:"Utilisation du modèle de langage GPT d'OpenAI pour générer du contenu marketing : articles, emails, scripts, accroches, brainstorming.",details:"Cas d'usage marketing : 1) Rédaction de contenu (blog, réseaux, newsletter), 2) Brainstorming (idées campagne, slogans), 3) Adaptation de ton (formel, humoristique, storytelling), 4) Traduction, 5) Résumé et synthèse, 6) Génération de variantes pour A/B testing. Prompt engineering = compétence clé. Limites : contenu parfois générique, nécessite relecture humaine, date de connaissance limitée. Utilisez GPT-4 (plus créatif) pour le copywriting.",example:"Prompt : 'Rédige 5 accroches Facebook Ads pour une formation en community management, ton dynamique, cible jeunes diplômés, max 100 caractères.' ChatGPT génère 5 accroches, le marketeur sélectionne et adapte. Gain de temps 30 min.",related:["IA marketing","content marketing","copywriting","marketing automation"]};

BRAIN["midjourney"]={name:"Midjourney (IA Image)",def:"Outil d'IA générative qui crée des images à partir de descriptions textuelles (prompts). Utilisé pour générer des visuels marketing uniques.",details:"Midjourney (accessible via Discord) excelle dans les visuels artistiques et réalistes. Usages marketing : visuels réseaux sociaux, moodboards, mockups produits, illustrations articles, icônes, bannières pub. Prompt structure : [sujet] + [style] + [ambiance] + [éclairage] + [paramètres techniques]. Paramètres : --ar (ratio), --v (version), --stylize (niveau artistique). Limites : droits d'usage (abonnement payant pour usage commercial). Alternative gratuite : Stable Diffusion, DALL-E 3.",example:"Prompt Midjourney : 'Minimalist desk setup with laptop and coffee, natural morning light, pastel colors, cozy vibe, 8k --ar 16:9'. Image utilisée pour bannière newsletter. Visuel unique, coût marginal.",related:["IA marketing","ChatGPT","design graphique","content marketing"]};

BRAIN["RGPD"]={name:"RGPD (Règlement Général sur la Protection des Données)",def:"Règlement européen (2018) encadrant la collecte, le traitement et la protection des données personnelles des citoyens de l'UE.",details:"Principes RGPD pour le marketing : 1) Consentement explicite et libre (cases pré-cochées interdites), 2) Droit d'accès, rectification, effacement, portabilité, 3) Finalité définie (collecter pour un usage précis), 4) Minimisation (ne collecter que le nécessaire), 5) Sécurité des données, 6) DPO (Data Protection Officer) obligatoire dans certains cas. Impact marketing : opt-in obligatoire pour emails, bannières cookies, registre des traitements, contrats sous-traitants (DPA). Amendes : jusqu'à 4% du CA mondial.",example:"Newsletter : double opt-in (inscription + confirmation email), case non pré-cochée, mention 'Vos données ne seront jamais partagées', lien désabonnement dans chaque email, politique confidentialité accessible. Conforme RGPD.",related:["cookies","consentement","securite web","ethique marketing"]};

BRAIN["cookies"]={name:"Cookies et Consentement",def:"Les cookies sont des fichiers stockés sur le navigateur. Le RGPD exige le consentement préalable pour les cookies non essentiels.",details:"Types : cookies strictement nécessaires (pas de consentement requis), cookies de préférence, cookies statistiques, cookies marketing. Bandeau cookies obligatoire (RGPD + directive ePrivacy) : doit permettre d'accepter, refuser, ou paramétrer par finalité. Pas de 'continuons sans accepter' biaisé. Solutions : Cookiebot, Axeptio, Didomi, Tarteaucitron, Consent Mode Google. Le non-respect = amende CNIL (jusqu'à 150M€ pour Google).",example:"Site web : bandeau Axeptio '🍪 Nous utilisons des cookies pour améliorer votre expérience' + boutons 'Tout accepter', 'Tout refuser', 'Paramétrer'. Google Consent Mode implémenté : si refus, Google Ads modélise les conversions. Taux acceptation 65%.",related:["RGPD","cookies tiers","consentement","Google Consent Mode"]};

BRAIN["Google Consent Mode"]={name:"Google Consent Mode",def:"Fonctionnalité Google qui ajuste le comportement des tags Google en fonction du consentement cookie de l'utilisateur.",details:"Avec Consent Mode v2, Google envoie les signaux de consentement (ad_storage, analytics_storage, etc.) à ses services. Si l'utilisateur refuse les cookies marketing : Google Ads et GA4 continuent de fonctionner en mode 'sans cookie', utilisant la modélisation pour estimer les conversions. Obligatoire depuis mars 2024 pour continuer à utiliser les campagnes Google Ads en Europe. Implémentation : Google Tag Manager + plateforme CMP certifiée Google.",example:"Site e-commerce : Consent Mode v2 via GTM + CMP Cookiebot. Si refus cookies pub : Google Ads modélise conversions. Perte de données mesurées compensée à 70% par la modélisation. Campagnes Google Ads continuent d'être optimisées.",related:["cookies","RGPD","Google Ads","Google Tag Manager"]};

BRAIN["CAN-SPAM"]={name:"CAN-SPAM Act",def:"Loi américaine (2003) régulant les emails commerciaux. Équivalent US du RGPD pour l'email, mais moins strict.",details:"Règles CAN-SPAM : 1) Expéditeur réel (pas de fausse identité), 2) Objet non trompeur, 3) Identification du message comme publicitaire, 4) Adresse postale de l'expéditeur, 5) Option de désabonnement (opt-out) claire et fonctionnelle, 6) Délai de 10 jours pour traiter l'opt-out. Amendes : jusqu'à 50 120$ par email. Même si vous êtes en Europe, si vous envoyez à des Américains, CAN-SPAM s'applique.",example:"Email marketing B2B envoyé aux US : nom entreprise réel en expéditeur, adresse postale en bas, lien désabonnement clair, objet 'Webinar: Boost your SEO in 2025' (informatif, pas trompeur). Conforme CAN-SPAM.",related:["email marketing","RGPD","opt-in","opt-out"]};

BRAIN["opt-in"]={name:"Opt-in",def:"Consentement actif et explicite d'un utilisateur pour recevoir des communications marketing (emails, SMS, notifications). Obligatoire sous RGPD.",details:"Deux types : 1) Simple opt-in : l'utilisateur coche une case (non pré-cochée) ou entre son email, 2) Double opt-in : après inscription, un email de confirmation est envoyé avec un lien à cliquer (renforce la qualité de la liste et la conformité). L'opt-in doit être : libre, spécifique, éclairé, univoque. Pas d'opt-in forcé ('Inscrivez-vous pour voir le prix'). La liste doit documenter quand et comment le consentement a été donné.",example:"Formulaire newsletter : case à cocher vierge 'Je souhaite recevoir la newsletter', lien 'Politique de confidentialité', puis double opt-in : email 'Confirmez votre inscription' avec lien. Taux de confirmation 80%. Liste 100% conforme.",related:["RGPD","opt-out","email marketing","consentement"]};

BRAIN["opt-out"]={name:"Opt-out (Désabonnement)",def:"Mécanisme permettant à un utilisateur de se désabonner facilement des communications marketing. Obligation légale (RGPD, CAN-SPAM).",details:"L'opt-out doit être : simple (1 clic maximum), immédiat, visible dans chaque communication. Email : lien de désabonnement dans chaque message (généralement en bas). SMS : STOP au numéro court. Push notifs : paramètres de l'app. Traitez les opt-out rapidement (max 10 jours CAN-SPAM, immédiatement recommandé). Ne jamais facturer l'opt-out. Un opt-out facile paradoxalement améliore la délivrabilité (moins de plaintes spam).",example:"Chaque email contient en bas : 'Vous recevez cet email car vous êtes inscrit à [liste]. Pour vous désabonner, cliquez ici.' Lien mène à page 'Vous êtes désabonné' en 1 clic. Taux désabonnement 0,2% (normal).",related:["opt-in","email marketing","RGPD","CAN-SPAM"]};

BRAIN["ABM"]={name:"ABM (Account-Based Marketing)",def:"Stratégie B2B qui cible des comptes (entreprises) spécifiques comme des marchés uniques, avec des campagnes hyper-personnalisées.",details:"Au lieu de ratisser large (inbound), l'ABM identifie 10-50-100 comptes cibles à fort potentiel. Pour chaque compte, on crée des messages, contenus et offres personnalisés. Piliers : 1) Sélection des comptes (firmographiques, intent data), 2) Recherche sur chaque compte (décideurs, enjeux), 3) Contenu personnalisé (landing page dédiée, email direct), 4) Campagnes multicanales ciblées (LinkedIn, email, display, téléphone). Résultats : cycles de vente plus courts, deals plus gros, meilleur ROI.",example:"Éditeur SaaS cible 50 comptes CAC 40. Pour chaque compte : landing page personnalisée avec logo, email au DSI avec étude de cas secteur, pub LinkedIn ciblant uniquement les employés du compte. Taux conversion 30%, deal moyen 100k€.",related:["B2B","LinkedIn","personalisation","lead generation"]};

BRAIN["B2B"]={name:"B2B (Business-to-Business)",def:"Marketing interentreprises : vente de produits ou services d'une entreprise à une autre entreprise.",details:"Spécificités B2B vs B2C : cycle de vente plus long (3-12 mois), multiple décideurs (CEO, DSI, CFO), valeur transactionnelle plus élevée, décision rationnelle (ROI, gain de temps), relation personnelle importante. Marketing B2B : content marketing (livres blancs, études de cas), LinkedIn, SEO, webinars, salons professionnels, email nurturing, ABM. KPIs B2B : MQL, SQL, CAC, LTV, durée du cycle de vente, taux de conversion par étape.",example:"Agence conseil B2B : blog SEO + LinkedIn + livres blancs. Lead magnet 'Étude de cas : +40% CA client X'. Nurturing email 8 semaines. Appel découverte, proposition. Cycle moyen 4 mois, deal moyen 15k€.",related:["B2C","ABM","LinkedIn","lead generation"]};

BRAIN["B2C"]={name:"B2C (Business-to-Consumer)",def:"Marketing aux particuliers : vente de produits ou services directement aux consommateurs finaux.",details:"Spécificités B2C vs B2B : cycle de vente court (minutes à jours), décision émotionnelle (désir, besoin, impulsion), décideur unique, transaction unitaire plus faible, volume plus important. Marketing B2C : réseaux sociaux, publicité display/vidéo, email promo, influence, SEO, retail. KPIs B2C : trafic, taux de conversion, panier moyen, CAC, LTV, ROAS, taux de réachat. Le mobile est prédominant (>50% du trafic e-commerce B2C).",example:"Marque vêtements B2C : Instagram Reels + TikTok + influenceurs. Site Shopify, checkout mobile optimisé. Facebook Ads lookalike + retargeting. Panier moyen 55€, CAC 18€, LTV 220€, ROAS 4,5.",related:["B2B","ecommerce","D2C","reseaux sociaux"]};

BRAIN["CRO vs SEO"]={name:"CRO vs SEO : lequel prioriser ?",def:"Comparaison entre l'optimisation du taux de conversion (CRO) et le référencement naturel (SEO) : deux stratégies complémentaires.",details:"CRO : optimise l'existant, augmente le % de visiteurs qui convertissent. Résultats rapides (semaines). SEO : augmente le trafic entrant, résultats plus lents (mois). Priorité : si trafic < 1000 visiteurs/mois → SEO d'abord (générer du trafic). Si trafic > 5000 visiteurs/mois avec taux conversion < 1% → CRO d'abord (convertir le trafic existant). Idéal : travailler les deux en parallèle. Le SEO amène les visiteurs, le CRO les convertit.",example:"Site 5000 visiteurs/mois, taux conversion 0,8% = 40 ventes. Option 1 : SEO +50% trafic = 7500 visiteurs, 60 ventes. Option 2 : CRO taux conversion à 1,5% = 75 ventes avec même trafic. CRO gagnant. Mais idéal = les deux.",related:["SEO","CRO","funnel marketing","analytics"]};

BRAIN["B2B vs B2C marketing"]={name:"Différences B2B vs B2C Marketing",def:"Comparaison des stratégies marketing selon la cible : entreprises (B2B) ou particuliers (B2C).",details:"B2B : cycle long, décision rationnelle (ROI), multi-décideurs, ticket élevé, relation personnelle clé. Canaux : LinkedIn, email, SEO, webinars, salons. Contenu : livres blancs, études de cas, démos. B2C : cycle court, décision émotionnelle, décideur unique, ticket plus faible, volume. Canaux : réseaux sociaux, pub display/vidéo, influence, SEO, retail. Contenu : vidéos, stories, UGC, jeux concours. Mesurez différemment : B2B = MQL, SQL, durée cycle, deal size. B2C = trafic, conversion, panier, ROAS.",example:"Vente logiciel (B2B) : LinkedIn + SEO + webinars + email nurturing 8 semaines + démo + proposition. Cycle 4 mois, deal 15k€. Vente bijoux (B2C) : Instagram Reels + TikTok + influence + Facebook Ads. Cycle 5 minutes, panier 55€.",related:["B2B","B2C","strategie marketing efficace","funnel marketing"]};

BRAIN["ombudsman marketing"]={name:"Médiateur/Ombudsman Marketing",def:"Rôle émergent de garant de l'éthique et de la déontologie marketing au sein d'une organisation. Interlocuteur en cas de conflit éthique.",details:"L'ombudsman marketing veille au respect : des lois (RGPD, CAN-SPAM, ePrivacy), des codes de conduite de l'industrie, des valeurs de l'entreprise, des droits des consommateurs. Missions : traitement des plaintes clients complexes, conseil éthique aux équipes, formation, veille réglementaire, rapport annuel. Poste rare mais en croissance avec la régulation accrue et la sensibilité éthique des consommateurs.",example:"Groupe retail : nomination d'un ombudsman marketing indépendant. Traite 200 plaintes/an (publicités trompeuses, données personnelles). Émet recommandations. Résultat : baisse de 30% des plaintes CNIL/DGCCRF, confiance consommateurs renforcée.",related:["ethique marketing","RGPD","bienseance","e reputation"]};

BRAIN["inbound vs outbound"]={name:"Inbound vs Outbound Marketing",def:"Comparaison des deux grandes approches marketing : attirer (inbound) vs pousser (outbound).",details:"Inbound : attire via contenu utile (SEO, blog, réseaux). Coût par lead 62% inférieur. Résultats long terme. Idéal B2B et produits à forte réflexion. Ex : HubSpot. Outbound : pousse le message (pub display, cold calling, salons). Résultats immédiats. Coût plus élevé. Idéal lancement produit, notoriété rapide, marchés de masse. Ex : pub TV. La stratégie moderne combine les deux : inbound pour le fond de funnel, outbound pour le top of funnel.",example:"Startup : inbound = blog SEO + LinkedIn + ebook. Génère 200 leads/mois, CPL 8€. Outbound = LinkedIn Ads ciblés + cold email. Génère 50 leads/mois, CPL 40€ mais leads plus qualifiés. Mix inbound 80% + outbound 20%.",related:["inbound marketing","outbound","strategie marketing efficace","funnel marketing"]};

BRAIN["ethique marketing"]={name:"Éthique en Marketing",def:"Principes et pratiques pour un marketing responsable, respectueux des consommateurs, de la société et de l'environnement.",details:"Piliers : 1) Vérité (pas de publicité mensongère, greenwashing, astroturfing), 2) Respect de la vie privée (données, consentement), 3) Protection des vulnérables (enfants, personnes fragiles), 4) Durabilité (marketing vert authentique), 5) Transparence (prix cachés, dark patterns), 6) Responsabilité sociale. L'éthique est rentable : 70% des consommateurs sont prêts à payer plus pour une marque éthique (Étude Nielsen).",example:"Patagonia : pub 'Don't Buy This Jacket' (anti-consommation), 1% pour la planète, réparation gratuite, transparence totale. Image de marque éthique inégalée. CA 1,5Md$.",related:["greenwashing","RGPD","bienseance","RSE"]};
