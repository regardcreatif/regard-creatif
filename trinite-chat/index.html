<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trinite Chat</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Swiper.js CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- ===== ÉCRAN : CONNEXION / INSCRIPTION ===== -->
  <div id="screen-auth" class="screen active">
    <div class="auth-container">
      <h1 class="logo">Trinite Chat</h1>
      <p class="logo-sub">Trois profils, un seul chat</p>

      <div class="auth-card">
        <div class="auth-tabs">
          <button id="tab-login" class="tab active" data-tab="login">Se connecter</button>
          <button id="tab-register" class="tab" data-tab="register">S'inscrire</button>
        </div>

        <!-- Formulaire connexion -->
        <form id="form-login" class="auth-form">
          <div class="field">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="votre@email.com" required />
          </div>
          <div class="field">
            <label>Mot de passe</label>
            <input type="password" id="login-password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn-primary">Se connecter</button>
        </form>

        <!-- Formulaire inscription -->
        <form id="form-register" class="auth-form hidden">
          <div class="field">
            <label>Email</label>
            <input type="email" id="register-email" placeholder="votre@email.com" required />
          </div>
          <div class="field">
            <label>Mot de passe</label>
            <input type="password" id="register-password" placeholder="8 caractères minimum" required />
          </div>
          <button type="submit" class="btn-primary">Créer mon compte</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== ÉCRAN : CRÉATION DES 3 PROFILS ===== -->
  <div id="screen-setup" class="screen">
    <div class="setup-container">
      <h2 class="setup-title">Créez vos 3 identités</h2>
      <p class="setup-sub">Chaque profil a ses propres contacts et messages.</p>

      <form id="form-setup">
        <div class="profile-setup-card" data-type="pro">
          <div class="profile-icon pro"><i class="fa-solid fa-briefcase"></i></div>
          <div class="field">
            <label>Nom du profil Pro</label>
            <input type="text" id="name-pro" placeholder="Ex : Jean Martin" required />
          </div>
        </div>

        <div class="profile-setup-card" data-type="prive">
          <div class="profile-icon prive"><i class="fa-solid fa-heart"></i></div>
          <div class="field">
            <label>Nom du profil Privé</label>
            <input type="text" id="name-prive" placeholder="Ex : Jean" required />
          </div>
        </div>

        <div class="profile-setup-card" data-type="anonyme">
          <div class="profile-icon anonyme"><i class="fa-solid fa-ghost"></i></div>
          <div class="field">
            <label>Nom du profil Anonyme</label>
            <input type="text" id="name-anonyme" placeholder="Ex : Fantôme" required />
          </div>
        </div>

        <button type="submit" class="btn-primary" style="margin-top:1.5rem">
          Créer mes profils
        </button>
      </form>
    </div>
  </div>

  <!-- ===== ÉCRAN PRINCIPAL ===== -->
  <div id="screen-main" class="screen">
    <!-- En-tête -->
    <header class="main-header">
      <h1 class="header-logo">Trinite Chat</h1>
      <span id="active-profile-name" class="header-profile"></span>
      <button id="btn-logout" class="icon-btn" title="Déconnexion">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </header>

    <!-- Swiper des profils -->
    <div class="swiper profile-swiper">
      <div class="swiper-wrapper" id="profile-slides"></div>
      <div class="swiper-pagination"></div>
    </div>

    <!-- Section contacts -->
    <div class="contacts-section">
      <div class="contacts-header">
        <h3>Contacts</h3>
        <button id="btn-add-contact" class="icon-btn add-btn" title="Ajouter un contact">
          <i class="fa-solid fa-plus"></i>
        </button>
      </div>
      <ul id="contact-list" class="contact-list">
        <li class="empty-state">Aucun contact pour ce profil</li>
      </ul>
    </div>
  </div>

  <!-- ===== ÉCRAN CHAT ===== -->
  <div id="screen-chat" class="screen">
    <header class="chat-header">
      <button id="btn-back" class="icon-btn">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <span id="chat-contact-name" class="chat-title"></span>
      <span id="chat-profile-badge" class="profile-badge"></span>
    </header>

    <div id="messages-container" class="messages-container"></div>

    <div class="message-input-bar">
      <input type="text" id="message-input" placeholder="Message..." />
      <button id="btn-send" class="btn-send">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
  </div>

  <!-- ===== MODAL : AJOUTER UN CONTACT ===== -->
  <div id="modal-add-contact" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Ajouter un contact</h3>
        <button id="modal-close" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="form-add-contact">
        <div class="field">
          <label>Email du contact</label>
          <input type="email" id="contact-email" placeholder="contact@email.com" required />
        </div>
        <div class="field">
          <label>Nom affiché</label>
          <input type="text" id="contact-name" placeholder="Nom du contact" required />
        </div>
        <div class="field">
          <label>Assigner au profil</label>
          <select id="contact-profile-select">
            <!-- Rempli dynamiquement -->
          </select>
        </div>
        <button type="submit" class="btn-primary">Ajouter</button>
      </form>
    </div>
  </div>

  <!-- ===== TOAST NOTIFICATION ===== -->
  <div id="toast" class="toast hidden"></div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Swiper.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <!-- Script principal -->
  <script src="script.js"></script>
</body>
</html>
