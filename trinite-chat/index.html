<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Trinite Chat</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- ===== ÉCRAN CONNEXION / INSCRIPTION ===== -->
  <div id="screen-auth" class="screen active">
    <div class="auth-container">
      <img src="https://i.postimg.cc/SKTSywtk/Picsart-26-06-08-19-41-07-180.png"
           alt="Trinite Chat" class="auth-logo" />
      <h1 class="logo-text">Trinite Chat</h1>
      <p class="logo-sub">Trois profils, un seul chat</p>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="tab active" data-tab="login">Se connecter</button>
          <button class="tab" data-tab="register">S'inscrire</button>
        </div>

        <form id="form-login" class="auth-form">
          <div class="field">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="votre@email.com" required />
          </div>
          <div class="field">
            <label>Mot de passe</label>
            <input type="password" id="login-password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn-primary">Se connecter</button>
        </form>

        <form id="form-register" class="auth-form hidden">
          <div class="field">
            <label>Email</label>
            <input type="email" id="register-email" placeholder="votre@email.com" required />
          </div>
          <div class="field">
            <label>Mot de passe</label>
            <input type="password" id="register-password" placeholder="8 caractères minimum" required />
          </div>
          <button type="submit" class="btn-primary">Créer mon compte</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== ÉCRAN SETUP PROFILS ===== -->
  <div id="screen-setup" class="screen">
    <div class="setup-container">
      <h2 class="setup-title">Créez vos 3 identités</h2>
      <p class="setup-sub">Chaque profil a ses propres contacts et messages.</p>
      <form id="form-setup" class="auth-form">
        <div class="profile-setup-card">
          <div class="profile-icon pro">💼</div>
          <div class="field flex1">
            <label>Profil Pro</label>
            <input type="text" id="name-pro" placeholder="Ex : Jean Martin" />
          </div>
        </div>
        <div class="profile-setup-card">
          <div class="profile-icon prive">❤️</div>
          <div class="field flex1">
            <label>Profil Privé</label>
            <input type="text" id="name-prive" placeholder="Ex : Jean" />
          </div>
        </div>
        <div class="profile-setup-card">
          <div class="profile-icon anonyme">👻</div>
          <div class="field flex1">
            <label>Profil Anonyme</label>
            <input type="text" id="name-anonyme" placeholder="Ex : Fantôme" />
          </div>
        </div>
        <button type="submit" class="btn-primary" style="margin-top:.5rem">Créer mes profils</button>
      </form>
    </div>
  </div>

  <!-- ===== ÉCRAN PRINCIPAL (MESSAGES) ===== -->
  <div id="screen-main" class="screen">
    <header class="main-header">
      <img src="https://i.postimg.cc/SKTSywtk/Picsart-26-06-08-19-41-07-180.png"
           alt="logo" class="header-logo-img" />
      <h1 class="header-logo">Trinite Chat</h1>
      <span id="active-profile-name" class="header-profile"></span>
      <button id="btn-logout" class="icon-btn" title="Déconnexion">⎋</button>
    </header>

    <!-- Swiper profils -->
    <div class="profile-swiper-wrap" id="profile-swiper-wrap">
      <div class="profile-slides" id="profile-slides"></div>
      <div class="swiper-dots" id="swiper-dots"></div>
    </div>

    <!-- Contacts -->
    <div class="contacts-section">
      <div class="contacts-header">
        <h3>Contacts</h3>
        <button id="btn-add-contact" class="add-btn" title="Ajouter">+</button>
      </div>
      <ul id="contact-list" class="contact-list">
        <li class="empty-state">Aucun contact pour ce profil</li>
      </ul>
    </div>

    <!-- Barre de navigation basse -->
    <nav class="bottom-nav">
      <button class="nav-btn" data-screen="screen-feed">
        <i class="fa-solid fa-play"></i>
        <span>Feed</span>
      </button>
      <button class="nav-btn active" data-screen="screen-main">
        <i class="fa-solid fa-message"></i>
        <span>Messages</span>
      </button>
      <button class="nav-btn" data-screen="screen-profil">
        <i class="fa-solid fa-user"></i>
        <span>Profil</span>
      </button>
    </nav>
  </div>

  <!-- ===== ÉCRAN FEED (TIKTOK) ===== -->
  <div id="screen-feed" class="screen">
    <div class="feed-header-overlay">
      <span class="feed-title">Pour toi</span>
    </div>

    <div class="feed-container" id="feed-container"></div>

    <!-- Barre de navigation basse -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-screen="screen-feed">
        <i class="fa-solid fa-play"></i>
        <span>Feed</span>
      </button>
      <button class="nav-btn" data-screen="screen-main">
        <i class="fa-solid fa-message"></i>
        <span>Messages</span>
      </button>
      <button class="nav-btn" data-screen="screen-profil">
        <i class="fa-solid fa-user"></i>
        <span>Profil</span>
      </button>
    </nav>
  </div>

  <!-- ===== ÉCRAN PROFIL ===== -->
  <div id="screen-profil" class="screen">
    <header class="main-header">
      <img src="https://i.postimg.cc/SKTSywtk/Picsart-26-06-08-19-41-07-180.png"
           alt="logo" class="header-logo-img" />
      <h1 class="header-logo">Mon Profil</h1>
    </header>

    <div class="profil-section">
      <h3 class="profil-title">Mes identités</h3>
      <form id="form-profil" class="auth-form">
        <div id="profil-cards"></div>
        <button type="submit" class="btn-primary">Enregistrer</button>
      </form>
      <button id="btn-logout-profil" class="btn-logout">⎋ Se déconnecter</button>
    </div>

    <!-- Barre de navigation basse -->
    <nav class="bottom-nav">
      <button class="nav-btn" data-screen="screen-feed">
        <i class="fa-solid fa-play"></i>
        <span>Feed</span>
      </button>
      <button class="nav-btn" data-screen="screen-main">
        <i class="fa-solid fa-message"></i>
        <span>Messages</span>
      </button>
      <button class="nav-btn active" data-screen="screen-profil">
        <i class="fa-solid fa-user"></i>
        <span>Profil</span>
      </button>
    </nav>
  </div>

  <!-- ===== ÉCRAN CHAT ===== -->
  <div id="screen-chat" class="screen">
    <header class="chat-header">
      <button id="btn-back" class="icon-btn">←</button>
      <span id="chat-contact-name" class="chat-title"></span>
      <span id="chat-profile-badge" class="profile-badge"></span>
    </header>
    <div id="messages-container" class="messages-container"></div>
    <div class="message-input-bar">
      <input type="text" id="message-input" placeholder="Message…" autocomplete="off" />
      <button id="btn-send" class="btn-send">➤</button>
    </div>
  </div>

  <!-- ===== MODAL AJOUTER CONTACT ===== -->
  <div id="modal-add-contact" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Ajouter un contact</h3>
        <button id="modal-close" class="icon-btn">✕</button>
      </div>
      <form id="form-add-contact" class="auth-form">
        <div class="field">
          <label>Email du contact</label>
          <input type="email" id="contact-email" placeholder="contact@email.com" required />
        </div>
        <div class="field">
          <label>Nom affiché</label>
          <input type="text" id="contact-name" placeholder="Nom du contact" required />
        </div>
        <div class="field">
          <label>Assigner au profil</label>
          <select id="contact-profile-select"></select>
        </div>
        <button type="submit" class="btn-primary">Ajouter</button>
      </form>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast hidden"></div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Script principal -->
  <script src="script.js"></script>
</body>
</html>
