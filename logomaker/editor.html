// ─── APPLY TEMPLATE DATA (used by URL load AND Smart Template Finder) ────────
function applyTemplateData(tpl) {
    newProject();

    function _fallbackTpl(t) {
        S.canvasBg = (t.bg && t.bg.includes('linear-gradient')) ? '#1a1a2e' : (t.bg || '#1a1a2e');
        const bgRect = mkRect();
        bgRect.x = 40; bgRect.y = 40;
        bgRect.w = S.canvasW - 80; bgRect.h = S.canvasH - 80;
        bgRect.fill = t.color || '#5b6af0'; bgRect.rx = 16;
        S.elements.push(bgRect);
        const txt = mkText(t.text || (t.name || '').toUpperCase());
        txt.fontSize = 48; txt.weight = t.weight || '900';
        txt.font = t.font || 'Montserrat'; txt.fill = '#ffffff';
        S.elements.push(txt);
        S.selectedIds = [bgRect.id];
        saveHistory(); render(); updateRightPanel(); updateContextBar();
        toast('📐 Template "' + t.name + '" chargé !');
    }

    if (tpl.svg) {
        try {
            const parser = new DOMParser();
            const svgDoc = parser.parseFromString(tpl.svg, 'image/svg+xml');
            const svgEl = svgDoc.documentElement;
            const scale = S.canvasW / 80;

            function resolveColor(fillStr) {
                if (!fillStr || !fillStr.startsWith('url(#')) return fillStr || '#ffffff';
                const gid = (fillStr.match(/url\(#([^)]+)\)/) || [])[1];
                if (!gid) return '#ffffff';
                const grad = svgDoc.getElementById(gid);
                if (!grad) return '#ffffff';
                const stop = grad.querySelector('stop');
                return stop ? (stop.getAttribute('stop-color') || '#ffffff') : '#ffffff';
            }

            // ── Step 1: harvest text nodes
            const textNodes = Array.from(svgEl.querySelectorAll('text'));
            const textData = textNodes.map(function(tn) {
                return {
                    content: (tn.textContent || '').trim(),
                    x: parseFloat(tn.getAttribute('x') || '40'),
                    y: parseFloat(tn.getAttribute('y') || '40'),
                    fontSize: parseFloat(tn.getAttribute('font-size') || '8'),
                    fill: resolveColor(tn.getAttribute('fill')),
                    fontFamily: tn.getAttribute('font-family') || 'sans-serif',
                    letterSpacing: parseFloat(tn.getAttribute('letter-spacing') || '0'),
                    fontWeight: tn.getAttribute('font-weight') || '700',
                    textAnchor: tn.getAttribute('text-anchor') || 'start',
                    opacity: parseFloat(tn.getAttribute('opacity') || '1')
                };
            }).filter(function(tn) { return tn.content.length > 0; });
            textNodes.forEach(function(tn) { if (tn.parentNode) tn.parentNode.removeChild(tn); });

            // ── Step 2: find & strip the SVG background rect → use as canvas bg
            let extractedBg = null;
            const allRects = Array.from(svgEl.querySelectorAll('rect'));
            const bgRectEl = allRects.find(function(r) {
                const rx = parseFloat(r.getAttribute('x') || '0');
                const ry = parseFloat(r.getAttribute('y') || '0');
                const rw = parseFloat(r.getAttribute('width') || '0');
                const rh = parseFloat(r.getAttribute('height') || '0');
                return rx <= 2 && ry <= 2 && rw >= 76 && rh >= 76;
            });
            if (bgRectEl) {
                const fillAttr = bgRectEl.getAttribute('fill') || '';
                extractedBg = fillAttr.startsWith('url(#') ? resolveColor(fillAttr) : (fillAttr || null);
                bgRectEl.parentNode.removeChild(bgRectEl);
            }

            // ── Step 3: render remaining graphic (no bg, no text) as centered PNG
            const GS = Math.round(S.canvasW * 0.88);
            const GO = Math.round((S.canvasW - GS) / 2);
            svgEl.setAttribute('width', String(GS));
            svgEl.setAttribute('height', String(GS));
            const svgStr = new XMLSerializer().serializeToString(svgEl);
            const svgBlob = new Blob([svgStr], { type: 'image/svg+xml' });
            const svgUrl = URL.createObjectURL(svgBlob);
            const tmpImg = new Image();
            tmpImg.onload = function() {
                const tmpCv = document.createElement('canvas');
                tmpCv.width = GS; tmpCv.height = GS;
                tmpCv.getContext('2d').drawImage(tmpImg, 0, 0, GS, GS);
                URL.revokeObjectURL(svgUrl);
                const dataUrl = tmpCv.toDataURL('image/png');
                const finalImg = new Image();
                finalImg.onload = function() {
                    // Set canvas background from extracted SVG bg rect
                    S.canvasBg = extractedBg ||
                        ((tpl.bg && tpl.bg.includes('linear-gradient')) ? '#1a1a2e' : (tpl.bg || '#1a1a2e'));

                    // ── Layer 1: graphic image — CENTERED, movable & resizable
                    S.elements.push({
                        id: mkId(), type: 'image',
                        x: GO, y: GO, w: GS, h: GS,
                        src: dataUrl, img: finalImg,
                        opacity: 1, rotation: 0, visible: true
                    });

                    // ── Layer 2+: one editable text element per <text> in the SVG
                    textData.forEach(function(td) {
                        const el = mkText(td.content);
                        el.x = td.x * scale;
                        el.y = td.y * scale;
                        el.fontSize = Math.max(8, Math.round(td.fontSize * scale));
                        el.fill = td.fill || '#ffffff';
                        el.align = td.textAnchor === 'middle' ? 'center' : (td.textAnchor === 'end' ? 'right' : 'left');
                        const ff = (td.fontFamily || '').toLowerCase();
                        el.font = ff.includes('orbitron') ? 'Orbitron' :
                                  ff.includes('cinzel') ? 'Cinzel' :
                                  ff.includes('playfair') ? 'Playfair Display' :
                                  ff.includes('bebas') ? 'Bebas Neue' :
                                  ff.includes('rajdhani') ? 'Rajdhani' :
                                  (ff.includes('georgia') || ff.includes('serif')) ? 'Georgia' : 'Montserrat';
                        el.weight = td.fontWeight || '700';
                        el.letterSpacing = Math.round(td.letterSpacing * scale);
                        el.opacity = td.opacity;
                        S.elements.push(el);
                    });

                    S.selectedIds = [];
                    saveHistory(); render(); updateRightPanel(); updateContextBar();
                    toast('📐 "' + tpl.name + '" — fond + graphique + ' + textData.length + ' texte(s) éditables');
                };
                finalImg.src = dataUrl;
            };
            tmpImg.onerror = function() { URL.revokeObjectURL(svgUrl); _fallbackTpl(tpl); };
            tmpImg.src = svgUrl;
        } catch(svgErr) { console.warn('SVG render error:', svgErr); _fallbackTpl(tpl); }
    } else {
        _fallbackTpl(tpl);
    }
}

// ─── CHARGEMENT INTELLIGENT (template / projet / import / sauvegarde) ─────
(function loadTemplateIfNeeded() {
    // CAS 1 : Ouverture d'un projet publié ou d'une création
    if (_urlProject) {
        const raw = sessionStorage.getItem('rcProject');
        if (raw) {
            try {
                const data = JSON.parse(raw);
                sessionStorage.removeItem('rcProject');
                S.canvasW = data.canvasW || 500;
                S.canvasH = data.canvasH || 500;
                S.canvasBg = data.canvasBg || '#ffffff';
                S.activeFilterId = data.activeFilterId || 'none';
                S.activeFilterCSS = data.activeFilterCSS || null;
                restoreElements(data.elements || []);
                S.elements.forEach(el => { const n = +el.id; if (n > uid) uid = n; });
                applyCanvasSize();
                saveHistory();
                render();
                updateRightPanel();
                toast('📂 Projet chargé !');
                return;
            } catch(e) { console.warn('Erreur projet:', e); }
        }
    }

    // CAS 2 : Chargement d'un template (index.html → clic sur template)
    if (_urlTemplate !== null) {
        const raw = sessionStorage.getItem('rcTemplate');
        if (raw) {
            try {
                const tpl = JSON.parse(raw);
                sessionStorage.removeItem('rcTemplate');
                applyTemplateData(tpl);
            } catch(e) { console.warn('Erreur template:', e); }
        }
        return;
    }

    // CAS 3 : Import d'une image depuis index.html
    if (_urlImport) {
        const imgData = localStorage.getItem('rcImportedImage');
        if (imgData) {
            localStorage.removeItem('rcImportedImage');
            const img = new Image();
            img.onload = function() {
                const maxW = Math.min(400, S.canvasW * 0.8);
                const ratio = img.height / img.width;
                const el = {
                    id: mkId(),
                    type: 'image',
                    x: cx() - maxW/2,
                    y: cy() - (maxW*ratio)/2,
                    w: maxW,
                    h: maxW * ratio,
                    src: imgData,
                    img: img,
                    opacity: 1,
                    rotation: 0,
                    visible: true
                };
                S.elements.push(el);
                S.selectedIds = [el.id];
                saveHistory();
                render();
                updateRightPanel();
                updateContextBar();
                toast('🖼️ Image importée !');
            };
            img.src = imgData;
            return;
        }
    }

    // CAS 4 (défaut) : Restaurer la dernière sauvegarde automatique
    if (loadProject()) {
        toast('✓ Projet restauré');
    } else {
        render();
    }
})();

var CAT_KEYWORDS = {
  luxe:    ['luxe','luxury','premium','elite','royal','prestige','haute','noble','chic','or','gold'],
  tech:    ['tech','technologie','technology','digital','numérique','cyber','code','app','startup','data','ia','ai'],
  nature:  ['nature','eco','bio','vert','green','organic','environnement','vague','ocean','montagne','forêt'],
  sport:   ['sport','fitness','gym','athletic','athlétisme','vitesse','speed','force','power','combat','énergie'],
  minimal: ['minimal','minimaliste','simple','clean','épuré','moderne','modern','typographie','blanc'],
  vintage: ['vintage','retro','rétro','classique','classic','old','artisan','tradition','héritage','badge']
};

function stfScore(tpl, query) {
  var q = query.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .split(/[\s,;|]+/).filter(Boolean);
  if (!q.length) return 1;
  var score = 0;
  var tplNameLower = tpl.name.toLowerCase();
  q.forEach(function(w) {
    if (tplNameLower.includes(w)) score += 4;
    if (tpl.cat.includes(w) || w.includes(tpl.cat)) score += 3;
    (CAT_KEYWORDS[tpl.cat] || []).forEach(function(kw) {
      if (kw.includes(w) || w.includes(kw)) score += 2;
    });
    (STF_EXTRA[tpl.name] || []).forEach(function(kw) {
      var kn = kw.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      if (kn.includes(w) || w.includes(kn)) score += 2;
    });
  });
  return score;
}

(function() {
  var fab      = document.getElementById('ai-fab');
  var panel    = document.getElementById('ai-panel');
  var btnClose = document.getElementById('ai-panel-close');
  var search   = document.getElementById('stf-search');
  var results  = document.getElementById('ai-results');

  function svgDataUrl(svg) {
    return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  }

  function renderGrid(list) {
    results.innerHTML = '';
    if (!list.length) {
      results.innerHTML = '<div class="ai-status" style="grid-column:1/-1">Aucun résultat — essaie un autre mot.</div>';
      return;
    }
    list.forEach(function(tpl) {
      var card = document.createElement('div');
      card.className = 'stf-card';
      card.title = tpl.name + ' · ' + tpl.cat;
      card.innerHTML =
        '<div class="stf-card-thumb"><img src="' + svgDataUrl(tpl.svg) + '" loading="lazy" alt="' + tpl.name + '"/></div>' +
        '<div class="stf-card-info"><span class="stf-cat stf-cat-' + tpl.cat + '">' + tpl.cat + '</span><br>' + tpl.name + '</div>';
      card.addEventListener('click', function() {
        var hasWork = S.elements.length > 0;
        if (hasWork && !confirm('Charger "' + tpl.name + '" ? Le contenu actuel sera remplacé.')) return;
        panel.classList.remove('open');
        applyTemplateData(tpl);
      });
      results.appendChild(card);
    });
  }

  function refresh() {
    var q = (search.value || '').trim();
    if (!q) {
      renderGrid(TEMPLATES_CATALOG);
      return;
    }
    var scored = TEMPLATES_CATALOG.map(function(t) { return {t:t, s:stfScore(t,q)}; });
    scored.sort(function(a,b) { return b.s - a.s; });
    var filtered = scored.filter(function(x) { return x.s > 0; }).map(function(x) { return x.t; });
    renderGrid(filtered.length ? filtered : TEMPLATES_CATALOG);
  }

  fab.addEventListener('click', function() {
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
      refresh();
      setTimeout(function() { search.focus(); }, 120);
    }
  });
  btnClose.addEventListener('click', function() { panel.classList.remove('open'); });
  search.addEventListener('input', refresh);

  document.addEventListener('click', function(e) {
    if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== fab) {
      panel.classList.remove('open');
    }
  }, true);
})();
