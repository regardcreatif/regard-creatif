<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC Logo Maker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:wght@700;900&family=Poppins:wght@400;700;900&family=Bebas+Neue&family=Righteous&family=Oswald:wght@500;700&family=Roboto:wght@400;900&family=League+Spartan:wght@700;900&family=Caveat:wght@700&family=Inter:wght@400;600;700;900&family=Pacifico&family=Abril+Fatface&family=Alfa+Slab+One&family=Lobster&family=Fjalla+One&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--panel:#12121a;--panel2:#16161f;--panel3:#1a1a25;
  --border:#2a2a3e;--border2:#1e1e2b;
  --text:#e8e8ee;--text2:#8a8a9a;--text3:#555566;
  --accent:#5b6af0;--accent2:#7c4af0;--glow:rgba(91,106,240,.25);
  --danger:#ef4444;--radius:8px;--tr:.25s cubic-bezier(.4,0,.2,1);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter','DM Sans',sans-serif;user-select:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--panel)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
input[type=range]{-webkit-appearance:none;height:4px;background:var(--panel2);border-radius:2px;outline:none;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--accent);border-radius:50%;cursor:pointer;box-shadow:0 0 6px rgba(91,106,240,.4)}
select{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:4px 6px;font-family:inherit;font-size:10px;cursor:pointer;outline:none;width:100%}
input[type=text],input[type=number]{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:4px 7px;font-family:inherit;font-size:10px;outline:none;width:100%;transition:border-color var(--tr)}
input[type=text]:focus,input[type=number]:focus{border-color:var(--accent)}
input[type=color]{padding:2px;height:28px;width:36px;cursor:pointer;border:1px solid var(--border);border-radius:5px;background:var(--panel2);flex-shrink:0}
button{font-family:inherit;cursor:pointer}

#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOPBAR */
#topbar{height:46px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0;z-index:100}
.logo-text{font-weight:800;font-size:14px;background:linear-gradient(135deg,#5b6af0,#7c4af0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.canvas-dim{font-size:9px;color:var(--text3);margin-left:4px;white-space:nowrap}
.spacer{flex:1}
.zoom-bar{display:flex;align-items:center;gap:4px;background:var(--panel2);border-radius:20px;padding:3px 10px;border:1px solid var(--border)}
.zoom-bar button{background:none;border:none;color:var(--text2);font-size:14px;padding:0 2px;line-height:1}
.zoom-val{font-size:11px;color:var(--text);min-width:38px;text-align:center}
.zoom-1to1{font-size:9px;color:var(--accent);padding:0 2px}
.tbtn{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;display:flex;align-items:center;gap:5px;transition:all .2s;font-weight:600;white-space:nowrap}
.tbtn:hover{border-color:var(--accent);color:var(--text)}
.tbtn.danger{color:var(--danger);border-color:rgba(239,68,68,.3)}
.tbtn.danger:hover{background:rgba(239,68,68,.1)}
.tbtn.primary{background:linear-gradient(135deg,#5b6af0,#7c4af0);border-color:#5b6af0;color:#fff;box-shadow:0 4px 12px rgba(91,106,240,.35)}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:50px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:6px 0;gap:2px;flex-shrink:0;overflow-y:auto}
.stool{width:40px;min-height:40px;border-radius:7px;background:transparent;border:1px solid transparent;color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:6px;text-transform:uppercase;letter-spacing:.3px;transition:all .2s}
.stool:hover,.stool.active{background:rgba(91,106,240,.15);border-color:var(--accent);color:var(--accent)}
.stool svg{width:15px;height:15px}
.s-div{width:24px;height:1px;background:var(--border);margin:3px 0}

/* FLYOUT */
#flyout{width:0;background:var(--panel2);border-right:1px solid var(--border);overflow:hidden;transition:width .2s;flex-shrink:0;display:flex;flex-direction:column}
#flyout.open{width:230px}
#flyout-inner{width:230px;height:100%;overflow-y:auto;padding:12px}
.fly-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.fly-title{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text2)}
.fly-close{background:none;border:none;color:var(--text3);font-size:18px;line-height:1;padding:0}
.fly-close:hover{color:var(--text2)}
.section-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;margin-top:8px}
.shape-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
.shape-btn{aspect-ratio:1;background:var(--panel);border:1px solid var(--border);border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:20px;gap:2px;transition:all .2s}
.shape-btn span{font-size:7px;text-transform:uppercase}
.shape-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(91,106,240,.08)}
.text-add-btn{width:100%;padding:9px 12px;background:var(--panel);border:1.5px dashed var(--accent);border-radius:8px;cursor:pointer;color:var(--text2);font-size:11px;display:flex;align-items:center;gap:8px;margin-bottom:8px;transition:all .2s;text-align:left}
.text-add-btn:hover{background:rgba(91,106,240,.08);color:var(--accent)}
.text-preset{width:100%;padding:10px;background:var(--panel);border:1px solid var(--border);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;transition:all .2s;font-family:'Montserrat',sans-serif}
.text-preset:hover{border-color:var(--accent)}
.icon-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.icon-btn{aspect-ratio:1;background:var(--panel);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s;color:var(--text2)}
.icon-btn:hover{border-color:var(--accent);background:rgba(91,106,240,.08)}
.palette-bar{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.pal-btn{padding:3px 8px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:9px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s}
.pal-btn.active{border-color:var(--accent);background:rgba(91,106,240,.15);color:var(--accent)}
.pal-swatches{display:flex;gap:6px;margin-bottom:10px}
.swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0}
.swatch:hover{transform:scale(1.1)}
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px}
.cswatch{aspect-ratio:1;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .2s}
.cswatch:hover,.cswatch.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(91,106,240,.3)}
.grad-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:10px}
.grad-swatch{aspect-ratio:1;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,.08);transition:all .2s}
.grad-swatch:hover{transform:scale(1.05)}
.custom-color-row{display:flex;gap:6px;align-items:center}
.apply-btn{padding:4px 10px;border-radius:5px;background:var(--accent);border:none;color:#fff;font-size:11px;font-family:inherit;font-weight:600;cursor:pointer;flex-shrink:0}
.apply-btn:hover{background:var(--accent2)}
.bg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
.bg-swatch{aspect-ratio:1;border-radius:6px;cursor:pointer;border:2px solid rgba(255,255,255,.08);transition:all .2s}
.bg-swatch.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(91,106,240,.3)}
.bg-transparent-btn{width:100%;padding:7px;border:1px dashed var(--border);border-radius:7px;background:transparent;color:var(--text2);cursor:pointer;font-size:11px;font-family:inherit;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s}
.bg-transparent-btn:hover{border-color:var(--accent);color:var(--accent)}

/* CANVAS AREA */
#canvas-area{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#1c1c24;background-image:radial-gradient(circle,#25252f 1px,transparent 1px);background-size:20px 20px;cursor:default;position:relative}
#canvas-area.grid-on{background-image:radial-gradient(circle,#2e2e3e 1.5px,transparent 1.5px);background-size:20px 20px}
#canvas-wrap{position:relative;flex-shrink:0;transform-origin:center;transition:transform .15s}
#main-canvas{display:block;box-shadow:0 8px 60px rgba(0,0,0,.85);border-radius:2px;touch-action:none}
#sel-canvas{position:absolute;top:0;left:0;pointer-events:none}
#canvas-resize{position:absolute;bottom:-14px;right:-14px;width:28px;height:28px;background:linear-gradient(135deg,#5b6af0,#7c4af0);border-radius:50%;cursor:nwse-resize;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(91,106,240,.5);z-index:10;font-size:12px;color:#fff;border:none;line-height:1}
#canvas-resize:hover{transform:scale(1.1)}

/* RIGHT PANEL */
#right-panel{width:210px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .3s cubic-bezier(.4,0,.2,1);overflow:hidden}
#right-panel.collapsed{width:0!important;border-left:none!important}
.r-tabs{display:flex;border-bottom:1px solid var(--border)}
.rtab{flex:1;padding:7px 4px;background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:9px;font-family:inherit;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.5px}
.rtab.active{color:var(--accent);border-bottom-color:var(--accent)}
#tab-content{flex:1;overflow-y:auto;padding:9px}

/* PANEL TOGGLE */
#panel-toggle{position:fixed;right:210px;top:50%;transform:translateY(-50%);width:14px;height:60px;background:var(--panel2);border:1px solid var(--border);border-right:none;border-radius:8px 0 0 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:10px;transition:all .25s ease;z-index:200}
#panel-toggle:hover{background:var(--panel3);color:var(--accent)}
#panel-toggle.collapsed{right:0}

/* PROPS PANEL */
.prop-section{margin-bottom:12px}
.prop-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.prop-row{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.prop-input{flex:1;min-width:0}
.prop-mini-label{font-size:9px;color:var(--text3);min-width:8px;flex-shrink:0}
.slider-row{margin-bottom:6px}
.slider-header{display:flex;justify-content:space-between;margin-bottom:3px;font-size:9px;color:var(--text3)}
.slider-val{color:var(--text2)}
.align-btns{display:flex;gap:3px;margin-bottom:3px;flex-wrap:wrap}
.align-btn{flex:1;padding:4px 2px;border-radius:5px;background:var(--panel2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:12px;transition:all .2s;text-align:center}
.align-btn:hover{border-color:var(--accent);color:var(--accent)}
.order-btn{flex:1;padding:4px;border-radius:5px;background:var(--panel2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:10px;white-space:nowrap}
.toggle-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.toggle-row span{font-size:10px;color:var(--text2)}
.toggle{width:32px;height:16px;border-radius:8px;background:var(--border);border:none;cursor:pointer;position:relative;transition:all .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;background:#fff;border-radius:50%;transition:all .2s}
.toggle.on::after{left:18px}
.toggle.glow.on{background:var(--accent2)}
.text-align-btns{display:flex;gap:3px}
.ta-btn{flex:1;padding:3px 2px;border-radius:5px;background:var(--panel2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:11px;text-align:center}
.ta-btn.active{background:rgba(91,106,240,.2);border-color:var(--accent)}
.action-btns{display:flex;gap:4px;margin-top:8px}
.action-btn{flex:1;padding:5px;border-radius:6px;background:var(--panel2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:11px;transition:all .2s}
.action-btn.del-btn{background:rgba(239,68,68,.05);border-color:rgba(239,68,68,.3);color:var(--danger)}
.empty-props{text-align:center;color:var(--text3);padding:20px 0;font-size:11px}

/* LAYERS */
.layer-item{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:6px;background:var(--panel2);border:1px solid var(--border);cursor:pointer;font-size:10px;transition:all .15s;margin-bottom:3px;min-height:34px}
.layer-item.selected{background:rgba(91,106,240,.12);border-color:var(--accent)}
.layer-item.drag-over{border-color:var(--accent);border-style:dashed}
.layer-item.hidden-layer{opacity:.4}
.layer-drag{color:var(--text3);font-size:10px;cursor:grab;flex-shrink:0}
.layer-thumb{width:20px;height:20px;border-radius:4px;border:1px solid rgba(255,255,255,.1);flex-shrink:0}
.layer-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.layer-name-input{flex:1;background:var(--panel);border:1px solid var(--accent);border-radius:3px;padding:2px 4px;font-size:10px;color:var(--text);font-family:inherit;outline:none;min-width:0}
.layer-icon-btn{width:20px;height:20px;border-radius:4px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;transition:color .15s}
.layer-icon-btn:hover{color:var(--text2)}
.layers-header{display:flex;justify-content:space-between;margin-bottom:6px;font-size:10px;color:var(--text2);font-weight:600}

/* CANVAS SETTINGS */
.preset-btn{width:100%;padding:5px 8px;border-radius:6px;background:var(--panel2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:10px;font-family:inherit;display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;transition:all .2s;text-align:left}
.preset-btn.active{background:rgba(91,106,240,.15);border-color:var(--accent);color:var(--accent)}
.preset-dim{font-size:8px;color:var(--text3)}
.size-row{display:flex;gap:4px;margin-bottom:8px;align-items:center}
.size-x{font-size:12px;color:var(--text3);flex-shrink:0}
.bg-mini{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.bg-mini-swatch{width:28px;height:28px;border-radius:5px;cursor:pointer;border:2px solid rgba(255,255,255,.1);transition:all .2s;flex-shrink:0}
.bg-mini-swatch.active{border-color:var(--accent)}

/* EXPORT MODAL */
#export-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:9000}
#export-modal.hidden{display:none}
.export-box{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.export-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.export-header h3{font-weight:700;font-size:15px}
.export-close{background:none;border:none;color:var(--text3);font-size:20px;line-height:1}
.export-close:hover{color:var(--text2)}
.export-dim{font-size:10px;color:var(--text3);margin-bottom:12px;text-align:center}
.export-fmts{display:flex;flex-direction:column;gap:6px}
.export-fmt{padding:10px 14px;border-radius:9px;background:var(--panel2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:12px;transition:all .2s;text-align:left;width:100%}
.export-fmt:hover{border-color:var(--accent);background:rgba(91,106,240,.08)}
.export-fmt-icon{font-size:22px;flex-shrink:0}
.export-fmt-name{font-weight:700;font-size:12px;display:block}
.export-fmt-desc{font-size:10px;color:var(--text2);margin-top:1px;display:block}

/* CONTEXT BAR */
#ctx-bar{position:fixed;top:54px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);border-radius:25px;padding:4px 10px;display:flex;gap:3px;z-index:500;box-shadow:0 6px 24px rgba(0,0,0,.6);backdrop-filter:blur(8px)}
#ctx-bar.hidden{display:none}
.ctx-btn{width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.ctx-btn:hover{color:var(--text);background:rgba(255,255,255,.08)}
.ctx-btn.del{color:var(--danger)}
.ctx-div{width:1px;background:var(--border);margin:4px 3px}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:8px 20px;border-radius:20px;font-weight:600;font-size:12px;z-index:9999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;box-shadow:0 4px 20px rgba(91,106,240,.4);white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* INLINE TEXT OVERLAY */
#text-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:55;}
.text-inline-wrap{position:absolute;display:flex;align-items:center;gap:5px;pointer-events:all;transform:translateY(-110%);}
.text-inline-input{background:rgba(10,10,20,.85);border:2px solid #5b6af0;border-radius:6px;padding:5px 10px;color:#fff;font-size:15px;font-family:inherit;outline:none;min-width:140px;backdrop-filter:blur(4px);}
.text-confirm-btn{width:30px;height:30px;border-radius:50%;background:#5b6af0;border:none;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;box-shadow:0 4px 12px rgba(91,106,240,.5);display:flex;align-items:center;justify-content:center;}
.text-confirm-btn:hover{background:#7c4af0;}
.text-cancel-btn{width:24px;height:24px;border-radius:50%;background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#ef4444;font-size:12px;cursor:pointer;flex-shrink:0;}

/* DRAW CANVAS */
#draw-canvas{position:absolute;top:0;left:0;pointer-events:none;touch-action:none;}
#draw-canvas.drawing-active{pointer-events:all;cursor:crosshair;}
#draw-canvas.eraser-active{pointer-events:all;cursor:cell;}

/* DRAW TOOL / FILTER FLYOUT */
.draw-colors{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.draw-color-swatch{width:26px;height:26px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0;}
.draw-color-swatch.active{border-color:#fff;box-shadow:0 0 0 2px #5b6af0;}
.draw-tool-btn{width:100%;padding:8px 10px;border-radius:7px;background:var(--panel);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-family:inherit;font-size:11px;display:flex;align-items:center;gap:8px;margin-bottom:4px;transition:all .2s;text-align:left;}
.draw-tool-btn:hover,.draw-tool-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(91,106,240,.08);}
.draw-tool-btn .dt-icon{font-size:18px;flex-shrink:0;}
.filter-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:8px;}
.filter-btn{padding:7px 4px;border-radius:7px;background:var(--panel);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:9px;text-align:center;transition:all .2s;font-family:inherit;}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(91,106,240,.08);}
.filter-icon{font-size:18px;display:block;margin-bottom:2px;}
.tool-action-btn{width:100%;padding:7px 10px;border-radius:7px;background:var(--panel);border:1.5px dashed var(--border);color:var(--text2);cursor:pointer;font-family:inherit;font-size:11px;margin-bottom:5px;display:flex;align-items:center;gap:8px;transition:all .2s;text-align:left;}

.publish-btn-ok:hover{opacity:.9}

.publish-btn-cancel:hover{border-color:var(--accent);color:var(--text)}
</style>
</head>
<body>
<div id="app">
  <!-- TOP BAR -->
  <div id="topbar">
    <span class="logo-text">RC Logo Maker</span>
    <span class="canvas-dim" id="canvas-dims">500 × 500</span>

    <button class="tbtn" id="btn-publish" title="Publier ce template" style="color:#10b981;border-color:rgba(16,185,129,.3)">📤 Publier</button>

  </div>

  <!-- MAIN -->

    <!-- SIDEBAR -->

      <button class="stool" data-fly="shapes" title="Formes">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 20 20"><rect x="3" y="5" width="14" height="10" rx="2"/></svg>FORMES
      </button>
      <button class="stool" data-fly="text" title="Texte">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 20 20"><path d="M4 5h12M10 5v12"/></svg>TEXTE

      <button class="stool" data-fly="icons" title="Icônes">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 20 20"><path d="M10 2l2 5h5l-4 3 1 5-4-3-4 3 1-5-4-3h5z"/></svg>ICÔNES
      </button>

        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 20 20"><rect x="2" y="2" width="16" height="16" rx="2"/></svg>FOND

      <button class="stool" id="qadd-text" title="Texte"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 20 20"><path d="M5 5h10M10 5v12"/></svg></button>

<script>
'use strict';

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const FONTS = ['Montserrat','Playfair Display','Poppins','Bebas Neue','Righteous','Oswald','Roboto','League Spartan','Caveat','Inter','Pacifico','Abril Fatface','Alfa Slab One','Lobster','Fjalla One','DM Sans'];
const COLORS_BASE = ['#ffffff','#000000','#ef4444','#f97316','#f59e0b','#84cc16','#22c55e','#14b8a6','#06b6d4','#3b82f6','#6366f1','#8b5cf6','#a855f7','#ec4899','#5b6af0','#7c4af0','#43e97b','#f0932b','#e11d48','#78716c'];
const PALETTES = [
  { name:'Moderne', colors:['#5B6AF0','#7C4AF0','#10B981','#F59E0B','#EC4899'] },
  { name:'Luxe',    colors:['#D4AF37','#1A1A2E','#E8E8EE','#8B5CF6','#F97316'] },
  { name:'Nature',  colors:['#34D399','#065F46','#FCD34D','#92400E','#22C55E'] },
  { name:'Tech',    colors:['#0EA5E9','#0284C7','#F0F9FF','#1E293B','#6366F1'] },
  { name:'Vintage', colors:['#5C3D2E','#B45309','#FDE68A','#7F1D1D','#D97706'] },
];
const GRADIENTS = [
  { name:'Sunset',  css:'linear-gradient(135deg,#f97316,#ec4899)', c:'#f97316' },
  { name:'Ocean',   css:'linear-gradient(135deg,#06b6d4,#3b82f6)', c:'#06b6d4' },
  { name:'Forest',  css:'linear-gradient(135deg,#22c55e,#14b8a6)', c:'#22c55e' },
  { name:'Dusk',    css:'linear-gradient(135deg,#5b6af0,#7c4af0)', c:'#5b6af0' },
  { name:'Dawn',    css:'linear-gradient(135deg,#f59e0b,#ef4444)', c:'#f59e0b' },
  { name:'Galaxy',  css:'linear-gradient(135deg,#1a1a2e,#7c4af0)', c:'#7c4af0' },
  { name:'Gold',    css:'linear-gradient(135deg,#d4af37,#f97316)', c:'#d4af37' },
  { name:'Mint',    css:'linear-gradient(135deg,#34d399,#06b6d4)', c:'#34d399' },
  { name:'Rose',    css:'linear-gradient(135deg,#ec4899,#a855f7)', c:'#ec4899' },
  { name:'Ice',     css:'linear-gradient(135deg,#e0f2fe,#a5f3fc)', c:'#e0f2fe' },
];
const ICONS = ['★','♦','♠','♥','♣','◆','▲','▼','●','■','⬡','⌂','✈','⚡','✦','❋','✿','❀','✺','☀','☁','❄','♺','⚙','✉','☎','⚑','♫','✂','❤','☮','☯','✌','♻','⚜','✡','⚔','⚽','🎯','🎨'];
const SIZES = [
  {w:500,h:500,label:'Carré 500'},{w:600,h:600,label:'Logo 600'},
  {w:800,h:400,label:'Bannière'},{w:400,h:800,label:'Portrait'},
  {w:1024,h:512,label:'Twitter'},{w:800,h:800,label:'Instagram'},
];
const BG_PRESETS = ['#ffffff','#000000','#0d0d0f','#1a1a2e','#f8fafc','#fef2f2','#f0fdf4','#fffbeb','#0f172a','#1e1b4b','#14532d','#431407'];
const SNAP_GRID = 20;
const HANDLE_R = 7;
const ROTATE_OFF = 30;

// ─── STATE ────────────────────────────────────────────────────────────────────
let uid = 0;
const mkId = () => String(++uid);
const S = {
  elements: [],
  selectedIds: [],
  history: [[]],
  histIdx: 0,
  zoom: 0.8,
  canvasW: 500,
  canvasH: 500,
  canvasBg: '#ffffff',
  flyout: null,
  activeTab: 'props',
  snap: true,
  showGrid: false,
  activePalette: 0,
  customHex: '#5b6af0',
  bgCustomHex: '#ffffff',
  isDragging: false,
  isResizing: false,
  isRotating: false,
  dragOffX: 0, dragOffY: 0,
  resizeDir: null,
  rotStartAngle: 0, rotOrigAngle: 0, rotCX: 0, rotCY: 0,
  canvasResizing: false, crStartX: 0, crStartY: 0, crStartW: 0, crStartH: 0,
  dragLayerId: null,
  panelCollapsed: false,
  drawMode: null,
  drawSize: 4,
  drawColor: '#5b6af0',
  isDrawing: false,
  drawLastX: 0,
  drawLastY: 0,
  activeFilterId: 'none',
  activeFilterCSS: null,
  cartoonData: null,
};

// ─── RÉCUPÉRER LE TEMPLATE DEPUIS L'URL ───
const urlParams = new URLSearchParams(window.location.search);
const templateIndex = urlParams.get('template');

if (templateIndex !== null) {
    const stored = sessionStorage.getItem('rcTemplate');
    if (stored) {
        const tpl = JSON.parse(stored);
        console.log('📐 Template chargé :', tpl.name);
        window.loadedTemplate = tpl;
    }
}

// ─── CHARGER LE TEMPLATE DANS L'ÉDITEUR ───
if (window.loadedTemplate) {
    const tpl = window.loadedTemplate;
    console.log('🎨 Chargement du template dans l\'éditeur :', tpl.name);
    
    // Créer un rectangle de fond
    const bgRect = makeRect(50, 50, 400, 400);
    bgRect.fill = '#5b6af0';
    bgRect.rx = 20;
    S.elements.push(bgRect);
    
    // Ajouter le texte du template
    const txt = makeText(250, 250, tpl.name);
    txt.fontSize = 80;
    txt.weight = '900';
    txt.fill = '#ffffff';
    S.elements.push(txt);
    
    // Sélectionner le premier élément
    S.selectedIds = [bgRect.id];
}


// ─── CHARGER UN TEMPLATE UTILISATEUR DEPUIS L'URL ───
const userTplParam = urlParams.get('usertemplate');
if (userTplParam !== null) {
  try {
    const storedUserTpl = sessionStorage.getItem('rcUserTemplate');
    if (storedUserTpl) {
      const userTpl = JSON.parse(storedUserTpl);
      // Restore canvas settings
      if (userTpl.canvasW) { S.canvasW = userTpl.canvasW; }
      if (userTpl.canvasH) { S.canvasH = userTpl.canvasH; }
      if (userTpl.canvasBg) { S.canvasBg = userTpl.canvasBg; }
      // Restore elements (rebuilt after DOM ready)
      window._pendingUserTplElements = userTpl.elements || [];
    }
  } catch(e) { console.warn('Erreur chargement template utilisateur', e); }
}

// ─── DOM REFS ─────────────────────────────────────────────────────────────────
const mainCanvas = document.getElementById('main-canvas');
const selCanvas  = document.getElementById('sel-canvas');
const ctx        = mainCanvas.getContext('2d');
const selCtx     = selCanvas.getContext('2d');
const canvasWrap = document.getElementById('canvas-wrap');
const canvasArea = document.getElementById('canvas-area');
const drawCanvas = document.getElementById('draw-canvas');
const dCtx       = drawCanvas.getContext('2d');

// ─── CANVAS UTILITIES ─────────────────────────────────────────────────────────
function getBB(el) {
  switch(el.type) {
    case 'rect':    return {x:el.x, y:el.y, w:el.w, h:el.h};
    case 'circle':  return {x:el.x-el.r, y:el.y-el.r, w:el.r*2, h:el.r*2};
    case 'triangle':return {x:el.x-el.size/2, y:el.y-el.size/2, w:el.size, h:el.size};
    case 'star':    return {x:el.x-el.outerR, y:el.y-el.outerR, w:el.outerR*2, h:el.outerR*2};
    case 'polygon': return {x:el.x-el.size, y:el.y-el.size, w:el.size*2, h:el.size*2};
    case 'heart':   return {x:el.x-el.size/2, y:el.y-el.size/2, w:el.size, h:el.size};
    case 'line': {
      const mx=Math.min(el.x1,el.x2), my=Math.min(el.y1,el.y2);
      return {x:mx, y:my, w:Math.abs(el.x2-el.x1)||4, h:Math.abs(el.y2-el.y1)||4};
    }
    case 'text': {
      ctx.font = `${el.style||'normal'} ${el.weight||'400'} ${el.fontSize||40}px "${el.font}"`;
      const lines = (el.text||'').split('\n');
      const w = Math.max(...lines.map(l => ctx.measureText(l).width));
      const h = (el.fontSize||40) * (el.lineHeight||1.2) * lines.length;
      return {x:el.x - w/2, y:el.y, w, h};
    }
    case 'icon':    return {x:el.x-el.size/2, y:el.y-el.size/2, w:el.size, h:el.size};
    case 'image':   return {x:el.x, y:el.y, w:el.w, h:el.h};
    default:        return {x:el.x-25, y:el.y-25, w:50, h:50};
  }
}

function getHandles(bb) {
  return {
    nw:{x:bb.x,       y:bb.y},
    n: {x:bb.x+bb.w/2,y:bb.y},
    ne:{x:bb.x+bb.w,  y:bb.y},
    w: {x:bb.x,       y:bb.y+bb.h/2},
    e: {x:bb.x+bb.w,  y:bb.y+bb.h/2},
    sw:{x:bb.x,       y:bb.y+bb.h},
    s: {x:bb.x+bb.w/2,y:bb.y+bb.h},
    se:{x:bb.x+bb.w,  y:bb.y+bb.h},
  };
}

function getResizeHandle(pos, el) {
  const bb = getBB(el); const bb2 = {x:bb.x-3,y:bb.y-3,w:bb.w+6,h:bb.h+6};
  for (const [h, hp] of Object.entries(getHandles(bb2))) {
    if (Math.hypot(pos.x-hp.x, pos.y-hp.y) <= 12) return h;
  }
  return null;
}

function isRotateHandle(pos, el) {
  const bb = getBB(el);
  return Math.hypot(pos.x - (bb.x+bb.w/2), pos.y - (bb.y-ROTATE_OFF)) <= 12;
}

function hitTest(pos, el) {
  const bb = getBB(el);
  return pos.x >= bb.x-10 && pos.x <= bb.x+bb.w+10 && pos.y >= bb.y-10 && pos.y <= bb.y+bb.h+10;
}

function elementAt(pos) {
  for (let i = S.elements.length-1; i >= 0; i--) {
    const el = S.elements[i];
    if (el.visible !== false && !el.locked && hitTest(pos, el)) return el;
  }
  return null;
}

function roundRect(c, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  c.beginPath();
  c.moveTo(x+r, y); c.lineTo(x+w-r, y); c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w, y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r, y+h); c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x, y+r); c.arcTo(x,y,x+r,y,r);
  c.closePath();
}

function drawEl(c, el) {
  c.save();
  c.globalAlpha = el.opacity ?? 1;
  if (el.rotation) {
    const bb = getBB(el);
    const cx = el.type==='line' ? (el.x1+el.x2)/2 : bb.x+bb.w/2;
    const cy = el.type==='line' ? (el.y1+el.y2)/2 : bb.y+bb.h/2;
    c.translate(cx,cy); c.rotate(el.rotation*Math.PI/180); c.translate(-cx,-cy);
  }
  if (el.glow) {
    c.shadowColor = el.glow.color || 'rgba(91,106,240,.6)';
    c.shadowBlur  = el.glow.blur  || 15;
    c.shadowOffsetX = 0; c.shadowOffsetY = 0;
  } else if (el.shadow) {
    c.shadowColor   = el.shadow.color || 'rgba(0,0,0,.3)';
    c.shadowBlur    = el.shadow.blur  || 10;
    c.shadowOffsetX = el.shadow.x || 3;
    c.shadowOffsetY = el.shadow.y || 3;
  }
  switch(el.type) {
    case 'rect':
      c.fillStyle = el.fill||'#5b6af0';
      if (el.rx>0) { roundRect(c,el.x,el.y,el.w,el.h,el.rx); c.fill(); }
      else c.fillRect(el.x,el.y,el.w,el.h);
      if (el.stroke && el.stroke!=='none' && el.strokeW>0) {
        c.strokeStyle=el.stroke; c.lineWidth=el.strokeW;
        if (el.rx>0) { roundRect(c,el.x,el.y,el.w,el.h,el.rx); c.stroke(); }
        else c.strokeRect(el.x,el.y,el.w,el.h);
      } break;
    case 'circle':
      c.beginPath(); c.arc(el.x,el.y,el.r,0,Math.PI*2);
      c.fillStyle=el.fill||'#7c4af0'; c.fill();
      if (el.stroke&&el.stroke!=='none'&&el.strokeW>0) { c.strokeStyle=el.stroke; c.lineWidth=el.strokeW; c.stroke(); }
      break;
    case 'triangle': {
      const s=el.size;
      c.beginPath(); c.moveTo(el.x,el.y-s/2); c.lineTo(el.x+s/2,el.y+s/2); c.lineTo(el.x-s/2,el.y+s/2); c.closePath();
      c.fillStyle=el.fill||'#43e97b'; c.fill(); break;
    }
    case 'star':
      c.beginPath();
      for (let i=0;i<el.points*2;i++) {
        const a=(i/(el.points*2))*Math.PI*2-Math.PI/2;
        const r=i%2===0?el.outerR:el.innerR;
        i===0?c.moveTo(el.x+r*Math.cos(a),el.y+r*Math.sin(a)):c.lineTo(el.x+r*Math.cos(a),el.y+r*Math.sin(a));
      }
      c.closePath(); c.fillStyle=el.fill||'#f59e0b'; c.fill(); break;
    case 'polygon':
      c.beginPath();
      for (let i=0;i<el.sides;i++) {
        const a=(i/el.sides)*Math.PI*2-Math.PI/2;
        i===0?c.moveTo(el.x+el.size*Math.cos(a),el.y+el.size*Math.sin(a)):c.lineTo(el.x+el.size*Math.cos(a),el.y+el.size*Math.sin(a));
      }
      c.closePath(); c.fillStyle=el.fill||'#06b6d4'; c.fill(); break;
    case 'heart':
      c.save(); c.translate(el.x,el.y); c.scale(el.size/180,el.size/180);
      c.fillStyle=el.fill||'#ef4444'; c.beginPath();
      c.moveTo(0,-30); c.bezierCurveTo(-50,-80,-80,-20,0,50); c.bezierCurveTo(80,-20,50,-80,0,-30);
      c.fill(); c.restore(); break;
    case 'line':
      c.beginPath(); c.moveTo(el.x1,el.y1); c.lineTo(el.x2,el.y2);
      c.strokeStyle=el.stroke||el.fill||'#ffffff'; c.lineWidth=el.strokeW||3; c.stroke(); break;
    case 'text': {
      c.font=`${el.style||'normal'} ${el.weight||'400'} ${el.fontSize||40}px "${el.font}"`;
      c.textAlign=el.align||'center'; c.textBaseline='top';
      if (el.letterSpacing) c.letterSpacing=el.letterSpacing+'px';
      c.fillStyle=el.fill||'#ffffff';
      const lines=(el.text||'').split('\n');
      lines.forEach((l,i)=>c.fillText(l,el.x,el.y+i*(el.fontSize||40)*(el.lineHeight||1.2)));
      c.letterSpacing='0px'; break;
    }
    case 'icon':
      c.font=`${el.size}px serif`; c.textAlign='center'; c.textBaseline='middle';
      c.fillStyle=el.fill||'#ffffff'; c.fillText(el.char,el.x,el.y); break;
    case 'image':
      if (el.img) {
        c.drawImage(el.img, el.x, el.y, el.w, el.h);
      }
      break;
  }
  c.restore();
}

function render() {
  ctx.clearRect(0,0,mainCanvas.width,mainCanvas.height);
  if (S.canvasBg==='transparent') {
    for (let x=0;x<mainCanvas.width;x+=20)
      for (let y=0;y<mainCanvas.height;y+=20) {
        ctx.fillStyle=((Math.floor(x/20)+Math.floor(y/20))%2===0)?'#ddd':'#fff';
        ctx.fillRect(x,y,20,20);
      }
  } else {
    ctx.fillStyle=S.canvasBg; ctx.fillRect(0,0,mainCanvas.width,mainCanvas.height);
  }
  S.elements.filter(e=>e.visible!==false).forEach(e=>drawEl(ctx,e));
  if (drawLayerHasContent()) ctx.drawImage(drawCanvas, 0, 0);
  if (S.activeFilterCSS && S.activeFilterCSS !== '__cartoon__') {
    const tmp=document.createElement('canvas'); tmp.width=mainCanvas.width; tmp.height=mainCanvas.height;
    const tc=tmp.getContext('2d'); tc.filter=S.activeFilterCSS; tc.drawImage(mainCanvas,0,0);
    ctx.clearRect(0,0,mainCanvas.width,mainCanvas.height); ctx.drawImage(tmp,0,0);
  }
  if (S.cartoonData) { ctx.clearRect(0,0,mainCanvas.width,mainCanvas.height); ctx.putImageData(S.cartoonData,0,0); }
  drawSelection();
}

function drawLayerHasContent() {
  return true;
}

function drawSelection() {
  selCtx.clearRect(0,0,selCanvas.width,selCanvas.height);
  S.selectedIds.forEach(id => {
    const el = S.elements.find(e=>e.id===id); if (!el) return;
    const bb = getBB(el);
    selCtx.strokeStyle='#5b6af0'; selCtx.lineWidth=2; selCtx.setLineDash([6,3]);
    selCtx.strokeRect(bb.x-3,bb.y-3,bb.w+6,bb.h+6); selCtx.setLineDash([]);
    const handles = getHandles({x:bb.x-3,y:bb.y-3,w:bb.w+6,h:bb.h+6});
    Object.values(handles).forEach(hp=>{
      selCtx.beginPath(); selCtx.arc(hp.x,hp.y,HANDLE_R,0,Math.PI*2);
      selCtx.fillStyle='#fff'; selCtx.shadowColor='rgba(0,0,0,.4)'; selCtx.shadowBlur=4;
      selCtx.fill(); selCtx.shadowBlur=0;
      selCtx.strokeStyle='#5b6af0'; selCtx.lineWidth=2; selCtx.stroke();
    });
  });
  if (S.selectedIds.length===1) {
    const el = S.elements.find(e=>e.id===S.selectedIds[0]); if (!el) return;
    const bb = getBB(el);
    const rx=bb.x+bb.w/2, ry=bb.y-ROTATE_OFF;
    selCtx.strokeStyle='rgba(91,106,240,.5)'; selCtx.lineWidth=1.5; selCtx.setLineDash([3,3]);
    selCtx.beginPath(); selCtx.moveTo(bb.x+bb.w/2,bb.y-3); selCtx.lineTo(rx,ry); selCtx.stroke();
    selCtx.setLineDash([]);
    selCtx.beginPath(); selCtx.arc(rx,ry,8,0,Math.PI*2);
    selCtx.fillStyle='#5b6af0'; selCtx.shadowColor='rgba(91,106,240,.5)'; selCtx.shadowBlur=8; selCtx.fill();
    selCtx.shadowBlur=0; selCtx.strokeStyle='#fff'; selCtx.lineWidth=1.5; selCtx.stroke();
  }
}

// ─── ELEMENT FACTORIES ────────────────────────────────────────────────────────
const cx = () => S.canvasW/2;
const cy = () => S.canvasH/2;
function mkRect()     { return {id:mkId(),type:'rect',    x:cx()-60,y:cy()-40,w:120,h:80,  fill:'#5b6af0',stroke:'none',strokeW:0,rx:0,  opacity:1,rotation:0,visible:true}; }
function mkCircle()   { return {id:mkId(),type:'circle',  x:cx(),   y:cy(),   r:60,         fill:'#7c4af0',opacity:1,rotation:0,visible:true}; }
function mkTriangle() { return {id:mkId(),type:'triangle',x:cx(),   y:cy(),   size:110,      fill:'#43e97b',opacity:1,rotation:0,visible:true}; }
function mkStar()     { return {id:mkId(),type:'star',    x:cx(),   y:cy(),   outerR:60,innerR:25,points:5,fill:'#f59e0b',opacity:1,rotation:0,visible:true}; }
function mkPolygon()  { return {id:mkId(),type:'polygon', x:cx(),   y:cy(),   size:60,sides:6,fill:'#06b6d4',opacity:1,rotation:0,visible:true}; }
function mkHeart()    { return {id:mkId(),type:'heart',   x:cx(),   y:cy(),   size:120,      fill:'#ef4444',opacity:1,rotation:0,visible:true}; }
function mkLine()     { return {id:mkId(),type:'line',    x1:cx()-80,y1:cy(),x2:cx()+80,y2:cy(),x:cx()-80,y:cy(),stroke:'#ffffff',strokeW:3,opacity:1,rotation:0,visible:true}; }
function mkText(t)    { return {id:mkId(),type:'text',    x:cx(),y:cy()-20,text:t||'MON LOGO',font:'Montserrat',fontSize:40,weight:'900',fill:'#ffffff',align:'center',opacity:1,rotation:0,visible:true,letterSpacing:0,lineHeight:1.2}; }
function mkIcon(c)    { return {id:mkId(),type:'icon',    x:cx(),y:cy(),    char:c,size:70,   fill:'#ffffff',opacity:1,rotation:0,visible:true}; }

// ─── HISTORY ──────────────────────────────────────────────────────────────────
function saveHistory() {
  // For image elements, we don't serialize the img object — just the src
  const snap = JSON.stringify(S.elements, (k, v) => k === 'img' ? undefined : v);
  S.history = S.history.slice(0, S.histIdx+1);
  S.history.push(snap);
  if (S.history.length > 50) S.history.shift();
  S.histIdx = S.history.length-1;
  updateTopBarButtons();
}
function restoreElements(parsed) {
  S.elements = parsed;
  // Rebuild img objects for image elements
  S.elements.forEach(el => {
    if (el.type === 'image' && el.src && !el.img) {
      const img = new Image();
      img.onload = () => render();
      img.src = el.src;
      el.img = img;
    }
  });
}
function undo() {
  if (S.histIdx <= 0) return;
  S.histIdx--; restoreElements(JSON.parse(S.history[S.histIdx]));
  S.selectedIds=[]; render(); updateRightPanel(); updateContextBar(); toast('↩ Annulé'); updateTopBarButtons();
}
function redo() {
  if (S.histIdx >= S.history.length-1) return;
  S.histIdx++; restoreElements(JSON.parse(S.history[S.histIdx]));
  S.selectedIds=[]; render(); updateRightPanel(); updateContextBar(); toast('↪ Rétabli'); updateTopBarButtons();
}

// ─── ELEMENT OPERATIONS ───────────────────────────────────────────────────────
function addElement(el) {
  S.elements.push(el);
  S.selectedIds=[el.id];
  saveHistory(); render(); updateRightPanel(); updateContextBar();
  S.activeTab='props'; updateTabUI();
  toast(layerName(el)+' ajouté');
}

function deleteSelected() {
  if (!S.selectedIds.length) return;
  S.elements = S.elements.filter(e=>!S.selectedIds.includes(e.id));
  S.selectedIds=[]; saveHistory(); render(); updateRightPanel(); updateContextBar(); toast('Supprimé');
}

function duplicateSelected() {
  if (!S.selectedIds.length) return;
  const copies = S.selectedIds.map(id => {
    const el = S.elements.find(e=>e.id===id); if (!el) return null;
    const copy = {...JSON.parse(JSON.stringify(el, (k,v)=>k==='img'?undefined:v)), id:mkId(), x:el.x+20, y:el.y+20};
    if (el.type === 'image' && el.src) {
      const img = new Image(); img.src = el.src; copy.img = img;
    }
    return copy;
  }).filter(Boolean);
  copies.forEach(c=>S.elements.push(c));
  S.selectedIds=copies.map(c=>c.id);
  saveHistory(); render(); updateRightPanel(); updateContextBar(); toast('Dupliqué');
}

function bringForward() {
  if (!S.selectedIds[0]) return;
  const idx=S.elements.findIndex(e=>e.id===S.selectedIds[0]);
  if (idx<S.elements.length-1) {[S.elements[idx],S.elements[idx+1]]=[S.elements[idx+1],S.elements[idx]]; saveHistory(); render(); toast('Avant-plan');}
}
function sendBackward() {
  if (!S.selectedIds[0]) return;
  const idx=S.elements.findIndex(e=>e.id===S.selectedIds[0]);
  if (idx>0) {[S.elements[idx],S.elements[idx-1]]=[S.elements[idx-1],S.elements[idx]]; saveHistory(); render(); toast('Arrière-plan');}
}

function patchEl(id, patch, save=false) {
  const el = S.elements.find(e=>e.id===id); if (!el) return;
  for (const [k,v] of Object.entries(patch)) {
    if (k.includes('.')) {
      const [p,c] = k.split('.');
      if (!el[p]) el[p] = {};
      el[p][c] = v;
    } else { el[k]=v; }
  }
  render();
  if (save) saveHistory();
}

function alignSelected(dir) {
  S.selectedIds.forEach(id => {
    const el = S.elements.find(e=>e.id===id); if (!el) return;
    const bb = getBB(el);
    switch(dir) {
      case 'left':   el.x = el.type==='rect'||el.type==='image'?0:el.x-bb.x; break;
      case 'center': el.x = el.type==='rect'||el.type==='image'?S.canvasW/2-bb.w/2:S.canvasW/2; break;
      case 'right':  el.x = el.type==='rect'||el.type==='image'?S.canvasW-bb.w:el.x+(S.canvasW-bb.x-bb.w); break;
      case 'top':    el.y = el.type==='rect'||el.type==='image'?0:el.y-bb.y; break;
      case 'middle': el.y = el.type==='rect'||el.type==='image'?S.canvasH/2-bb.h/2:S.canvasH/2; break;
      case 'bottom': el.y = el.type==='rect'||el.type==='image'?S.canvasH-bb.h:el.y+(S.canvasH-bb.y-bb.h); break;
    }
  });
  saveHistory(); render(); updateRightPanel(); toast('Aligné');
}

function resizeElement(el, dir, dx, dy) {
  const MIN=20; const bb=getBB(el);
  let nx=bb.x,ny=bb.y,nw=bb.w,nh=bb.h;
  switch(dir) {
    case 'se': nw=Math.max(MIN,bb.w+dx); nh=Math.max(MIN,bb.h+dy); break;
    case 'e':  nw=Math.max(MIN,bb.w+dx); break;
    case 's':  nh=Math.max(MIN,bb.h+dy); break;
    case 'sw': nw=Math.max(MIN,bb.w-dx); nh=Math.max(MIN,bb.h+dy); nx=bb.x+bb.w-nw; break;
    case 'nw': nw=Math.max(MIN,bb.w-dx); nh=Math.max(MIN,bb.h-dy); nx=bb.x+bb.w-nw; ny=bb.y+bb.h-nh; break;
    case 'ne': nw=Math.max(MIN,bb.w+dx); nh=Math.max(MIN,bb.h-dy); ny=bb.y+bb.h-nh; break;
    case 'w':  nw=Math.max(MIN,bb.w-dx); nx=bb.x+bb.w-nw; break;
    case 'n':  nh=Math.max(MIN,bb.h-dy); ny=bb.y+bb.h-nh; break;
  }
  const sx=nw/bb.w, sy=nh/bb.h;
  switch(el.type) {
    case 'rect':    el.x=nx;el.y=ny;el.w=nw;el.h=nh; break;
    case 'circle':  el.x=nx+nw/2;el.y=ny+nh/2;el.r=Math.max(MIN/2,Math.min(nw,nh)/2); break;
    case 'text':    el.x=nx+nw/2;el.y=ny;el.fontSize=Math.max(8,el.fontSize*Math.min(sx,sy)); break;
    case 'triangle':el.x=nx+nw/2;el.y=ny+nh/2;el.size=Math.max(MIN,el.size*Math.min(sx,sy)); break;
    case 'star':    el.x=nx+nw/2;el.y=ny+nh/2;el.outerR=Math.max(MIN,el.outerR*Math.min(sx,sy));el.innerR=el.outerR*.4; break;
    case 'polygon': el.x=nx+nw/2;el.y=ny+nh/2;el.size=Math.max(MIN,el.size*Math.min(sx,sy)); break;
    case 'heart':   el.x=nx+nw/2;el.y=ny+nh/2;el.size=Math.max(MIN,el.size*Math.min(sx,sy)); break;
    case 'icon':    el.x=nx+nw/2;el.y=ny+nh/2;el.size=Math.max(MIN,el.size*Math.min(sx,sy)); break;
    case 'image':   el.x=nx;el.y=ny;el.w=nw;el.h=nh; break;
  }
}

// ─── CANVAS POINTER EVENTS ────────────────────────────────────────────────────
function canvasPos(e) {
  const r = mainCanvas.getBoundingClientRect();
  return {x:(e.clientX-r.left)/S.zoom, y:(e.clientY-r.top)/S.zoom};
}

mainCanvas.addEventListener('pointerdown', e=>{
  e.preventDefault();
  const pos = canvasPos(e);
  if (S.selectedIds.length===1) {
    const el = S.elements.find(e=>e.id===S.selectedIds[0]);
    if (el && isRotateHandle(pos,el)) {
      const bb=getBB(el);
      S.isRotating=true; S.rotCX=bb.x+bb.w/2; S.rotCY=bb.y+bb.h/2;
      S.rotStartAngle=Math.atan2(pos.y-S.rotCY,pos.x-S.rotCX);
      S.rotOrigAngle=el.rotation||0;
      mainCanvas.setPointerCapture(e.pointerId); return;
    }
  }
  if (S.selectedIds.length===1) {
    const el = S.elements.find(e=>e.id===S.selectedIds[0]);
    if (el) {
      const dir = getResizeHandle(pos,el);
      if (dir) {
        S.isResizing=true; S.resizeDir=dir; S.dragOffX=pos.x; S.dragOffY=pos.y;
        mainCanvas.setPointerCapture(e.pointerId); return;
      }
    }
  }
  const hit = elementAt(pos);
  if (hit) {
    if (e.shiftKey) {
      S.selectedIds = S.selectedIds.includes(hit.id) ? S.selectedIds.filter(i=>i!==hit.id) : [...S.selectedIds, hit.id];
    } else {
      if (!S.selectedIds.includes(hit.id)) S.selectedIds=[hit.id];
    }
    S.isDragging=true; S.dragOffX=pos.x-hit.x; S.dragOffY=pos.y-hit.y;
    mainCanvas.setPointerCapture(e.pointerId);
    S.activeTab='props'; updateTabUI(); updateRightPanel();
  } else {
    S.selectedIds=[];
  }
  render(); updateContextBar();
});

mainCanvas.addEventListener('pointermove', e=>{
  if (!S.isDragging && !S.isResizing && !S.isRotating) return;
  e.preventDefault();
  const pos = canvasPos(e);
  if (S.isRotating && S.selectedIds.length===1) {
    const angle = Math.atan2(pos.y-S.rotCY, pos.x-S.rotCX);
    const delta = (angle-S.rotStartAngle)*180/Math.PI;
    const el = S.elements.find(e=>e.id===S.selectedIds[0]);
    if (el) { el.rotation = Math.round(S.rotOrigAngle+delta); render(); updatePropsPanel(); }
    return;
  }
  if (S.isResizing && S.selectedIds.length===1 && S.resizeDir) {
    const el = S.elements.find(e=>e.id===S.selectedIds[0]);
    if (el) {
      const dx=pos.x-S.dragOffX, dy=pos.y-S.dragOffY;
      resizeElement(el, S.resizeDir, dx, dy);
      S.dragOffX=pos.x; S.dragOffY=pos.y; render(); updatePropsPanel();
    }
    return;
  }
  if (S.isDragging) {
    S.selectedIds.forEach(id=>{
      const el=S.elements.find(e=>e.id===id); if (!el) return;
      let nx=pos.x-S.dragOffX, ny=pos.y-S.dragOffY;
      if (S.snap) { nx=Math.round(nx/SNAP_GRID)*SNAP_GRID; ny=Math.round(ny/SNAP_GRID)*SNAP_GRID; }
      el.x=nx; el.y=ny;
      if (el.type==='line') { const dx=el.x2-el.x1; const dy=el.y2-el.y1; el.x1=nx; el.y1=ny; el.x2=nx+dx; el.y2=ny+dy; }
    });
    render();
  }
});

mainCanvas.addEventListener('pointerup', ()=>{
  if (S.isDragging||S.isResizing||S.isRotating) { saveHistory(); updateRightPanel(); }
  S.isDragging=false; S.isResizing=false; S.isRotating=false; S.resizeDir=null;
});

mainCanvas.addEventListener('dblclick', e=>{
  const pos=canvasPos(e);
  const hit=elementAt(pos);
  if (hit?.type==='text') openInlineTextEditor(hit);
});

// Wheel zoom
canvasArea.addEventListener('wheel', e=>{
  if (e.ctrlKey||e.metaKey) { e.preventDefault(); S.zoom=Math.min(3,Math.max(.2,S.zoom-e.deltaY*.001)); applyZoom(); }
},{passive:false});

// Canvas resize handle
const crHandle = document.getElementById('canvas-resize');
crHandle.addEventListener('pointerdown', e=>{
  e.stopPropagation(); S.canvasResizing=true;
  S.crStartX=e.clientX; S.crStartY=e.clientY;
  S.crStartW=S.canvasW; S.crStartH=S.canvasH;
  crHandle.setPointerCapture(e.pointerId);
});
window.addEventListener('pointermove', e=>{
  if (!S.canvasResizing) return;
  const dx=e.clientX-S.crStartX, dy=e.clientY-S.crStartY;
  const ns=Math.max(200,Math.min(1200,Math.max(S.crStartW+dx,S.crStartH+dy)));
  S.canvasW=ns; S.canvasH=ns;
  mainCanvas.width=ns; mainCanvas.height=ns;
  selCanvas.width=ns; selCanvas.height=ns;
  drawCanvas.width=ns; drawCanvas.height=ns;
  document.getElementById('canvas-dims').textContent=ns+' × '+ns;
  updateCanvasSettingsPanel(); render();
});
window.addEventListener('pointerup', ()=>{
  if (S.canvasResizing) { S.canvasResizing=false; saveHistory(); }
});

function applyZoom() {
  canvasWrap.style.transform=`scale(${S.zoom})`;
  document.getElementById('zoom-val').textContent=Math.round(S.zoom*100)+'%';
}

// ─── PANEL TOGGLE ──────────────────────────────────────────────────────────────
const panelToggle = document.getElementById('panel-toggle');
const rightPanel  = document.getElementById('right-panel');

function updatePanelToggle() {
  if (S.panelCollapsed) {
    rightPanel.classList.add('collapsed');
    panelToggle.classList.add('collapsed');
    panelToggle.textContent = '‹';
    panelToggle.style.right = '0';
  } else {
    rightPanel.classList.remove('collapsed');
    panelToggle.classList.remove('collapsed');
    panelToggle.textContent = '›';
    panelToggle.style.right = '210px';
  }
}

panelToggle.addEventListener('click', () => {
  S.panelCollapsed = !S.panelCollapsed;
  updatePanelToggle();
});

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.stool[data-fly]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const f=btn.dataset.fly;
    S.flyout = S.flyout===f ? null : f;
    updateFlyout();
  });
});
document.getElementById('qadd-rect').addEventListener('click',     ()=>addElement(mkRect()));

// ─── IMAGE IMPORT ─────────────────────────────────────────────────────────────
function importImage() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const img = new Image();
      img.onload = function() {
        const maxW = Math.min(200, S.canvasW * 0.4);
        const ratio = img.height / img.width;
        const el = {
          id: mkId(),
          type: 'image',
          x: cx() - maxW/2,
          y: cy() - (maxW*ratio)/2,
          w: maxW,
          h: maxW * ratio,
          src: ev.target.result,
          img: img,
          opacity: 1,
          rotation: 0,
          visible: true
        };
        addElement(el);
        toast('Image importée ✓');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function updateSidebarActive() {
  document.querySelectorAll('.stool[data-fly]').forEach(b=>b.classList.toggle('active', b.dataset.fly===S.flyout));
}

function applyColor(c) {
  if (S.selectedIds.length===0) { setCanvasBg(c); return; }
  S.selectedIds.forEach(id=>{const el=S.elements.find(e=>e.id===id);if(el&&el.type!=='image')el.fill=c;});
  saveHistory(); render(); updatePropsPanel(); toast('Couleur appliquée');
}
function setCanvasBg(c) {
  S.canvasBg=c; saveHistory(); render();
  toast('Fond changé');
  if (S.flyout==='bg') updateFlyout();
  if (S.activeTab==='canvas') updateCanvasSettingsPanel();
}

// ─── RIGHT PANEL TABS ─────────────────────────────────────────────────────────
document.querySelectorAll('.rtab').forEach(t=>t.addEventListener('click',()=>{
  S.activeTab=t.dataset.tab; updateTabUI(); updateRightPanel();
}));

function updateTabUI() {
  document.querySelectorAll('.rtab').forEach(t=>t.classList.toggle('active',t.dataset.tab===S.activeTab));
}

function updateRightPanel() {
  if (S.activeTab==='props') updatePropsPanel();
  else if (S.activeTab==='layers') updateLayersPanel();
  else updateCanvasSettingsPanel();
}

// ─── LAYER NAME ───────────────────────────────────────────────────────────────
function layerName(el) {
  if (el.customName) return el.customName;
  if (el.type==='text') return (el.text||'').substring(0,20)||'Texte';
  if (el.type==='image') return 'Image';
  const n={rect:'Rectangle',circle:'Cercle',triangle:'Triangle',star:'Étoile',polygon:'Polygone',heart:'Cœur',line:'Ligne',icon:'Icône',text:'Texte'};
  return n[el.type]||'Élément';
}

    sel('p-shadow-x')?.addEventListener('input',()=>{patchEl(el.id,{'shadow.x':+sel('p-shadow-x').value});sel('p-shadow-x').closest('.slider-row').querySelector('.slider-val').textContent=sel('p-shadow-x').value;});

    sel('p-shadow-y')?.addEventListener('change',()=>saveHistory());

    sel('p-glow-blur')?.addEventListener('change',()=>saveHistory());
    sel('p-glow-color')?.addEventListener('input',()=>patchEl(el.id,{'glow.color':sel('p-glow-color').value}));
    sel('p-glow-color')?.addEventListener('change',()=>saveHistory());
  }
}

function formatSliderVal(key, v) {
  if (key==='opacity') return Math.round(v*100)+'%';
  if (key==='rotation') return Math.round(v)+'°';
  if (key==='rx') return v+'px';
  return v;
}

// ─── LAYERS PANEL ─────────────────────────────────────────────────────────────
function updateLayersPanel() {
  const tc=document.getElementById('tab-content');
  if (S.activeTab!=='layers') return;
  if (!S.elements.length) { tc.innerHTML=`<div class="empty-props">Aucun calque</div>`; return; }

  tc.innerHTML=`<div class="layers-header"><span>${S.elements.length} calques</span><span style="font-size:8px;color:#555566">⇅ glisser</span></div>`
    +[...S.elements].reverse().map(el=>{
      const col=el.type==='image'?'#888888':el.fill&&el.fill!=='none'?el.fill:el.stroke&&el.stroke!=='none'?el.stroke:'#888';
      const isSelected=S.selectedIds.includes(el.id);
      return `<div class="layer-item${isSelected?' selected':''}${el.visible===false?' hidden-layer':''}" draggable="true" data-lid="${el.id}">
        <span class="layer-drag">⋮⋮</span>
        <span class="layer-thumb" style="background:${col}${el.type==='image'?';background-size:cover':''}">${el.type==='image'?'🖼':''}</span>
        <span class="layer-name">${layerName(el)}</span>
        <button class="layer-icon-btn" data-lvis="${el.id}" title="Visibilité">${el.visible!==false?'👁':'🚫'}</button>
        <button class="layer-icon-btn" data-ldel="${el.id}" title="Supprimer" style="color:#ef444480">✕</button>
      </div>`;
    }).join('');

  tc.querySelectorAll('.layer-item').forEach(item=>{
    item.addEventListener('click', e=>{
      if (e.target.dataset.lvis||e.target.dataset.ldel||e.target.classList.contains('layer-name-input')) return;
      const id=item.dataset.lid;
      if (e.shiftKey) S.selectedIds=S.selectedIds.includes(id)?S.selectedIds.filter(i=>i!==id):[...S.selectedIds,id];
      else S.selectedIds=[id];
      render(); updateLayersPanel(); updatePropsPanel(); updateContextBar();
    });
    item.addEventListener('dblclick',e=>{
      if(e.target.classList.contains('layer-drag')) return;
      const id=item.dataset.lid;
      const el=S.elements.find(e=>e.id===id); if(!el)return;
      const span=item.querySelector('.layer-name');
      const inp=document.createElement('input');
      inp.type='text'; inp.className='layer-name-input'; inp.value=layerName(el);
      span.replaceWith(inp); inp.focus();
      const done=()=>{el.customName=inp.value||undefined;saveHistory();updateLayersPanel();};
      inp.addEventListener('blur',done);
      inp.addEventListener('keydown',e2=>{if(e2.key==='Enter')inp.blur();});
    });
  });
  tc.querySelectorAll('[data-lvis]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    const el=S.elements.find(e=>e.id===b.dataset.lvis); if(!el)return;
    el.visible=el.visible===false?true:false;
    saveHistory(); render(); updateLayersPanel();
  }));
  tc.querySelectorAll('[data-ldel]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    S.elements=S.elements.filter(e=>e.id!==b.dataset.ldel);
    S.selectedIds=S.selectedIds.filter(i=>i!==b.dataset.ldel);
    saveHistory(); render(); updateLayersPanel(); updateContextBar(); toast('Calque supprimé');
  }));
  let dragId=null;
  tc.querySelectorAll('.layer-item').forEach(item=>{
    item.addEventListener('dragstart',e=>{dragId=item.dataset.lid;e.dataTransfer.effectAllowed='move';});
    item.addEventListener('dragover', e=>{e.preventDefault();item.classList.add('drag-over');});
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{
      e.preventDefault(); item.classList.remove('drag-over');
      if(!dragId||dragId===item.dataset.lid)return;
      const from=S.elements.findIndex(e=>e.id===dragId);
      const to  =S.elements.findIndex(e=>e.id===item.dataset.lid);
      if(from===-1||to===-1)return;
      const [moved]=S.elements.splice(from,1); S.elements.splice(to,0,moved);
      saveHistory(); render(); updateLayersPanel(); toast('Calque déplacé');
    });
    item.addEventListener('dragend',()=>tc.querySelectorAll('.layer-item').forEach(i=>i.classList.remove('drag-over')));
  });
}

function exportImage(fmt) {
  const scale = fmt==='png2x'?2:1;
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width  = S.canvasW*scale;
  exportCanvas.height = S.canvasH*scale;
  const ec = exportCanvas.getContext('2d');
  ec.scale(scale,scale);
  if (fmt!=='transparent') { ec.fillStyle=S.canvasBg==='transparent'?'#ffffff':S.canvasBg; ec.fillRect(0,0,S.canvasW,S.canvasH); }
  S.elements.filter(e=>e.visible!==false).forEach(e=>drawEl(ec,e));
  if (drawLayerHasContent()) ec.drawImage(drawCanvas, 0, 0);
  if (S.activeFilterCSS && S.activeFilterCSS!=='__cartoon__') {
    const tmp2=document.createElement('canvas'); tmp2.width=exportCanvas.width; tmp2.height=exportCanvas.height;
    const tc2=tmp2.getContext('2d'); tc2.filter=S.activeFilterCSS; tc2.scale(scale,scale); tc2.drawImage(mainCanvas,0,0);
    ec.clearRect(0,0,exportCanvas.width,exportCanvas.height); ec.drawImage(tmp2,0,0);
  }

  if (fmt==='svg') { exportSVG(); return; }
  const link=document.createElement('a');
  if (fmt==='jpg') { link.href=exportCanvas.toDataURL('image/jpeg',.92); link.download='rc-logo.jpg'; }
  else { link.href=exportCanvas.toDataURL('image/png'); link.download=scale>1?'rc-logo@2x.png':fmt==='transparent'?'rc-logo-transparent.png':'rc-logo.png'; }
  link.click();
  document.getElementById('export-modal').classList.add('hidden');
  toast('Exporté ✓');
}

function exportSVG() {
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',S.canvasW); svg.setAttribute('height',S.canvasH); svg.setAttribute('xmlns',ns);
  const bg=document.createElementNS(ns,'rect');
  bg.setAttribute('width',S.canvasW);bg.setAttribute('height',S.canvasH);bg.setAttribute('fill',S.canvasBg==='transparent'?'none':S.canvasBg);
  svg.appendChild(bg);
  S.elements.filter(e=>e.visible!==false).forEach(el=>{
    if(el.type==='rect'){
      const r=document.createElementNS(ns,'rect');
      r.setAttribute('x',el.x);r.setAttribute('y',el.y);r.setAttribute('width',el.w);r.setAttribute('height',el.h);
      r.setAttribute('fill',el.fill||'#5b6af0');r.setAttribute('rx',el.rx||0);r.setAttribute('opacity',el.opacity??1);
      if(el.rotation)r.setAttribute('transform',`rotate(${el.rotation} ${el.x+el.w/2} ${el.y+el.h/2})`);
      svg.appendChild(r);
    } else if(el.type==='circle'){
      const c=document.createElementNS(ns,'circle');
      c.setAttribute('cx',el.x);c.setAttribute('cy',el.y);c.setAttribute('r',el.r);
      c.setAttribute('fill',el.fill||'#7c4af0');c.setAttribute('opacity',el.opacity??1);
      svg.appendChild(c);
    } else if(el.type==='text'){
      const t=document.createElementNS(ns,'text');
      t.setAttribute('x',el.x);t.setAttribute('y',el.y+(el.fontSize||40));
      t.setAttribute('fill',el.fill||'#fff');t.setAttribute('font-family',el.font);
      t.setAttribute('font-size',el.fontSize||40);t.setAttribute('font-weight',el.weight||'400');
      t.setAttribute('text-anchor',el.align==='center'?'middle':el.align==='right'?'end':'start');
      t.setAttribute('opacity',el.opacity??1); t.textContent=el.text;
      svg.appendChild(t);
    } else if(el.type==='image' && el.src){
      const img=document.createElementNS(ns,'image');
      img.setAttribute('x',el.x);img.setAttribute('y',el.y);
      img.setAttribute('width',el.w);img.setAttribute('height',el.h);
      img.setAttribute('href',el.src);img.setAttribute('opacity',el.opacity??1);
      svg.appendChild(img);
    }
  });
  const blob=new Blob([new XMLSerializer().serializeToString(svg)],{type:'image/svg+xml'});
  const link=document.createElement('a');
  link.href=URL.createObjectURL(blob); link.download='rc-logo.svg'; link.click();
  document.getElementById('export-modal').classList.add('hidden');
  toast('SVG exporté ✓');
}

// ─── KEYBOARD SHORTCUTS ───────────────────────────────────────────────────────
window.addEventListener('keydown', e=>{
  if(e.target instanceof HTMLInputElement||e.target instanceof HTMLTextAreaElement||e.target instanceof HTMLSelectElement)return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&e.key==='y'){e.preventDefault();redo();}
  if((e.ctrlKey||e.metaKey)&&e.key==='d'){e.preventDefault();duplicateSelected();}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveProject();}
  if((e.ctrlKey||e.metaKey)&&e.key==='a'){e.preventDefault();S.selectedIds=S.elements.map(e=>e.id);render();updateLayersPanel();updateContextBar();}
  if((e.key==='Delete'||e.key==='Backspace')&&S.selectedIds.length){e.preventDefault();deleteSelected();}
  if(e.key==='Escape'&&S.drawMode){deactivateDrawMode();}
});

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

// ─── DRAW TOOL ────────────────────────────────────────────────────────────────
function activateDrawMode(mode) {
  S.drawMode = mode;
  if (mode === 'eraser') {
    drawCanvas.className = 'eraser-active';
  } else {
    drawCanvas.className = 'drawing-active';
  }
  S.selectedIds = [];
  mainCanvas.style.pointerEvents = 'none';
  selCanvas.style.pointerEvents  = 'none';
  render(); updateContextBar(); updateFlyout();
  toast(mode==='pencil'?'✏️ Crayon activé':mode==='marker'?'🖊 Feutre activé':'🧽 Gomme activée');
}

function deactivateDrawMode() {
  S.drawMode = null;
  S.isDrawing = false;
  drawCanvas.className = '';
  mainCanvas.style.pointerEvents = '';
  selCanvas.style.pointerEvents  = '';
  updateFlyout();
  toast('Dessin terminé');
}

function clearDrawLayer() {
  dCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  S.cartoonData = null;
  render();
}

function initDrawCanvas() {
  drawCanvas.addEventListener('pointerdown', e=>{
    if (!S.drawMode) return;
    e.preventDefault();
    S.isDrawing = true;
    const pos = canvasPos(e);
    S.drawLastX = pos.x; S.drawLastY = pos.y;
    drawCanvas.setPointerCapture(e.pointerId);
    if (S.drawMode === 'eraser') {
      dCtx.save();
      dCtx.globalCompositeOperation = 'destination-out';
      dCtx.beginPath();
      dCtx.arc(pos.x, pos.y, S.drawSize*2, 0, Math.PI*2);
      dCtx.fill();
      dCtx.restore();
    }
  });
  drawCanvas.addEventListener('pointermove', e=>{
    if (!S.isDrawing || !S.drawMode) return;
    e.preventDefault();
    const pos = canvasPos(e);
    if (S.drawMode === 'eraser') {
      dCtx.save();
      dCtx.globalCompositeOperation = 'destination-out';
      dCtx.beginPath();
      dCtx.arc(pos.x, pos.y, S.drawSize*2, 0, Math.PI*2);
      dCtx.fill();
      dCtx.restore();
      render(); S.drawLastX=pos.x; S.drawLastY=pos.y; return;
    }
    dCtx.save();
    dCtx.lineCap = 'round'; dCtx.lineJoin = 'round';
    if (S.drawMode === 'marker') {
      dCtx.globalAlpha = 0.55;
      dCtx.lineWidth = S.drawSize * 3;
    } else {
      dCtx.globalAlpha = 1;
      dCtx.lineWidth = S.drawSize;
    }
    dCtx.strokeStyle = S.drawColor;
    dCtx.beginPath();
    dCtx.moveTo(S.drawLastX, S.drawLastY);
    dCtx.lineTo(pos.x, pos.y);
    dCtx.stroke();
    dCtx.restore();
    render();
    S.drawLastX = pos.x; S.drawLastY = pos.y;
  });
  drawCanvas.addEventListener('pointerup', ()=>{
    if (S.isDrawing) { S.isDrawing = false; saveHistory(); }
  });
}

// ─── INLINE TEXT EDITOR ───────────────────────────────────────────────────────
function openInlineTextEditor(el) {
  const overlay = document.getElementById('text-overlay');
  const bb = getBB(el);
  const px = (bb.x + bb.w/2) * S.zoom;
  const py = (bb.y) * S.zoom;
  const wrap = document.createElement('div');
  wrap.className = 'text-inline-wrap';
  wrap.style.left = px + 'px';
  wrap.style.top  = py + 'px';
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'text-inline-input';
  input.value = el.text || '';
  input.style.fontFamily = el.font || 'Montserrat';
  input.style.fontWeight = el.weight || '900';
  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'text-confirm-btn';
  confirmBtn.textContent = '✓';
  confirmBtn.title = 'Valider';
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'text-cancel-btn';
  cancelBtn.textContent = '✕';
  cancelBtn.title = 'Annuler';
  wrap.appendChild(input); wrap.appendChild(confirmBtn); wrap.appendChild(cancelBtn);
  overlay.innerHTML = '';
  overlay.appendChild(wrap);
  requestAnimationFrame(()=>{ input.focus(); input.select(); });
  const commit = () => {
    if (input.value.trim()) el.text = input.value;
    overlay.innerHTML = '';
    saveHistory(); render(); updatePropsPanel();
  };
  const cancel = () => { overlay.innerHTML = ''; };
  confirmBtn.addEventListener('click', commit);
  cancelBtn.addEventListener('click', cancel);
  input.addEventListener('keydown', e2 => {
    if (e2.key === 'Enter') { e2.preventDefault(); commit(); }
    if (e2.key === 'Escape') cancel();
  });
  input.addEventListener('input', ()=>{ el.text = input.value || el.text; render(); });
}

// ─── SAVE / LOAD ──────────────────────────────────────────────────────────────
const SAVE_KEY = 'rc-logo-maker-project-v2';

function saveProject() {
  try {
    const drawDataURL = (()=>{ try { return drawCanvas.toDataURL(); } catch(e){ return null; } })();
    // Serialize elements excluding non-serializable img objects
    const elements = JSON.parse(JSON.stringify(S.elements, (k, v) => k === 'img' ? undefined : v));
    const payload = {
      v: 3,
      elements,
      canvasW: S.canvasW, canvasH: S.canvasH,
      canvasBg: S.canvasBg,
      activeFilterId: S.activeFilterId,
      activeFilterCSS: S.activeFilterCSS,
      drawDataURL,
      savedAt: new Date().toLocaleTimeString(),
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
    const ss = document.getElementById('save-status');
    if (ss) { ss.textContent = 'enregistré'; setTimeout(()=>{ if(ss)ss.textContent=''; }, 3000); }
    toast('💾 Projet enregistré');
  } catch(e) { toast('⚠ Erreur de sauvegarde'); }
}

function loadProject() {
  try {
    const raw = localStorage.getItem(SAVE_KEY) || localStorage.getItem('rc-logo-maker-project');
    if (!raw) return false;
    const data = JSON.parse(raw);
    S.canvasW  = data.canvasW  || 500;
    S.canvasH  = data.canvasH  || 500;
    S.canvasBg = data.canvasBg || '#ffffff';
    S.activeFilterId  = data.activeFilterId  || 'none';
    S.activeFilterCSS = data.activeFilterCSS || null;
    restoreElements(data.elements || []);
    S.elements.forEach(el => { const n=+el.id; if(n>uid)uid=n; });
    applyCanvasSize();
    if (data.drawDataURL && data.drawDataURL.length > 100) {
      const img = new Image();
      img.onload = ()=>{ dCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height); dCtx.drawImage(img,0,0); render(); };
      img.src = data.drawDataURL;
    }
    render(); updateRightPanel();
    return true;
  } catch(e) { console.warn('Erreur chargement:', e); return false; }
}

function newProject() {
  S.elements = []; S.selectedIds = [];
  S.canvasW = 500; S.canvasH = 500; S.canvasBg = '#ffffff';
  S.activeFilterId = 'none'; S.activeFilterCSS = null; S.cartoonData = null;
  clearDrawLayer();
  applyCanvasSize(); saveHistory();
  render(); updateRightPanel(); updateContextBar();
  toast('Nouveau projet');
}

// ─── CROP TO CONTENT ──────────────────────────────────────────────────────────
function cropToContent() {
  const visible = S.elements.filter(e=>e.visible!==false);
  if (!visible.length) { toast('Aucun élément visible'); return; }
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  visible.forEach(el=>{
    const bb=getBB(el);
    minX=Math.min(minX,bb.x); minY=Math.min(minY,bb.y);
    maxX=Math.max(maxX,bb.x+bb.w); maxY=Math.max(maxY,bb.y+bb.h);
  });
  const PAD=16;
  const ox=Math.max(0,minX-PAD), oy=Math.max(0,minY-PAD);
  const nw=Math.min(S.canvasW,maxX+PAD)-ox;
  const nh=Math.min(S.canvasH,maxY+PAD)-oy;
  S.elements.forEach(el=>{
    el.x-=ox; el.y-=oy;
    if(el.type==='line'){el.x1-=ox;el.y1-=oy;el.x2-=ox;el.y2-=oy;}
  });
  if (drawCanvas) {
    const tmp=document.createElement('canvas'); tmp.width=Math.round(nw); tmp.height=Math.round(nh);
    const tc=tmp.getContext('2d'); tc.drawImage(drawCanvas,ox,oy,nw,nh,0,0,nw,nh);
    dCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
    dCtx.drawImage(tmp,0,0);
  }
  S.canvasW=Math.round(nw); S.canvasH=Math.round(nh);
  applyCanvasSize(); saveHistory();
  toast('✂ Recadré au contenu');
}

// ─── CARTOON FILTER ───────────────────────────────────────────────────────────
function applyCartoonFilter() {
  const tmp = document.createElement('canvas');
  tmp.width = mainCanvas.width; tmp.height = mainCanvas.height;
  const tc = tmp.getContext('2d');
  tc.fillStyle = S.canvasBg==='transparent'?'#ffffff':S.canvasBg;
  tc.fillRect(0,0,tmp.width,tmp.height);
  S.elements.filter(e=>e.visible!==false).forEach(e=>drawEl(tc,e));
  if (drawLayerHasContent()) tc.drawImage(drawCanvas,0,0);

  const imgData = tc.getImageData(0,0,tmp.width,tmp.height);
  const d = imgData.data;
  const w = tmp.width, h = tmp.height;

  const levels = 5;
  for (let i=0; i<d.length; i+=4) {
    d[i]   = Math.round(d[i]   /(255/levels))*(255/levels);
    d[i+1] = Math.round(d[i+1]/(255/levels))*(255/levels);
    d[i+2] = Math.round(d[i+2]/(255/levels))*(255/levels);
  }

  const copy = new Uint8ClampedArray(d);
  const getL = (x,y) => { const idx=(y*w+x)*4; return 0.299*copy[idx]+0.587*copy[idx+1]+0.114*copy[idx+2]; };
  for (let y=1;y<h-1;y++) {
    for (let x=1;x<w-1;x++) {
      const gx = -getL(x-1,y-1)+getL(x+1,y-1)-2*getL(x-1,y)+2*getL(x+1,y)-getL(x-1,y+1)+getL(x+1,y+1);
      const gy = -getL(x-1,y-1)-2*getL(x,y-1)-getL(x+1,y-1)+getL(x-1,y+1)+2*getL(x,y+1)+getL(x+1,y+1);
      const mag = Math.sqrt(gx*gx+gy*gy);
      if (mag > 60) {
        const idx=(y*w+x)*4;
        d[idx]=0; d[idx+1]=0; d[idx+2]=0;
      }
    }
  }

  tc.putImageData(imgData,0,0);
  S.cartoonData = tc.getImageData(0,0,tmp.width,tmp.height);
  ctx.clearRect(0,0,mainCanvas.width,mainCanvas.height);
  ctx.putImageData(S.cartoonData,0,0);
  drawSelection();
  toast('🎨 Filtre Cartoon appliqué');
}


// ─── PUBLISH TEMPLATE ─────────────────────────────────────────────────────────
document.getElementById('btn-publish').addEventListener('click', openPublishModal);

function openPublishModal() {
  document.getElementById('pub-name').value = '';
  document.getElementById('pub-cat').value = 'luxe';
  document.getElementById('publish-modal').classList.remove('hidden');
}

function closePublishModal() {
  document.getElementById('publish-modal').classList.add('hidden');
}

document.getElementById('pub-cancel').addEventListener('click', closePublishModal);
document.getElementById('pub-ok').addEventListener('click', function() {
  const name = document.getElementById('pub-name').value.trim();
  const cat  = document.getElementById('pub-cat').value;
  if (!name) { toast('⚠ Veuillez nommer votre template'); return; }

  // Serialize project data (no img objects)
  const elementsData = JSON.parse(JSON.stringify(S.elements, (k,v) => k === 'img' ? undefined : v));
  const projectData = {
    elements: elementsData,
    canvasBg: S.canvasBg,
    canvasW:  S.canvasW,
    canvasH:  S.canvasH
  };

  // Load existing user templates
  let userTemplates = [];
  try { userTemplates = JSON.parse(localStorage.getItem('rc_user_templates') || '[]'); } catch(e) {}

  // Add new template
  const tplId = 'utpl_' + Date.now();
  userTemplates.unshift({
    id:   tplId,
    name: name,
    cat:  cat,
    date: new Date().toLocaleDateString('fr-FR'),
    data: projectData
  });

  localStorage.setItem('rc_user_templates', JSON.stringify(userTemplates));
  closePublishModal();
  toast('✅ Template "' + name + '" publié !');
});

// Close publish modal on outside click
document.getElementById('publish-modal').addEventListener('click', function(e) {
  if (e.target === this) closePublishModal();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
applyZoom();
updateTopBarButtons();
updateContextBar();
updateRightPanel();
updatePanelToggle();
if (loadProject()) {
  toast('✓ Projet restauré');
} else {
  render();
}
initDrawCanvas();
setInterval(saveProject, 60000);

// Restore user template elements if any
if (window._pendingUserTplElements && window._pendingUserTplElements.length > 0) {
  restoreElements(window._pendingUserTplElements);
  // Rebuild img objects
  S.elements.forEach(el => {
    if (el.type === 'image' && el.src && !el.img) {
      const img = new Image();
      img.onload = () => render();
      img.src = el.src;
      el.img = img;
    }
  });
  mainCanvas.width  = S.canvasW;
  mainCanvas.height = S.canvasH;
  selCanvas.width   = S.canvasW;
  selCanvas.height  = S.canvasH;
  drawCanvas.width  = S.canvasW;
  drawCanvas.height = S.canvasH;
  render();
  document.getElementById('canvas-dims').textContent = S.canvasW + ' × ' + S.canvasH;
  toast('📐 Template utilisateur chargé');
}
</script>
